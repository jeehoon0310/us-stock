services:
  us-stock:
    image: ghcr.io/jeehoon0310/us-stock:latest
    container_name: us-stock
    network_mode: host
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=8889
      - TZ=America/New_York
      - NODE_OPTIONS=--dns-result-order=ipv4first --no-network-family-autoselection
      - BOARD_DB_PATH=/data/board.db
      - DATA_DB_PATH=/data/data.db
      - DOWNLOAD_DIR=/data/downloads
      - DOWNLOAD_PASSWORD=${DOWNLOAD_PASSWORD:?set in /volume1/docker/us-stock/.env}
      - DOWNLOAD_SESSION_SECRET=${DOWNLOAD_SESSION_SECRET:?set in /volume1/docker/us-stock/.env}
    volumes:
      - /volume1/docker/us-stock/board:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8889/api/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    image: nginx:alpine
    container_name: us-stock-dashboard
    network_mode: host
    volumes:
      - /volume1/docker/us-stock/dashboard:/usr/share/nginx/html:ro
      - /volume1/docker/us-stock/dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
