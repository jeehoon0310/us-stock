server {
    listen 8080;
    root /usr/share/nginx/html;
    absolute_redirect off;

    # ── 내부 auth_request 엔드포인트 ──────────────────────────
    location = /auth/check {
        internal;
        proxy_pass http://127.0.0.1:8090;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location = /auth/admin-check {
        internal;
        proxy_pass http://127.0.0.1:8090;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # ── 공개 Auth API (인증 불필요) ───────────────────────────
    location /auth/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # ── 관리자 API (admin-check 필수) ─────────────────────────
    location ^~ /admin/api/ {
        auth_request /auth/admin-check;
        error_page 401 = @unauthenticated;
        error_page 403 = @forbidden;

        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        client_max_body_size 520m;
    }

    # ── 파일 다운로드 (일반 auth 필요) ────────────────────────
    location ^~ /dl/ {
        auth_request /auth/check;
        error_page 401 = @unauthenticated;

        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_buffering off;
        proxy_read_timeout 300;
    }

    # ── 공개 페이지 (인증 불필요) ─────────────────────────────
    location = /login {
        try_files /login.html =404;
    }

    location = /register {
        try_files /register.html =404;
    }

    # ── 관리자 페이지 (admin-check 필수) ──────────────────────
    location ^~ /admin {
        auth_request /auth/admin-check;
        error_page 401 = @unauthenticated;
        error_page 403 = @forbidden;

        index index.html;
        try_files $uri $uri/ $uri.html /admin/index.html;
    }

    # ── 에러 핸들러 ───────────────────────────────────────────
    error_page 401 = @unauthenticated;
    error_page 403 = @forbidden;

    location @unauthenticated {
        return 302 /login;
    }

    location @forbidden {
        return 403 "접근 권한이 없습니다. 관리자 계정으로 로그인해 주세요.";
    }

    # ── 정적 페이지 (일반 auth 필요) ──────────────────────────
    location = /terminal {
        auth_request /auth/check;
        rewrite ^ /pages/terminal.html last;
    }
    location = /reports {
        auth_request /auth/check;
        rewrite ^ /pages/reports.html last;
    }
    location = /notice {
        auth_request /auth/check;
        rewrite ^ /pages/notice.html last;
    }
    location = /notice.html {
        auth_request /auth/check;
        rewrite ^ /pages/notice.html last;
    }
    location = /terminal.html {
        auth_request /auth/check;
        rewrite ^ /pages/terminal.html last;
    }
    location = /reports.html {
        auth_request /auth/check;
        rewrite ^ /pages/reports.html last;
    }

    location /pages/ {
        auth_request /auth/check;
        try_files $uri =404;
    }

    location /images/ {
        try_files $uri =404;
    }

    # ── 관리자 전용 Next.js 페이지 ────────────────────────────
    location ~ ^/(costs|graph|ai-builder)(/|$) {
        auth_request /auth/admin-check;
        error_page 401 = @unauthenticated;
        error_page 403 = @forbidden;

        proxy_pass http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Next.js 앱 (일반 auth 필요) ───────────────────────────
    location / {
        auth_request /auth/check;

        proxy_pass http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
