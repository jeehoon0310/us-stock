<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원 관리 - Frindle Admin</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#0a0a0f;color:#e2e8f0;min-height:100vh;display:flex}

.sidebar{width:220px;min-height:100vh;background:#12121a;border-right:1px solid #1e1e2e;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #1e1e2e}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:#6366f1}
.logo-sub{font-size:11px;color:#64748b;margin-top:3px;letter-spacing:0.5px}
.sidebar-nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:#94a3b8;text-decoration:none;transition:background .15s,color .15s}
.nav-item:hover{background:#1e1e2e;color:#f1f5f9}
.nav-item.active{background:#1e1e2e;color:#6366f1;font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-divider{border-top:1px solid #1e1e2e;margin:8px 0}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.header{height:60px;background:#12121a;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.header-title{font-size:16px;font-weight:700;color:#f1f5f9}
.logout-btn{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:#6366f1;color:#6366f1}

.content{padding:24px;flex:1}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-input{background:#12121a;border:1px solid #2d2d44;border-radius:8px;padding:9px 14px;font-size:14px;color:#f1f5f9;outline:none;transition:border-color .2s;width:280px}
.search-input:focus{border-color:#6366f1}
.search-input::placeholder{color:#4a5568}
.btn-csv{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-csv:hover{border-color:#6366f1;color:#6366f1}
.member-count{margin-left:auto;font-size:13px;color:#64748b}

/* Table */
.table-wrap{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;overflow:auto}
table{width:100%;border-collapse:collapse;min-width:800px}
th{background:#1a1a28;font-size:12px;font-weight:600;color:#64748b;padding:12px 16px;text-align:left;border-bottom:1px solid #1e1e2e;letter-spacing:0.3px;white-space:nowrap}
td{padding:11px 16px;font-size:14px;color:#e2e8f0;border-bottom:1px solid #1a1a28;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1a1a28}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.badge-green{background:#1a2d1a;border:1px solid #14532d;color:#86efac}
.badge-red{background:#2d1a1a;border:1px solid #7f1d1d;color:#fca5a5}
.badge-purple{background:#1e1a2d;border:1px solid #4c1d95;color:#c4b5fd}
.badge-gray{background:#1a1a28;border:1px solid #2d2d44;color:#64748b}

/* Action buttons */
.action-wrap{display:flex;gap:6px;align-items:center}
.btn-action{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-action:hover{border-color:#6366f1;color:#6366f1}
.btn-action.danger:hover{border-color:#7f1d1d;color:#fca5a5}
.btn-action:disabled{opacity:0.4;cursor:not-allowed}

/* Loading / empty */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#64748b;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid #2d2d44;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Confirm modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#12121a;border:1px solid #2d2d44;border-radius:12px;padding:28px;width:340px;max-width:90vw}
.modal-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:10px}
.modal-body{font-size:14px;color:#94a3b8;margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer}
.btn-cancel:hover{border-color:#6366f1;color:#6366f1}
.btn-delete{background:#7f1d1d;border:none;color:#fca5a5;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:600}
.btn-delete:hover{background:#991b1b}
.btn-delete:disabled{opacity:0.5;cursor:not-allowed}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e1e2e;border:1px solid #2d2d44;border-radius:8px;padding:12px 16px;font-size:13px;color:#f1f5f9;min-width:200px;animation:slideIn .2s ease}
.toast.success{border-color:#14532d;background:#1a2d1a;color:#86efac}
.toast.error{border-color:#7f1d1d;background:#2d1a1a;color:#fca5a5}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .search-input{width:100%}
  .toolbar{flex-direction:column;align-items:stretch}
  .member-count{margin-left:0}
}
</style>
</head>
<body x-data="members()" x-init="init()">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text"><span>Frindle</span> Admin</div>
    <div class="logo-sub">관리자 패널</div>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin" class="nav-item"><span class="icon">📊</span> 대시보드</a>
    <a href="/admin/members" class="nav-item active"><span class="icon">👥</span> 회원 관리</a>
    <a href="/admin/files" class="nav-item"><span class="icon">📁</span> 파일 관리</a>
    <a href="/admin/notices" class="nav-item"><span class="icon">📢</span> 공지 관리</a>
    <div class="nav-divider"></div>
    <a href="/" class="nav-item"><span class="icon">🔙</span> 사이트로 돌아가기</a>
  </nav>
</aside>

<!-- Main -->
<div class="main">
  <header class="header">
    <span class="header-title">회원 관리</span>
    <button class="logout-btn" @click="logout()">로그아웃</button>
  </header>

  <main class="content">
    <!-- Toolbar -->
    <div class="toolbar">
      <input
        class="search-input"
        type="text"
        placeholder="이름, 이메일, 전화번호 검색..."
        x-model="searchQuery"
      >
      <button class="btn-csv" @click="downloadCSV()">
        ⬇ CSV 다운로드
      </button>
      <span class="member-count" x-text="`총 ${filtered.length}명`"></span>
    </div>

    <!-- 로딩 -->
    <div class="loading" x-show="loading">
      <div class="spinner"></div> 회원 목록을 불러오는 중...
    </div>

    <!-- 테이블 -->
    <div class="table-wrap" x-show="!loading">
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>이메일</th>
            <th>전화번호</th>
            <th>유입경로</th>
            <th>가입일</th>
            <th>상태</th>
            <th>관리자</th>
            <th>액션</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="user in filtered" :key="user.id">
            <tr>
              <td x-text="user.name"></td>
              <td x-text="user.email"></td>
              <td x-text="user.phone || '-'"></td>
              <td x-text="user.referral || '-'"></td>
              <td x-text="user.created_at"></td>
              <td>
                <span :class="user.is_active ? 'badge badge-green' : 'badge badge-red'"
                  x-text="user.is_active ? '활성' : '비활성'"></span>
              </td>
              <td>
                <span :class="user.is_admin ? 'badge badge-purple' : 'badge badge-gray'"
                  x-text="user.is_admin ? '관리자' : '일반'"></span>
              </td>
              <td>
                <div class="action-wrap">
                  <button
                    class="btn-action"
                    :disabled="actionLoading === user.id"
                    @click="toggleActive(user)"
                    x-text="user.is_active ? '비활성화' : '활성화'"
                  ></button>
                  <button
                    class="btn-action danger"
                    :disabled="actionLoading === user.id"
                    @click="confirmDelete(user)"
                  >삭제</button>
                </div>
              </td>
            </tr>
          </template>
          <template x-if="!loading && filtered.length === 0">
            <tr>
              <td colspan="8" style="text-align:center;color:#64748b;padding:32px">
                검색 결과가 없습니다.
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-backdrop" x-show="deleteTarget" x-cloak @click.self="deleteTarget = null">
  <div class="modal">
    <div class="modal-title">회원 삭제</div>
    <div class="modal-body" x-text="`'${deleteTarget?.name}(${deleteTarget?.email})' 회원을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`"></div>
    <div class="modal-actions">
      <button class="btn-cancel" @click="deleteTarget = null">취소</button>
      <button class="btn-delete" :disabled="deleteLoading" @click="doDelete()" x-text="deleteLoading ? '삭제 중...' : '삭제'"></button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
function members() {
  return {
    loading: true,
    users: [],
    searchQuery: '',
    actionLoading: null,
    deleteTarget: null,
    deleteLoading: false,

    get filtered() {
      const q = this.searchQuery.toLowerCase().trim();
      if (!q) return this.users;
      return this.users.filter(u =>
        (u.name || '').toLowerCase().includes(q) ||
        (u.email || '').toLowerCase().includes(q) ||
        (u.phone || '').toLowerCase().includes(q)
      );
    },

    async init() {
      await this.load();
    },

    async load() {
      this.loading = true;
      try {
        const res = await fetch('/admin/api/users');
        if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
        if (!res.ok) throw new Error('서버 오류');
        const data = await res.json();
        this.users = data.users || [];
      } catch (e) {
        showToast(e.message || '회원 목록 로드에 실패했습니다.', 'error');
      } finally {
        this.loading = false;
      }
    },

    async toggleActive(user) {
      this.actionLoading = user.id;
      try {
        const res = await fetch(`/admin/api/users/${user.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ is_active: user.is_active ? 0 : 1 })
        });
        if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
        if (!res.ok) throw new Error('수정 실패');
        user.is_active = user.is_active ? 0 : 1;
        showToast(`${user.name} 회원 상태를 변경했습니다.`, 'success');
      } catch (e) {
        showToast(e.message || '상태 변경에 실패했습니다.', 'error');
      } finally {
        this.actionLoading = null;
      }
    },

    confirmDelete(user) {
      this.deleteTarget = user;
    },

    async doDelete() {
      if (!this.deleteTarget) return;
      this.deleteLoading = true;
      try {
        const res = await fetch(`/admin/api/users/${this.deleteTarget.id}`, { method: 'DELETE' });
        if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
        if (!res.ok) throw new Error('삭제 실패');
        this.users = this.users.filter(u => u.id !== this.deleteTarget.id);
        showToast(`${this.deleteTarget.name} 회원을 삭제했습니다.`, 'success');
        this.deleteTarget = null;
      } catch (e) {
        showToast(e.message || '삭제에 실패했습니다.', 'error');
      } finally {
        this.deleteLoading = false;
      }
    },

    downloadCSV() {
      const headers = ['이름', '이메일', '전화번호', '유입경로', '가입일', '상태', '관리자'];
      const rows = this.filtered.map(u => [
        u.name, u.email, u.phone || '', u.referral || '',
        u.created_at,
        u.is_active ? '활성' : '비활성',
        u.is_admin ? '관리자' : '일반'
      ]);
      const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `members_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    },

    async logout() {
      try { await fetch('/auth/logout', { method: 'POST' }); } catch {}
      window.location.href = '/login';
    }
  };
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
</body>
</html>
