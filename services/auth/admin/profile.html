<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 성향 분석 - Frindle Admin</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#0a0a0f;color:#e2e8f0;min-height:100vh;display:flex}

.sidebar{width:220px;min-height:100vh;background:#12121a;border-right:1px solid #1e1e2e;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #1e1e2e}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:#6366f1}
.logo-sub{font-size:11px;color:#64748b;margin-top:3px;letter-spacing:0.5px}
.sidebar-nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:#94a3b8;text-decoration:none;transition:background .15s,color .15s;cursor:pointer}
.nav-item:hover{background:#1e1e2e;color:#f1f5f9}
.nav-item.active{background:#1e1e2e;color:#6366f1;font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-divider{border-top:1px solid #1e1e2e;margin:8px 0}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.header{height:60px;background:#12121a;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.header-title{font-size:16px;font-weight:700;color:#f1f5f9}
.logout-btn{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:#6366f1;color:#6366f1}
.content{padding:24px;flex:1}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;padding:20px}
.stat-label{font-size:12px;color:#64748b;margin-bottom:8px;font-weight:500}
.stat-value{font-size:28px;font-weight:800;color:#f1f5f9;line-height:1}
.stat-sub{font-size:12px;color:#64748b;margin-top:6px}
.stat-card.primary .stat-value{color:#6366f1}
.stat-card.success .stat-value{color:#86efac}
.stat-card.warning .stat-value{color:#fde68a}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:15px;font-weight:700;color:#f1f5f9}
.filter-wrap{display:flex;align-items:center;gap:8px}
.filter-select{background:#12121a;border:1px solid #2d2d44;color:#94a3b8;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;outline:none}
.filter-select:focus{border-color:#6366f1}

.table-wrap{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th{background:#1a1a28;font-size:12px;font-weight:600;color:#64748b;padding:12px 14px;text-align:left;border-bottom:1px solid #1e1e2e;letter-spacing:0.3px;white-space:nowrap}
td{padding:11px 14px;font-size:13px;color:#e2e8f0;border-bottom:1px solid #1a1a28;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1a1a28}

.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid currentColor}

.btn-del{background:transparent;border:1px solid #2d2d44;color:#64748b;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;transition:all .15s}
.btn-del:hover{border-color:#7f1d1d;color:#fca5a5}
.btn-del:disabled{opacity:0.3;cursor:not-allowed}

.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#64748b;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid #2d2d44;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e1e2e;border:1px solid #2d2d44;border-radius:8px;padding:12px 16px;font-size:13px;color:#f1f5f9;min-width:200px;animation:slideIn .2s ease}
.toast.success{border-color:#14532d;background:#1a2d1a;color:#86efac}
.toast.error{border-color:#7f1d1d;background:#2d1a1a;color:#fca5a5}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body x-data="profileAdmin()" x-init="init()">

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text"><span>Frindle</span> Admin</div>
    <div class="logo-sub">관리자 패널</div>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin" class="nav-item"><span class="icon">📊</span> 대시보드</a>
    <a href="/admin/members" class="nav-item"><span class="icon">👥</span> 회원 관리</a>
    <a href="/admin/files" class="nav-item"><span class="icon">📁</span> 파일 관리</a>
    <a href="/admin/notices" class="nav-item"><span class="icon">📢</span> 공지 관리</a>
    <a href="/admin/aitok" class="nav-item"><span class="icon">🤖</span> AI톡 관리</a>
    <a href="/admin/profile" class="nav-item active"><span class="icon">📈</span> 투자 성향 분석</a>
    <div class="nav-divider"></div>
    <a href="/" class="nav-item"><span class="icon">🔙</span> 사이트로 돌아가기</a>
  </nav>
</aside>

<div class="main">
  <header class="header">
    <span class="header-title">투자 성향 분석 결과</span>
    <button class="logout-btn" @click="logout()">로그아웃</button>
  </header>

  <main class="content">
    <div class="loading" x-show="loading">
      <div class="spinner"></div> 데이터를 불러오는 중...
    </div>

    <template x-if="!loading">
      <div>
        <!-- 통계 카드 -->
        <div class="stats-grid">
          <div class="stat-card primary">
            <div class="stat-label">전체 분석 수</div>
            <div class="stat-value" x-text="results.length"></div>
            <div class="stat-sub">누적</div>
          </div>
          <div class="stat-card success">
            <div class="stat-label">이번 주</div>
            <div class="stat-value" x-text="weekCount"></div>
            <div class="stat-sub">최근 7일</div>
          </div>
          <div class="stat-card warning">
            <div class="stat-label">가장 많은 성향</div>
            <div class="stat-value" style="font-size:14px;padding-top:4px" x-text="topProfile"></div>
            <div class="stat-sub">최다 결과</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">평균 목표 수익률</div>
            <div class="stat-value" x-text="avgReturn > 0 ? '+' + avgReturn.toFixed(1) + '%' : '—'"></div>
            <div class="stat-sub">전체 평균</div>
          </div>
        </div>

        <!-- 필터 + 테이블 -->
        <div class="section-header">
          <div class="section-title">
            분석 결과 목록
            <span x-show="filtered.length > 0" x-text="filtered.length + '건'"
              style="font-size:11px;font-weight:600;background:#1e1e2e;color:#6366f1;padding:2px 10px;border-radius:20px;margin-left:8px"></span>
          </div>
          <div class="filter-wrap">
            <select class="filter-select" x-model="filterProfile" @change="applyFilter()">
              <option value="">전체 성향</option>
              <option value="very_conservative">매우 보수적</option>
              <option value="conservative">보수적</option>
              <option value="neutral">중립적</option>
              <option value="aggressive">공격적</option>
              <option value="very_aggressive">매우 공격적</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <template x-if="filtered.length > 0">
            <table>
              <thead>
                <tr>
                  <th>일시</th>
                  <th>회원</th>
                  <th>성향</th>
                  <th>점수</th>
                  <th>나이</th>
                  <th>경험</th>
                  <th>목적</th>
                  <th>목표수익률</th>
                  <th>기간</th>
                  <th>투자금→목표</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="r in filtered" :key="r.id">
                  <tr>
                    <td style="font-size:12px;color:#64748b;white-space:nowrap" x-text="r.created_at.slice(0,16).replace('T',' ')"></td>
                    <td>
                      <div x-text="r.user_name" style="font-weight:600"></div>
                      <div x-show="r.user_email" x-text="r.user_email" style="font-size:11px;color:#64748b;margin-top:2px"></div>
                    </td>
                    <td>
                      <span class="badge"
                        x-text="PROFILE_LABELS[r.profile] || r.profile"
                        :style="'color:' + (PROFILE_COLORS[r.profile] || '#e2e8f0') + ';border-color:' + (PROFILE_COLORS[r.profile] || '#e2e8f0') + '33'"></span>
                    </td>
                    <td style="font-family:monospace;font-weight:700"
                      x-text="r.score > 0 ? '+' + r.score : r.score"></td>
                    <td style="color:#94a3b8" x-text="r.age + '세'"></td>
                    <td style="color:#94a3b8" x-text="EXPERIENCE_LABELS[r.experience] || r.experience"></td>
                    <td style="color:#94a3b8;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" x-text="PURPOSE_LABELS[r.purpose] || r.purpose"></td>
                    <td style="font-weight:700;color:#6366f1"
                      x-text="r.required_return > 0 ? '+' + r.required_return.toFixed(1) + '%' : '—'"></td>
                    <td style="color:#94a3b8" x-text="r.duration + '년'"></td>
                    <td style="font-size:11px;color:#64748b"
                      x-text="r.investable && r.target ? r.investable.toLocaleString() + '→' + r.target.toLocaleString() + '만' : '—'"></td>
                    <td>
                      <button class="btn-del" @click="deleteResult(r.id)">삭제</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </template>
          <template x-if="filtered.length === 0">
            <div class="loading">아직 분석 기록이 없습니다.</div>
          </template>
        </div>
      </div>
    </template>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const PROFILE_LABELS = {
  very_conservative: '매우 보수적',
  conservative: '보수적',
  neutral: '중립적',
  aggressive: '공격적',
  very_aggressive: '매우 공격적',
};
const PROFILE_COLORS = {
  very_conservative: '#60a5fa',
  conservative: '#2dd4bf',
  neutral: '#facc15',
  aggressive: '#fb923c',
  very_aggressive: '#f87171',
};
const EXPERIENCE_LABELS = { 0: '0~1년', 2: '2~3년', 4: '4~5년', 6: '6~9년', 10: '10년+' };
const PURPOSE_LABELS = {
  preserve: '자본보전/노후대비', stable: '안정적 수익', grow: '자산 증식',
  lump_sum: '목돈 마련', fast: '빠른 자산 증대',
};

function profileAdmin() {
  return {
    loading: true,
    results: [],
    filtered: [],
    filterProfile: '',
    weekCount: 0,
    topProfile: '—',
    avgReturn: 0,

    async init() {
      try {
        const r = await fetch('/api/admin/profile-results');
        if (r.status === 401 || r.status === 403) { window.location.href = '/login'; return; }
        if (!r.ok) throw new Error('서버 오류');
        const d = await r.json();
        this.results = Array.isArray(d.results) ? d.results : [];
        this.filtered = this.results;
        this.computeStats();
      } catch (e) {
        showToast(e.message || '데이터 로드에 실패했습니다.', 'error');
      } finally {
        this.loading = false;
      }
    },

    computeStats() {
      const now = Date.now();
      this.weekCount = this.results.filter(r => now - new Date(r.created_at).getTime() < 7 * 86400000).length;

      const profileCount = {};
      let totalReturn = 0, returnCount = 0;
      for (const r of this.results) {
        profileCount[r.profile] = (profileCount[r.profile] || 0) + 1;
        if (r.required_return > 0) { totalReturn += r.required_return; returnCount++; }
      }
      if (Object.keys(profileCount).length > 0) {
        const top = Object.entries(profileCount).sort((a, b) => b[1] - a[1])[0];
        this.topProfile = PROFILE_LABELS[top[0]] || top[0];
      }
      this.avgReturn = returnCount > 0 ? totalReturn / returnCount : 0;
    },

    applyFilter() {
      if (!this.filterProfile) {
        this.filtered = this.results;
      } else {
        this.filtered = this.results.filter(r => r.profile === this.filterProfile);
      }
    },

    async deleteResult(id) {
      if (!confirm('이 분석 결과를 삭제하시겠습니까?')) return;
      try {
        const r = await fetch('/api/admin/profile-results?id=' + id, { method: 'DELETE' });
        if (!r.ok) throw new Error();
        this.results = this.results.filter(r => r.id !== id);
        this.applyFilter();
        this.computeStats();
        showToast('삭제되었습니다.', 'success');
      } catch {
        showToast('삭제에 실패했습니다.', 'error');
      }
    },

    async logout() {
      try { await fetch('/auth/logout', { method: 'POST' }); } catch {}
      window.location.href = '/login';
    }
  };
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
</body>
</html>
