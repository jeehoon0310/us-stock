<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지 관리 - Frindle Admin</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#0a0a0f;color:#e2e8f0;min-height:100vh;display:flex}

.sidebar{width:220px;min-height:100vh;background:#12121a;border-right:1px solid #1e1e2e;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #1e1e2e}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:#6366f1}
.logo-sub{font-size:11px;color:#64748b;margin-top:3px;letter-spacing:0.5px}
.sidebar-nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:#94a3b8;text-decoration:none;transition:background .15s,color .15s}
.nav-item:hover{background:#1e1e2e;color:#f1f5f9}
.nav-item.active{background:#1e1e2e;color:#6366f1;font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-divider{border-top:1px solid #1e1e2e;margin:8px 0}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.header{height:60px;background:#12121a;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.header-title{font-size:16px;font-weight:700;color:#f1f5f9}
.logout-btn{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:#6366f1;color:#6366f1}

.content{padding:24px;flex:1}
.section-title{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:14px}

/* Write form */
.write-form{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;padding:20px;margin-bottom:28px}
.form-field{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
.form-input{width:100%;background:#1a1a28;border:1px solid #2d2d44;border-radius:8px;padding:10px 14px;font-size:14px;color:#f1f5f9;outline:none;transition:border-color .2s}
.form-input:focus{border-color:#6366f1}
.form-input::placeholder{color:#4a5568}
.form-textarea{width:100%;background:#1a1a28;border:1px solid #2d2d44;border-radius:8px;padding:10px 14px;font-size:14px;color:#f1f5f9;outline:none;transition:border-color .2s;resize:vertical;min-height:100px;font-family:inherit}
.form-textarea:focus{border-color:#6366f1}
.form-textarea::placeholder{color:#4a5568}
.form-actions{display:flex;justify-content:flex-end}
.btn-submit{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-submit:hover{background:#4f46e5}
.btn-submit:disabled{background:#2d2d44;cursor:not-allowed;color:#64748b}

/* Notice cards */
.notices-list{display:flex;flex-direction:column;gap:12px}
.notice-card{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;padding:18px 20px;transition:border-color .15s}
.notice-card:hover{border-color:#2d2d44}
.notice-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.notice-title{font-size:15px;font-weight:700;color:#f1f5f9;line-height:1.4}
.notice-meta{font-size:12px;color:#64748b;margin-top:4px;white-space:nowrap;flex-shrink:0;text-align:right}
.notice-content{font-size:13px;color:#94a3b8;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:80px;overflow:hidden;position:relative}
.notice-content.expanded{max-height:none}
.notice-content-fade{position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,#12121a)}
.notice-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.btn-expand{background:transparent;border:none;color:#64748b;font-size:12px;cursor:pointer;padding:0;transition:color .15s}
.btn-expand:hover{color:#6366f1}
.notice-actions{display:flex;gap:6px}
.btn-action{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-action.danger:hover{border-color:#7f1d1d;color:#fca5a5}
.btn-action:disabled{opacity:0.4;cursor:not-allowed}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#64748b;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid #2d2d44;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Confirm modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#12121a;border:1px solid #2d2d44;border-radius:12px;padding:28px;width:340px;max-width:90vw}
.modal-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:10px}
.modal-body{font-size:14px;color:#94a3b8;margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:transparent;border:1px solid #2d2d44;color:#94a3b8;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer}
.btn-cancel:hover{border-color:#6366f1;color:#6366f1}
.btn-delete{background:#7f1d1d;border:none;color:#fca5a5;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:600}
.btn-delete:hover{background:#991b1b}
.btn-delete:disabled{opacity:0.5;cursor:not-allowed}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e1e2e;border:1px solid #2d2d44;border-radius:8px;padding:12px 16px;font-size:13px;color:#f1f5f9;min-width:200px;animation:slideIn .2s ease}
.toast.success{border-color:#14532d;background:#1a2d1a;color:#86efac}
.toast.error{border-color:#7f1d1d;background:#2d1a1a;color:#fca5a5}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

.empty-state{text-align:center;color:#64748b;font-size:14px;padding:48px;background:#12121a;border:1px solid #1e1e2e;border-radius:12px}

[x-cloak]{display:none!important}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
}
</style>
</head>
<body x-data="noticeManager()" x-init="init()">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text"><span>Frindle</span> Admin</div>
    <div class="logo-sub">관리자 패널</div>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin" class="nav-item"><span class="icon">📊</span> 대시보드</a>
    <a href="/admin/members" class="nav-item"><span class="icon">👥</span> 회원 관리</a>
    <a href="/admin/files" class="nav-item"><span class="icon">📁</span> 파일 관리</a>
    <a href="/admin/notices" class="nav-item active"><span class="icon">📢</span> 공지 관리</a>
    <a href="/admin/aitok" class="nav-item"><span class="icon">🤖</span> AI톡 관리</a>
    <a href="/admin/profile" class="nav-item"><span class="icon">📈</span> 투자 성향 분석</a>
    <div class="nav-divider"></div>
    <a href="/" class="nav-item"><span class="icon">🔙</span> 사이트로 돌아가기</a>
  </nav>
</aside>

<!-- Main -->
<div class="main">
  <header class="header">
    <span class="header-title">공지 관리</span>
    <button class="logout-btn" @click="logout()">로그아웃</button>
  </header>

  <main class="content">
    <!-- 작성 폼 -->
    <div class="section-title">새 공지 작성</div>
    <div class="write-form">
      <div class="form-field">
        <label for="noticeTitle">제목</label>
        <input
          id="noticeTitle"
          class="form-input"
          type="text"
          placeholder="공지 제목을 입력하세요"
          x-model="form.title"
          @keydown.enter.prevent
        >
      </div>
      <div class="form-field">
        <label for="noticeContent">내용</label>
        <textarea
          id="noticeContent"
          class="form-textarea"
          placeholder="공지 내용을 입력하세요"
          x-model="form.content"
        ></textarea>
      </div>
      <div class="form-actions">
        <button
          class="btn-submit"
          :disabled="submitting || !form.title.trim() || !form.content.trim()"
          @click="submit()"
          x-text="submitting ? '등록 중...' : '공지 등록'"
        ></button>
      </div>
    </div>

    <!-- 공지 목록 -->
    <div class="section-title">
      공지 목록 <span style="font-size:13px;font-weight:400;color:#64748b" x-text="`(${notices.length}개)`"></span>
    </div>

    <div class="loading" x-show="loading">
      <div class="spinner"></div> 공지 목록을 불러오는 중...
    </div>

    <template x-if="!loading && notices.length === 0">
      <div class="empty-state">등록된 공지사항이 없습니다.</div>
    </template>

    <div class="notices-list" x-show="!loading && notices.length > 0">
      <template x-for="notice in notices" :key="notice.id">
        <div class="notice-card">
          <div class="notice-header">
            <div>
              <div class="notice-title" x-text="notice.title"></div>
            </div>
            <div class="notice-meta" x-text="notice.created_at"></div>
          </div>
          <div class="notice-content" :class="{ expanded: notice._expanded }" x-text="notice.content">
            <div class="notice-content-fade" x-show="!notice._expanded"></div>
          </div>
          <div class="notice-footer">
            <button class="btn-expand" @click="notice._expanded = !notice._expanded" x-text="notice._expanded ? '접기' : '더 보기'"></button>
            <div class="notice-actions">
              <button
                class="btn-action danger"
                :disabled="deleteLoading === notice.id"
                @click="confirmDelete(notice)"
                x-text="deleteLoading === notice.id ? '삭제 중...' : '삭제'"
              ></button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </main>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-backdrop" x-show="deleteTarget" x-cloak @click.self="deleteTarget = null">
  <div class="modal">
    <div class="modal-title">공지 삭제</div>
    <div class="modal-body" x-text="`'${deleteTarget?.title}' 공지를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`"></div>
    <div class="modal-actions">
      <button class="btn-cancel" @click="deleteTarget = null">취소</button>
      <button class="btn-delete" :disabled="deleteLoading !== null" @click="doDelete()" x-text="deleteLoading !== null ? '삭제 중...' : '삭제'"></button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
function noticeManager() {
  return {
    loading: true,
    notices: [],
    form: { title: '', content: '' },
    submitting: false,
    deleteTarget: null,
    deleteLoading: null,

    async init() {
      await this.load();
    },

    async load() {
      this.loading = true;
      try {
        const res = await fetch('/admin/api/notices');
        if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
        if (!res.ok) throw new Error('서버 오류');
        const data = await res.json();
        this.notices = (data.notices || []).map(n => ({ ...n, _expanded: false }));
      } catch (e) {
        showToast(e.message || '공지 목록 로드에 실패했습니다.', 'error');
      } finally {
        this.loading = false;
      }
    },

    async submit() {
      if (!this.form.title.trim() || !this.form.content.trim()) return;
      this.submitting = true;
      try {
        const res = await fetch('/admin/api/notices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: this.form.title.trim(), content: this.form.content.trim() })
        });
        if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
        if (!res.ok) throw new Error('등록 실패');
        this.form = { title: '', content: '' };
        showToast('공지가 등록되었습니다.', 'success');
        await this.load();
      } catch (e) {
        showToast(e.message || '공지 등록에 실패했습니다.', 'error');
      } finally {
        this.submitting = false;
      }
    },

    confirmDelete(notice) {
      this.deleteTarget = notice;
    },

    async doDelete() {
      if (!this.deleteTarget) return;
      this.deleteLoading = this.deleteTarget.id;
      try {
        const res = await fetch(`/admin/api/notices/${this.deleteTarget.id}`, { method: 'DELETE' });
        if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
        if (!res.ok) throw new Error('삭제 실패');
        this.notices = this.notices.filter(n => n.id !== this.deleteTarget.id);
        showToast(`'${this.deleteTarget.title}' 공지를 삭제했습니다.`, 'success');
        this.deleteTarget = null;
      } catch (e) {
        showToast(e.message || '삭제에 실패했습니다.', 'error');
      } finally {
        this.deleteLoading = null;
      }
    },

    async logout() {
      try { await fetch('/auth/logout', { method: 'POST' }); } catch {}
      window.location.href = '/login';
    }
  };
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
</body>
</html>
