<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Frindle Tools</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<meta property="og:type" content="website">
<meta property="og:title" content="Frindle Tools — 미국 주식 시장 분석">
<meta property="og:description" content="시장 체제 실시간 판단 · Smart Money 스크리닝 · AI 분석. 회원가입 후 이용하실 수 있습니다.">
<meta property="og:url" content="https://edu.frindle.synology.me">
<meta property="og:image" content="https://edu.frindle.synology.me/images/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://edu.frindle.synology.me/images/og-image.png">
<meta name="description" content="시장 체제 실시간 판단 · Smart Money 스크리닝 · AI 분석. 회원가입 후 이용하실 수 있습니다.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#0a0a0f;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#12121a;border:1px solid #1e1e2e;border-radius:16px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{text-align:center;margin-bottom:32px}
.logo-text{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:#6366f1}
.logo-sub{font-size:12px;color:#64748b;margin-top:4px;letter-spacing:0.5px}
h2{font-size:20px;font-weight:700;margin-bottom:24px;color:#f1f5f9}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
input{width:100%;background:#1a1a28;border:1px solid #2d2d44;border-radius:8px;padding:12px 14px;font-size:15px;color:#f1f5f9;outline:none;transition:border-color .2s}
input:focus{border-color:#6366f1}
input::placeholder{color:#4a5568}
.btn{width:100%;background:#6366f1;color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s}
.btn:hover{background:#4f46e5}
.btn:disabled{background:#2d2d44;cursor:not-allowed;color:#64748b}
.msg{font-size:13px;padding:10px 14px;border-radius:6px;margin-top:12px;display:none;line-height:1.7}
.msg.err{background:#2d1a1a;border:1px solid #7f1d1d;color:#fca5a5}
.msg.ok{background:#1a2d1a;border:1px solid #14532d;color:#86efac}
.msg a{color:#fbbf24;font-weight:600;text-decoration:underline}
.links{margin-top:24px;text-align:center;font-size:13px;color:#64748b}
.links a{color:#6366f1;text-decoration:none}
.links a:hover{text-decoration:underline}
.divider{border-top:1px solid #1e1e2e;margin:20px 0}
.or{text-align:center;font-size:12px;color:#4a5568;margin:16px 0;position:relative}
.or::before,.or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#1e1e2e}
.or::before{left:0}.or::after{right:0}
.btn-google{width:100%;background:#1a1a28;color:#e2e8f0;border:1px solid #2d2d44;border-radius:8px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s;text-decoration:none}
.btn-google:hover{border-color:#6366f1}
.btn-google svg{flex-shrink:0}
.notice-box{background:#13132a;border:1px solid #2d2d44;border-radius:8px;padding:12px 14px;margin-top:10px;font-size:12px;color:#64748b;line-height:1.7}
.notice-box strong{color:#94a3b8;display:block;margin-bottom:4px}
.notice-box a{color:#6366f1;text-decoration:none}
.notice-box a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text"><span>Frindle</span> Tools</div>
  </div>
  <h2>로그인</h2>
  <form id="loginForm">
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="example@email.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호 입력" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="submitBtn">로그인</button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="or">또는</div>
  <a href="/auth/google/login" class="btn-google">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Google 계정으로 로그인
  </a>
  <div class="notice-box">
    <strong>구글 로그인 안내</strong>
    구글 로그인은 <strong style="color:#e2e8f0">이메일·비밀번호로 먼저 회원가입</strong>을 완료한 계정에서만 사용할 수 있습니다.<br>
    아직 가입하지 않으셨다면 → <a href="/register">회원가입 하러 가기</a>
  </div>
  <div class="divider"></div>
  <div class="links">
    아직 회원이 아니신가요? <a href="/register">회원가입</a>
  </div>
</div>

<script>
// URL 파라미터 에러 처리
const urlParams = new URLSearchParams(window.location.search);
const urlError = urlParams.get('error');
if (urlError) {
  const msg = document.getElementById('msg');
  const htmlMessages = {
    'google_not_registered': '구글 계정으로 가입된 회원이 아닙니다.<br>먼저 <a href="/register">이메일로 회원가입</a>을 완료한 후 구글 로그인을 사용해 주세요.',
    'google_not_configured': 'Google 로그인을 사용하려면 먼저 <a href="/register">이메일로 회원가입</a>을 완료해 주세요.',
    'google_denied': 'Google 로그인이 취소됐습니다.',
    'inactive': '비활성화된 계정입니다. 관리자에게 문의해 주세요. (010-5350-8798)',
    'token_failed': 'Google 인증에 실패했습니다. 다시 시도해 주세요.',
    'invalid_state': '인증 요청이 만료됐습니다. 다시 시도해 주세요.',
  };
  msg.className = 'msg err';
  msg.innerHTML = htmlMessages[urlError] || '로그인에 실패했습니다.';
  msg.style.display = 'block';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = '로그인 중...';
  msg.style.display = 'none';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = 'msg ok';
      msg.textContent = `${data.name}님, 환영합니다. 이동 중...`;
      msg.style.display = 'block';
      setTimeout(() => { window.location.href = '/'; }, 800);
    } else {
      msg.className = 'msg err';
      msg.textContent = data.detail || '로그인에 실패했습니다.';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  } catch {
    msg.className = 'msg err';
    msg.textContent = '서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '로그인';
  }
});
</script>
</body>
</html>
