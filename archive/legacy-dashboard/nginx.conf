server {
    listen 80;
    root /usr/share/nginx/html;

    location = / {
        rewrite ^ /pages/terminal.html last;
    }

    location = /terminal {
        rewrite ^ /pages/terminal.html last;
    }

    location = /reports {
        rewrite ^ /pages/reports.html last;
    }

    location = /notice {
        rewrite ^ /pages/notice.html last;
    }

    location = /notice.html {
        rewrite ^ /pages/notice.html last;
    }

    location = /terminal.html {
        rewrite ^ /pages/terminal.html last;
    }

    location = /reports.html {
        rewrite ^ /pages/reports.html last;
    }

    location /pages/ {
        try_files $uri =404;
    }

    location /images/ {
        try_files $uri =404;
    }

    # Next.js로 나머지 모든 경로 프록시
    location / {
        proxy_pass http://192.168.1.11:8889;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
