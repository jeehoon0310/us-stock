name: Build & Deploy to Synology

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD-HHmm'}},enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Synology
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          username: ${{ secrets.SYNOLOGY_USERNAME }}
          key: ${{ secrets.SYNOLOGY_SSH_KEY }}
          port: ${{ secrets.SYNOLOGY_PORT }}
          script: |
            set -e
            GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | /usr/local/bin/docker login ghcr.io -u jeehoon0310 --password-stdin
            fi
            /usr/local/bin/docker pull ghcr.io/jeehoon0310/us-stock:latest
            mkdir -p /volume1/docker/us-stock/{data,output,reports,result,logs,ml-models}
            cd /volume1/docker/us-stock
            curl -sfL "https://raw.githubusercontent.com/jeehoon0310/us-stock/main/docker-compose.prod.yml" -o docker-compose.yml.new
            if ! diff -q docker-compose.yml docker-compose.yml.new > /dev/null 2>&1; then
              echo "docker-compose.yml updated from Git"
              mv docker-compose.yml.new docker-compose.yml
            else
              rm docker-compose.yml.new
              echo "docker-compose.yml unchanged"
            fi
            /usr/local/bin/docker compose down || true
            /usr/local/bin/docker compose up -d
            /usr/local/bin/docker image prune -f
            for i in $(seq 1 30); do
              curl -sf http://localhost:8889/ && echo " OK" && exit 0
              sleep 2
            done
            echo "Health check failed"
            /usr/local/bin/docker logs us-stock --tail=80
            exit 1
