<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:#1e1e2e;color:#cdd6f4}
#app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;height:100vh;background:#181825;border-right:1px solid #313244;color:#cdd6f4;display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:20px 16px 14px;border-bottom:1px solid #313244;background:linear-gradient(135deg,#1e1e2e 0%,#252537 100%)}
.sb-eyebrow{font-size:10px;font-weight:700;letter-spacing:1px;color:#585b70;text-transform:uppercase;margin-bottom:4px}
.sb-title{font-size:13px;font-weight:700;color:#cdd6f4;line-height:1.4}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#45475a;border-radius:2px}
.sb-sec{width:100%;text-align:left;padding:9px 16px;background:none;border:none;cursor:pointer;color:#6c7086;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
.sb-sec:hover,.sb-sec.active{background:rgba(137,180,250,0.08);color:#cdd6f4}
.sb-dot{width:8px;height:8px;border-radius:50%;border:2px solid;flex-shrink:0;transition:background .15s}
.sb-sec.active .sb-dot{background:currentColor}
.sb-num{font-size:10px;opacity:.5;min-width:14px}
.sb-name{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.sb-cnt{font-size:10px;opacity:.4}
.sb-footer{padding:12px 16px;border-top:1px solid #313244}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#585b70;margin-bottom:5px}
.prog-bar{height:3px;background:#313244;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#89b4fa,#cba6f7);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.kbd-hint{font-size:10px;color:#585b70;margin-top:7px;text-align:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.top-bar{height:52px;background:#181825;border-bottom:1px solid #313244;display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0;backdrop-filter:blur(8px)}
.sec-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.top-title{font-size:14px;font-weight:600;color:#cdd6f4;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-cnt{font-size:12px;color:#6c7086;white-space:nowrap}
.slide-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;align-items:flex-start;justify-content:center;padding:12px 16px;background:#1e1e2e}
.slide-area::-webkit-scrollbar{width:5px}
.slide-area::-webkit-scrollbar-thumb{background:#45475a;border-radius:3px}
.slide-card{width:100%;max-width:1100px;min-height:calc(100vh - 52px - 58px - 24px);padding:32px 48px;background:#2a2a3e;border-radius:12px;border:1px solid #313244;display:flex;flex-direction:column;gap:20px;animation:si .18s ease}
@keyframes si{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
.bot-nav{height:58px;background:rgba(24,24,37,.95);border-top:1px solid #313244;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;backdrop-filter:blur(8px)}
.nav-btn{padding:8px 18px;border-radius:7px;border:1px solid #45475a;background:#2a2a3e;cursor:pointer;font-size:13px;font-weight:600;color:#a6adc8;transition:all .15s}
.nav-btn:hover{background:#313244;color:#cdd6f4}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.pri{background:linear-gradient(135deg,#89b4fa 0%,#74c7ec 100%);color:#1e1e2e;border-color:transparent;box-shadow:0 2px 12px rgba(137,180,250,.35)}
.nav-btn.pri:hover{background:#b4d0fa}
.dots{display:flex;gap:4px;align-items:center}
.d{width:5px;height:5px;border-radius:50%;background:#45475a;transition:all .25s cubic-bezier(.4,0,.2,1)}
.d.on{width:16px;border-radius:3px}

/* ── SLIDE CONTENT ── */
.s-eye{font-size:0.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.s-title{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#cdd6f4 0%,#89b4fa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;line-height:1.25}
.s-sub{font-size:1.05rem;color:#a6adc8;margin-bottom:24px;line-height:1.5}
.s-div{height:1px;background:#313244;margin:22px 0}

.cover-wrap{text-align:center;padding:16px 0 8px}
.cover-main{font-size:38px;font-weight:800;line-height:1.2;margin-bottom:10px;color:#cdd6f4}
.cover-desc{font-size:18px;color:#6c7086;margin-bottom:28px}
.cover-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.cv-stat{text-align:center}
.cv-val{font-size:20px;font-weight:800}
.cv-key{font-size:10px;color:#585b70;text-transform:uppercase;letter-spacing:.5px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.icard{background:#1e1e2e;border:1px solid #313244;border-radius:8px;padding:14px}
.icard-t{font-size:12px;font-weight:700;color:#a6adc8;margin-bottom:7px}
.icard-b{font-size:0.93rem;color:#6c7086;line-height:1.75}

.tbl{width:100%;border-collapse:collapse;font-size:0.93rem}
.tbl th{padding:10px 14px;text-align:left;background:#181825;border-bottom:2px solid #313244;font-weight:700;color:#89b4fa}
.tbl td{padding:10px 14px;border-bottom:1px solid #313244;color:#a6adc8}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(137,180,250,0.04)}

.blist{list-style:none}
.blist li{padding:5px 0 5px 16px;position:relative;font-size:0.93rem;color:#a6adc8;line-height:1.5}
.blist li::before{content:"▸";position:absolute;left:0;color:#585b70}
.blist li strong{color:#cdd6f4}

/* code-wrapper */
.code-wrapper{background:#11111b;border:1px solid #313244;border-radius:8px;overflow:hidden;margin:10px 0}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #313244}
.lang-badge{font-size:11px;color:#585b70;font-weight:600;text-transform:uppercase}
.copy-btn{background:transparent;border:1px solid #45475a;border-radius:6px;padding:4px 10px;cursor:pointer;color:#6c7086;font-size:12px;transition:all .15s}
.copy-btn:hover{border-color:#89b4fa;color:#89b4fa}
pre{margin:0;padding:14px 18px;font-family:'JetBrains Mono',Menlo,Consolas,monospace;font-size:0.88rem;line-height:1.6;overflow-x:auto;color:#cdd6f4}
code{font-family:inherit;font-size:inherit;color:inherit}
.comment{color:#45475a}
.kw{color:#cba6f7}
.str{color:#a6e3a1}
.num{color:#fab387}

/* callout */
.callout{padding:12px 16px;border-radius:8px;margin:12px 0;border-left:4px solid;font-size:14px;color:#a6adc8;line-height:1.6}
.callout.tip{background:#1c3a2c;border-color:#a6e3a1;color:#a6e3a1}
.callout.warning{background:#2d2617;border-color:#f9e2af;color:#f9e2af}
.callout.danger{background:#2d1a1a;border-color:#f38ba8;color:#f38ba8}
.callout.note{background:#1e1e3a;border-color:#89b4fa;color:#89b4fa}
.callout strong{font-weight:700}

/* checklist */
.checklist{list-style:none}
.checklist li{padding:4px 0}
.checklist label{display:flex;align-items:center;gap:8px;font-size:14px;color:#a6adc8;cursor:pointer}
.checklist input[type=checkbox]{accent-color:#89b4fa;width:15px;height:15px;cursor:pointer}

.next-step-box{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px 20px;margin-top:16px}
.next-step-box h4{font-size:14px;font-weight:700;color:#89b4fa;margin-bottom:10px}
.arrow-next{margin-top:10px;font-size:14px;color:#a6adc8;font-weight:600}

.phase-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.phase-table th{padding:8px 12px;text-align:left;background:#181825;border-bottom:2px solid #313244;color:#89b4fa;font-weight:700}
.phase-table td{padding:8px 12px;border-bottom:1px solid #313244;color:#a6adc8}
.phase-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.badge-ps{background:#1c3a4a;color:#74c7ec}
.badge-wsl{background:#2a1e3a;color:#cba6f7}
.badge-both{background:#1c3a2c;color:#a6e3a1}

.sec-pip{width:8px;height:8px;border-radius:50%;background:#313244;flex-shrink:0;transition:background .2s}
.sec-pip.visited{background:#585b70}
.sec-pip.current{background:#f59e0b;transform:scale(1.3)}

.warn-box{background:#2d1a1a;border:1px solid #f38ba8;border-radius:8px;padding:12px 16px;margin:10px 0;font-size:13px;color:#f38ba8}
.info-box{background:#1e1e3a;border:1px solid #89b4fa;border-radius:8px;padding:12px 16px;margin:10px 0;font-size:13px;color:#89b4fa}
.success-box{background:#1c3a2c;border:1px solid #a6e3a1;border-radius:8px;padding:12px 16px;margin:10px 0;font-size:13px;color:#a6e3a1}

.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}
.diff-col{background:#1e1e2e;border:1px solid #313244;border-radius:8px;padding:12px}
.diff-col-h{font-size:12px;font-weight:700;margin-bottom:8px}
.diff-item{font-size:12px;color:#a6adc8;padding:3px 0;border-bottom:1px solid #313244;display:flex;justify-content:space-between;align-items:center}
.diff-item:last-child{border-bottom:none}
.diff-val{font-family:monospace;font-size:11px;color:#cdd6f4}
</style>
</head>

<strong style="color:#cdd6f4">Max 20x</strong> $200/월 — 팀/전문가<br>
<strong style="color:#cdd6f4">API</strong> 사용량 기반 ($6/일 평균)
</div>
</div>
</div>
<div class="warn-box"><strong>Windows 주의:</strong> Claude Code는 macOS에 최적화되어 있습니다. Windows에서는 반드시 WSL2 (Ubuntu) 환경에서 실행해야 합니다.</div>`},
{t:"WSL2에서 bun + Claude Code 설치",html:`
<div class="s-eye" style="color:#0891b2">SECTION 02</div>
<div class="s-title">WSL2 Ubuntu에서 Claude Code 설치</div>
<div class="s-sub">반드시 WSL2 Ubuntu 터미널에서 실행 — PowerShell 아님!</div>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">bash (Ubuntu WSL2)</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code><span class="comment"># Node.js 20 설치 (WSL2 내부)</span>
curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
sudo apt-get install -y nodejs

<span class="comment"># bun 설치</span>
curl -fsSL https://bun.sh/install | bash
source ~/.bashrc

<span class="comment"># Claude Code 설치</span>
bun install -g @anthropic-ai/claude-code

<span class="comment"># 버전 확인</span>
claude --version</code></pre>
</div>
<div class="callout danger"><strong>주의:</strong> Windows PowerShell에서 설치하면 작동하지 않습니다. 반드시 WSL2 Ubuntu 터미널에서 실행하세요.</div>
<div class="callout tip">WSL2 안의 파일은 Windows 탐색기에서 <code>\\wsl$\Ubuntu\home\{사용자명}\projects\us-stock</code> 경로로 접근할 수 있습니다.</div>`},
{t:"로그인 & 초기 설정",html:`
<div class="s-eye" style="color:#0891b2">SECTION 02</div>
<div class="s-title">로그인 & 초기 설정</div>
<div class="s-sub">WSL2 Ubuntu 터미널에서 최초 1회 실행</div>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">bash (Ubuntu WSL2)</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code><span class="comment"># 프로젝트 디렉토리 생성</span>
mkdir -p ~/projects/us-stock && cd ~/projects/us-stock

<span class="comment"># Claude Code 실행 → 브라우저 자동 열림 → Anthropic 계정 로그인</span>
claude

<span class="comment"># 로그인 완료 후 종료: Ctrl+C 또는 /exit</span></code></pre>
</div>
<div class="info-box"><strong>참고:</strong> WSL2에서 실행 시 Windows 기본 브라우저가 자동으로 열립니다. claude.ai 계정으로 로그인 후 터미널로 복귀합니다.</div>`},
{t:"Plan Mode 사용법",html:`
<div class="s-eye" style="color:#0891b2">SECTION 02</div>
<div class="s-title">Plan Mode 사용법</div>
<div class="s-sub">코드를 수정하지 않고 설계만 — 전체 구축 계획을 검토 후 승인</div>
<table class="tbl">
<tr><th>단축키 / 명령</th><th>기능</th></tr>
<tr><td><code>Shift + Tab</code></td><td><strong>Plan Mode 진입</strong> — 코드 수정 없이 설계만</td></tr>
<tr><td><code>/model opus</code></td><td>Opus로 전환 — 복잡한 설계·디버깅 시 사용</td></tr>
<tr><td><code>/model sonnet</code></td><td>Sonnet으로 전환 — 일반 구현 (기본)</td></tr>
<tr><td><code>/context</code></td><td>현재 토큰 사용량 확인 (비용 관리)</td></tr>
<tr><td><code>/compact</code></td><td>컨텍스트가 가득 찼을 때 요약 압축</td></tr>
<tr><td><code>/init</code></td><td>프로젝트에 맞는 CLAUDE.md 자동 생성</td></tr>
<tr><td><code>Esc</code></td><td>현재 작업 중단</td></tr>
<tr><td><code>Esc + Esc</code></td><td>이전 상태로 되돌리기 (Rewind)</td></tr>
<tr><td><code>y / n</code></td><td>파일 수정 권한 승인 / 거부</td></tr>
</table>
<div class="callout tip"><strong>모델 전략:</strong> 대부분의 Phase는 Sonnet(기본)으로 충분합니다. 오류가 반복되거나 아키텍처 설계가 필요할 때만 <code>/model opus</code>로 전환하세요.</div>`},
{t:"이 프롬프트로 구축 시작",html:`
<div class="s-eye" style="color:#0891b2">SECTION 02</div>
<div class="s-title">Plan Mode로 구축 시작</div>
<div class="s-sub">windows_v2.md 전체를 복사해 Plan Mode에 붙여넣기</div>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">bash (Ubuntu WSL2)</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code><span class="comment"># 1. 프로젝트 디렉토리로 이동</span>
cd ~/projects/us-stock

<span class="comment"># 2. Claude Code 실행</span>
claude

<span class="comment"># 3. Shift+Tab 눌러 Plan Mode 진입 → [PLAN MODE] 표시 확인</span>

<span class="comment"># 4. windows_v2.md 전체 내용 복사 → 붙여넣기 → Enter</span>

<span class="comment"># 5. Claude가 전체 구축 계획 작성 → 검토 후 승인 → Phase 0부터 자동 진행</span></code></pre>
</div>
<div class="next-step-box">
<h4>SECTION 02 완료 체크</h4>
<ul class="checklist">
<li><label><input type="checkbox" onchange="saveCheck(this)"> WSL2 Ubuntu에서 bun 설치 완료</label></li>
<li><label><input type="checkbox" onchange="saveCheck(this)"> claude --version 확인</label></li>
<li><label><input type="checkbox" onchange="saveCheck(this)"> Anthropic 계정 로그인 완료</label></li>
<li><label><input type="checkbox" onchange="saveCheck(this)"> Plan Mode (Shift+Tab) 진입 확인</label></li>
</ul>
<div class="arrow-next">다음: SECTION 03 → 프로젝트 구조 생성</div>
</div>`}
]},

const ALL = SEC.flatMap(s => s.slides.map((sl,i) => ({...sl, sec:s, secIdx:i, secLen:s.slides.length})))
let cur = 0

function render(idx) {
  cur = idx
  const sl = ALL[idx]
  const sec = sl.sec
  document.querySelectorAll('.sb-sec').forEach((el,i) => {
    el.classList.toggle('active', SEC[i].id === sec.id)
    el.style.color = SEC[i].id === sec.id ? sec.color : ''
  })
  const badge = document.getElementById('sec-badge')
  badge.textContent = `SECTION ${sec.num}`
  badge.style.background = sec.cl
  badge.style.color = sec.color
  document.getElementById('top-title').textContent = sl.t
  document.getElementById('top-cnt').textContent = `${sl.secIdx+1} / ${sl.secLen}`
  document.getElementById('slide-content').innerHTML = sl.html
  const pct = Math.round(((idx+1)/ALL.length)*100)
  document.getElementById('prog-txt').textContent = `${idx+1} / ${ALL.length}`
  document.getElementById('prog-pct').textContent = `${pct}%`
  document.getElementById('prog-fill').style.width = pct+'%'
  document.getElementById('prev-btn').disabled = idx === 0
  document.getElementById('next-btn').disabled = idx === ALL.length-1
  const dotsEl = document.getElementById('dots')
  dotsEl.innerHTML = ''
  const secSlides = SEC.find(s=>s.id===sec.id).slides
  secSlides.forEach((_,i) => {
    const d = document.createElement('div')
    d.className = 'd' + (i===sl.secIdx?' on':'')
    if(i===sl.secIdx) d.style.background = sec.color
    dotsEl.appendChild(d)
  })
  document.querySelector('.slide-area').scrollTop = 0
  try { localStorage.setItem('win-slide-sync', String(idx)) } catch(e) {}
  try {
    const visited = JSON.parse(localStorage.getItem('win-slide-visited') || '[]')
    if (!visited.includes(idx)) { visited.push(idx); localStorage.setItem('win-slide-visited', JSON.stringify(visited)) }
  } catch(e) {}
  updateSecProgress(idx)
  setTimeout(restoreChecks, 0)
}

function updateSecProgress(idx) {
  const row = document.getElementById('secProgressRow')
  if (!row) return
  let visited = []
  try { visited = JSON.parse(localStorage.getItem('win-slide-visited') || '[]') } catch(e) {}
  row.innerHTML = ''
  ALL.forEach((sl, i) => {
    const pip = document.createElement('div')
    pip.className = 'sec-pip' + (i === idx ? ' current' : visited.includes(i) ? ' visited' : '')
    if(i === idx) pip.style.background = '#f59e0b'
    else if(visited.includes(i)) pip.style.background = sl.sec.color
    row.appendChild(pip)
  })
}

function nav(dir) { const n = cur+dir; if(n>=0&&n<ALL.length) render(n) }
function jumpSec(id) { const idx=ALL.findIndex(s=>s.sec.id===id); if(idx>=0) render(idx) }

function copyCode(btn) {
  const code = btn.closest('.code-wrapper').querySelector('code').innerText
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '복사됨!'
    setTimeout(() => { btn.textContent = '복사' }, 2000)
  }).catch(() => {
    btn.textContent = '복사됨!'
    setTimeout(() => { btn.textContent = '복사' }, 2000)
  })
}

function saveCheck(cb) {
  try {
    const checks = JSON.parse(localStorage.getItem('win-checks')||'{}')
    checks[cb.parentElement.textContent.trim()] = cb.checked
    localStorage.setItem('win-checks', JSON.stringify(checks))
  } catch(e) {}
}

function restoreChecks() {
  try {
    const checks = JSON.parse(localStorage.getItem('win-checks')||'{}')
    document.querySelectorAll('.checklist input[type=checkbox]').forEach(cb => {
      const key = cb.parentElement.textContent.trim()
      if(checks[key]) cb.checked = true
    })
  } catch(e) {}
}

const nav2 = document.getElementById('sb-nav')
SEC.forEach(s => {
  const btn = document.createElement('button')
  btn.className = 'sb-sec'
  btn.onclick = () => jumpSec(s.id)
  btn.innerHTML = `<span class="sb-dot" style="border-color:${s.color}"></span><span class="sb-num">${s.num}</span><span class="sb-name">${s.title}</span><span class="sb-cnt">${s.slides.length}</span>`
  nav2.appendChild(btn)
})

document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();nav(-1)}
  else if(e.key>='1'&&e.key<='9'){e.preventDefault();jumpSec(parseInt(e.key))}
  else if(e.key==='0'){e.preventDefault();jumpSec(10)}
})

try {
  const saved = localStorage.getItem('win-slide-sync')
  render(saved!==null ? Math.min(parseInt(saved)||0, ALL.length-1) : 0)
} catch(e) { render(0) }
updateSecProgress(cur)
</script>
</body>
</html>
