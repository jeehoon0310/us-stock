{t:"기술 지표 3총사 — RSI·MACD·이동평균",html:`<div class="slide-inner">
  <div class="s-eye" style="color:#94a3b8">SECTION 4</div>
  <h2 class="s-title">RSI · MACD · 이동평균 — 차트 읽는 3가지 도구</h2>
  <p class="s-sub">Frindle Tools Technical 25% 팩터를 구성하는 핵심 지표</p>

  <div style="display:flex;flex-direction:column;gap:16px;margin:20px 0">
    <div class="icard" style="border-left:4px solid #dc2626">
      <div class="icard-label" style="color:#dc2626">RSI — 상대강도지수 (Relative Strength Index)</div>
      <div class="icard-title">0~100 범위 · 70 이상 과매수 · 30 이하 과매도</div>
      <div class="code-box" style="margin-top:8px">RSI = 100 - (100 / (1 + 평균상승 / 평균하락))
→ 14일 기준 사용. 70+ 매도 신호, 30- 매수 신호</div>
    </div>
    <div class="icard" style="border-left:3px solid #e2e8f0">
      <div class="icard-label" style="color:#0891b2">MACD — 이동평균 수렴·발산</div>
      <div class="icard-title">단기-장기 EMA 차이 · 시그널선 교차가 매매 신호</div>
      <div class="code-box" style="margin-top:8px">MACD   = EMA(12일) - EMA(26일)
Signal = EMA(MACD, 9일)
Histogram = MACD - Signal  ← 막대 그래프로 표시</div>
    </div>
    <div class="icard" style="border-left:3px solid #e2e8f0">
      <div class="icard-label" style="color:#059669">이동평균 (Moving Average)</div>
      <div class="icard-title">SMA50 · SMA200 · 골든크로스 / 데스크로스</div>
      <div class="code-box" style="margin-top:8px">SMA(n) = Σ(최근 n일 종가) / n
골든크로스: SMA50 > SMA200 → 강세 신호
데스크로스: SMA50 &lt; SMA200 → 약세 신호</div>
    </div>
  </div>

  <div class="hl" style="background:#f8fafc;border-left:3px solid #e2e8f0;padding:12px 16px;border-radius:8px">
    <strong style="color:#059669">Frindle Tools가 이 3가지를 Technical 25% 팩터로 사용</strong>

</div>`},

{t:"Part 6 — VaR: 최악의 경우 얼마나 잃나?",html:`
<span class="s-eye">SECTION 5</span>
<h2 class="s-title">Part 6 — VaR: 최악의 경우 얼마나 잃나?</h2>
<p class="s-sub">Value at Risk — 월가 은행도 매일 계산하는 리스크 지표</p>
<div class="icard" style="border-color:#3b82f6;margin-bottom:1em;"><div class="icard-t" style="color:#60a5fa;font-size:1.1em;">정의</div><div class="icard-b" style="font-size:1.05em;"><strong>"95% 확률로, 다음 1주(5거래일) 동안 최대 <span style="color:#f87171;">X%</span> 손실"</strong></div></div>
<div class="grid2">
  <div class="icard" style="border-color:#f87171;"><div class="icard-t" style="color:#f87171;">VaR (Value at Risk)</div><div class="icard-b"><ul class="blist"><li>하위 5% 수익률 = <strong style="color:#f87171;">-3.2%</strong></li><li>$100,000 포트폴리오 기준: <strong>-$3,210</strong></li><li>"100번 중 95번은 3.2% 안에서 방어됨"</li></ul></div></div>
  <div class="icard" style="border-color:#fb923c;"><div class="icard-t" style="color:#fb923c;">CVaR (Conditional VaR)</div><div class="icard-b"><ul class="blist"><li>VaR 초과 시 <strong>평균 손실</strong> = <strong style="color:#fb923c;">-4.6%</strong></li><li>$100,000 기준: <strong>-$4,550</strong></li><li>"나머지 5번에서 평균 이만큼 잃는다"</li></ul></div></div>
</div>
<div class="hl"><p>우산 비유 — "비 올 확률 5%(VaR) 그리고 실제 폭우면 얼마나 쏟아지나(CVaR)". 우산 한 개(VaR)만으론 부족, 폭우 대비(CVaR)까지 해야 한다.</p></div>
`},

{t:"왜 복붙이 실패하는가",html:`<div class="slide-inner">

    <strong>🧑‍💼 신입사원 비유:</strong> "최선을 다하세요"만으론 일을 못 합니다. <strong>회사 규칙, 담당 업무, 출력 형식</strong>을 알려줘야 움직입니다. AI도 같습니다.
  </div>
</div>`},

{t:"/clear 와 /compact",html:`<div class="slide-inner">
  <div class="s-eye">PROMPT ENGINEERING 03</div>
  <h2 class="s-title">/clear 와 /compact</h2>
  <p class="s-sub">AI가 삼천포로 빠지면 설득하지 말고 리셋하라</p>

  <div style="display:flex;gap:16px;margin:20px 0">
    <div style="flex:1;border:2px solid #cbd5e1;border-radius:10px;background:#f8fafc;padding:16px">
      <div style="font-size:32px;text-align:center;margin-bottom:8px">📋</div>
      <div style="font-family:monospace;font-size:18px;font-weight:700;color:#2563eb;text-align:center;margin-bottom:8px">/clear</div>
      <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:6px">책상 위 서류 다 치우기</div>
      <div style="font-size:12px;color:#475569;margin-bottom:10px">대화 전체를 완전히 초기화.<br>AI가 이전 내용을 전혀 모르는 상태로 리셋.</div>
      <div style="border-top:1px solid #e2e8f0;padding-top:10px">
        <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px">언제 쓰나</div>
        <div style="font-size:12px;color:#475569">✔ 완전히 다른 작업 시작할 때<br>✔ AI가 완전히 길을 잃었을 때<br>✔ 새 주제로 처음부터 시작할 때</div>
      </div>
    </div>

    <div style="flex:1;border:2px solid #cbd5e1;border-radius:10px;background:#f8fafc;padding:16px">
      <div style="font-size:32px;text-align:center;margin-bottom:8px">📄</div>
      <div style="font-family:monospace;font-size:18px;font-weight:700;color:#2563eb;text-align:center;margin-bottom:8px">/compact</div>
      <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:6px">두꺼운 회의록 → 1페이지 요약</div>
      <div style="font-size:12px;color:#475569;margin-bottom:10px">대화 내용을 압축해서 핵심만 남김.<br>맥락은 유지하면서 RAM을 비움.</div>
      <div style="border-top:1px solid #e2e8f0;padding-top:10px">
        <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px">언제 쓰나</div>
        <div style="font-size:12px;color:#475569">✔ 대화가 길어졌지만 흐름은 유지할 때<br>✔ 컨텍스트 경고가 떴을 때<br>✔ 같은 프로젝트를 계속 이어갈 때</div>
      </div>
    </div>
  </div>

  <div style="border:1.5px solid #e2e8f0;border-radius:8px;background:#f1f5f9;padding:12px;margin-top:4px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:24px">💡</div>
      <div>
        <div style="font-size:13px;font-weight:700;color:#1e293b">설득 vs 리셋</div>
        <div style="font-size:12px;color:#475569">AI가 틀린 방향으로 10개 답변을 했다면, 11번째 답변도 틀릴 가능성이 높습니다.<br><strong>설득에 시간 쓰지 말고 /clear 후 처음부터 정확한 지시를 주세요.</strong></div>
      </div>
    </div>
  </div>
</div>`},
{t:"CLAUDE.md = AI의 사규",html:`<div class="slide-inner">

{t:"Karpathy LLM Wiki",html:`<div class="slide-inner">
  <div class="s-eye">PROMPT ENGINEERING 06</div>

{t:"핵심 공식 레퍼런스",html:`<div class="slide-inner">
  <div class="s-eye" style="color:#64748b">APPENDIX</div>
  <h2 class="s-title">공식 모음 — 복습할 때 찾아보는 치트시트</h2>
  <p class="s-sub">강의에서 다룬 핵심 공식을 한 페이지에 정리</p>

  <table class="tbl" style="margin:20px 0;font-size:13px">
    <thead>
      <tr><th>지표</th><th>공식</th><th>해석 포인트</th></tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>RSI</strong></td>
        <td><code>100 - 100 / (1 + RS)</code><br><small>RS = 평균상승 / 평균하락</small></td>
        <td>70+ 과매수 · 30- 과매도</td>
      </tr>
      <tr>
        <td><strong>MACD</strong></td>
        <td><code>EMA(12) - EMA(26)</code><br><small>Signal = EMA(MACD, 9)</small></td>
        <td>Signal 상향 돌파 = 매수 신호</td>
      </tr>
      <tr>
        <td><strong>SMA (이동평균)</strong></td>
        <td><code>Σ(가격) / n</code></td>
        <td>SMA50 > SMA200 = 골든크로스</td>
      </tr>
      <tr>
        <td><strong>Sharpe Ratio</strong></td>
        <td><code>(수익률 - 무위험수익률) / 표준편차</code></td>
        <td>1.0 이상 양호 · 2.0 이상 우수</td>
      </tr>
      <tr>
        <td><strong>VaR 95%</strong></td>
        <td><code>하위 5번째 백분위 손실</code></td>
        <td>95% 확률로 이 손실 이내</td>
      </tr>
      <tr>
        <td><strong>CVaR</strong></td>
        <td><code>VaR 초과 손실들의 평균</code></td>
        <td>꼬리 위험(tail risk) 측정</td>
      </tr>
      <tr>
        <td><strong>Drawdown</strong></td>
        <td><code>(현재가 - 최고가) / 최고가</code></td>
        <td>고점 대비 낙폭 · MDD = 최대 낙폭</td>
      </tr>
    </tbody>
  </table>

  <div class="hl" style="background:#f8fafc;border-left:4px solid #64748b;padding:12px 16px;border-radius:8px">
    <strong style="color:#475569">us-stock regime 임계값</strong>: &lt;0.75 risk_on · 0.75~1.5 neutral · 1.5~2.25 risk_off · ≥2.25 crisis
  </div>
</div>`},

// ============================================================
// FLATTEN ALL SLIDES
// ============================================================
const ALL = SEC.flatMap(s => s.slides.map((sl,i) => ({...sl, sec:s, secIdx:i, secLen:s.slides.length})))
let cur = 0;

function render(idx) {
  cur = idx
  const sl = ALL[idx]
  const sec = sl.sec

  // sidebar
  document.querySelectorAll('.sb-sec').forEach((el,i) => {
    el.classList.toggle('active', SEC[i].id === sec.id)
    el.style.color = SEC[i].id === sec.id ? sec.color : ''
  })

  // top bar
  const badge = document.getElementById('sec-badge')
  badge.textContent = `SECTION ${sec.num}`
  badge.style.background = '#f1f5f9'
  badge.style.color = '#475569'
  document.getElementById('top-title').textContent = sl.t
  document.getElementById('top-cnt').textContent = `${sl.secIdx+1} / ${sl.secLen}`

  // slide content
  document.getElementById('slide-content').innerHTML = sl.html

  // progress
  const pct = Math.round(((idx+1)/ALL.length)*100)
  document.getElementById('prog-txt').textContent = `${idx+1} / ${ALL.length}`
  document.getElementById('prog-pct').textContent = `${pct}%`
  document.getElementById('prog-fill').style.width = pct+'%'

  // prev/next
  document.getElementById('prev-btn').disabled = idx === 0
  document.getElementById('next-btn').disabled = idx === ALL.length-1

  // dots (show section dots)
  const dotsEl = document.getElementById('dots')
  dotsEl.innerHTML = ''
  const secSlides = SEC.find(s=>s.id===sec.id).slides
  secSlides.forEach((_,i) => {
    const d = document.createElement('div')
    d.className = 'd' + (i===sl.secIdx?' on':'')
    if(i===sl.secIdx) d.style.background = sec.color
    dotsEl.appendChild(d)
  })

  // scroll slide area to top
  document.querySelector('.slide-area').scrollTop = 0

  // sync script window
  try { localStorage.setItem('slide-sync', String(idx)) } catch(e) {}

  // track visited slides
  try {
    const visited = JSON.parse(localStorage.getItem('slide-visited') || '[]')
    if (!visited.includes(idx)) { visited.push(idx); localStorage.setItem('slide-visited', JSON.stringify(visited)) }
  } catch(e) {}
  updateSecProgress(idx)
}

function updateSecProgress(idx) {
  const row = document.getElementById('secProgressRow')
  if (!row) return
  let visited = []
  try { visited = JSON.parse(localStorage.getItem('slide-visited') || '[]') } catch(e) {}
  row.innerHTML = ''
  ALL.forEach((_, i) => {
    const pip = document.createElement('div')
    pip.className = 'sec-pip' + (i === idx ? ' current' : visited.includes(i) ? ' visited' : '')
    row.appendChild(pip)
  })
}

function nav(dir) {
  const n = cur + dir
  if(n >= 0 && n < ALL.length) render(n)
}

function jumpSec(id) {
  const idx = ALL.findIndex(s => s.sec.id === id)
  if(idx >= 0) render(idx)
}

// build sidebar
const nav2 = document.getElementById('sb-nav')
SEC.forEach(s => {
  const btn = document.createElement('button')
  btn.className = 'sb-sec'
  btn.onclick = () => jumpSec(s.id)
  btn.innerHTML = `<span class="sb-dot" style="border-color:#94a3b8"></span><span class="sb-num">${s.num}</span><span class="sb-name">${s.title}</span><span class="sb-cnt">${s.slides.length}</span>`
  nav2.appendChild(btn)
})

// keyboard
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();nav(-1)}
  else if(e.key>='1'&&e.key<='7'){e.preventDefault();jumpSec(parseInt(e.key))}
})

// initialize: restore visited state and update progress pips
try {
  const saved = localStorage.getItem('slide-sync')
  const startIdx = saved !== null ? Math.min(parseInt(saved), ALL.length-1) : 0
  render(isNaN(startIdx) ? 0 : startIdx)
} catch(e) { render(0) }
updateSecProgress(cur)
</script>
