<!DOCTYPE html>
<html lang="ko">
<head>

<title>US Stock — Part 1~6 강의안 (Mac)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#1e1e2e;color:#cdd6f4}
#app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;height:100vh;background:#181825;border-right:1px solid #313244;display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:20px 16px 14px;border-bottom:1px solid #313244;background:linear-gradient(135deg,#1e1e2e 0%,#252537 100%)}
.sb-eyebrow{font-size:10px;font-weight:700;letter-spacing:1px;color:#585b70;text-transform:uppercase;margin-bottom:4px}
.sb-title{font-size:13px;font-weight:700;color:#cdd6f4;line-height:1.4}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#45475a;border-radius:2px}
.sb-sec{width:100%;text-align:left;padding:9px 16px;background:none;border:none;cursor:pointer;color:#6c7086;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
.sb-sec:hover,.sb-sec.active{background:#313244;color:#cdd6f4}
.sb-dot{width:8px;height:8px;border-radius:50%;border:2px solid;flex-shrink:0;transition:background .15s}
.sb-sec.active .sb-dot{background:currentColor}
.sb-num{font-size:10px;opacity:.4;min-width:14px}
.sb-name{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.sb-cnt{font-size:10px;opacity:.35}
.sb-footer{padding:12px 16px;border-top:1px solid #313244}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#585b70;margin-bottom:5px}
.prog-bar{height:3px;background:#313244;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#89b4fa,#cba6f7);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.kbd-hint{font-size:10px;color:#585b70;margin-top:7px;text-align:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.top-bar{height:52px;background:#181825;border-bottom:1px solid #313244;display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0;backdrop-filter:blur(8px)}
.sec-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.top-title{font-size:14px;font-weight:600;color:#cdd6f4;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-cnt{font-size:12px;color:#6c7086;white-space:nowrap}
.slide-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;align-items:flex-start;justify-content:center;padding:12px 16px;background:#1e1e2e}
.slide-area::-webkit-scrollbar{width:5px}
.slide-area::-webkit-scrollbar-thumb{background:#45475a;border-radius:3px}
.slide-card{overflow:hidden;width:100%;max-width:1200px;min-height:calc(100vh - 52px - 58px - 24px);padding:36px 52px;background:linear-gradient(145deg,#2a2a3e 0%,#252537 100%);border-radius:14px;box-shadow:0 4px 32px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.04) inset;display:flex;flex-direction:column;gap:22px;animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
.bot-nav{height:58px;background:rgba(24,24,37,.95);border-top:1px solid #313244;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;backdrop-filter:blur(8px)}
.nav-btn{padding:8px 20px;border-radius:8px;border:1px solid #45475a;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#cdd6f4;transition:all .2s cubic-bezier(.4,0,.2,1)}
.nav-btn:hover{background:#313244;border-color:#585b70;transform:translateY(-1px)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.pri{background:linear-gradient(135deg,#89b4fa 0%,#74c7ec 100%);color:#1e1e2e;border-color:transparent;box-shadow:0 2px 12px rgba(137,180,250,.35)}
.nav-btn.pri:hover{background:#74c7ec;border-color:#74c7ec}
.dots{display:flex;gap:4px;align-items:center}
.d{width:5px;height:5px;border-radius:50%;background:#45475a;transition:all .25s cubic-bezier(.4,0,.2,1)}
.d.on{width:16px;border-radius:3px}

/* PROGRESS PIPS */
.sec-pip{width:8px;height:8px;border-radius:50%;background:#313244;transition:all .2s;flex-shrink:0;cursor:pointer}
.sec-pip.current{background:#f59e0b!important;transform:scale(1.3)}
.sec-pip.visited{opacity:.7}

/* SLIDE CONTENT */
.s-eye{font-size:.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.s-title{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#cdd6f4 0%,#89b4fa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;line-height:1.25}
.s-sub{font-size:1.05rem;color:#a6adc8;margin-bottom:24px;line-height:1.5}

.tbl{width:100%;border-collapse:collapse;font-size:.93rem}
.tbl th{padding:11px 14px;text-align:left;background:linear-gradient(135deg,#313244,#2e2e42);border-bottom:2px solid #89b4fa;font-weight:700;color:#cdd6f4}
.tbl td{padding:10px 14px;border-bottom:1px solid #313244;color:#a6adc8}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#313244}
.tbl code{background:#1e1e2e;padding:1px 5px;border-radius:3px;font-size:.85em;color:#89b4fa}

.code-wrapper{margin:12px 0;border-radius:8px;overflow-y:hidden;border:1px solid #313244}
.code-header{display:flex;justify-content:space-between;align-items:center;background:#11111b;padding:6px 12px}
.lang-badge{font-size:11px;font-weight:700;color:#6c7086;text-transform:uppercase}
.copy-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid #45475a;background:transparent;color:#6c7086;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:#313244;color:#cdd6f4}
pre{margin:0;overflow-x:auto}
pre code{display:block;padding:14px 18px;background:#11111b;color:#cdd6f4;font-family:'JetBrains Mono',Menlo,monospace;font-size:.88rem;line-height:1.6;white-space:pre}

.callout{padding:13px 16px;border-radius:8px;margin:12px 0;font-size:.93rem;line-height:1.6;border-left:4px solid;backdrop-filter:blur(4px)}
.callout.tip{background:#1c3a2c;border-color:#a6e3a1;color:#a6e3a1}
.callout.warning{background:#2d2617;border-color:#f9e2af;color:#f9e2af}
.callout.danger{background:#2d1a1a;border-color:#f38ba8;color:#f38ba8}
.callout.note{background:#1e1e3a;border-color:#89b4fa;color:#89b4fa}
.callout strong{font-weight:700}

.next-step-box{background:linear-gradient(135deg,#1e293b,#1a2535);border:1px solid #334155;border-radius:12px;padding:18px 22px;margin-top:22px;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.next-step-box h4{color:#94a3b8;font-size:13px;margin-bottom:10px}
.checklist{list-style:none;display:flex;flex-direction:column;gap:6px}
.checklist li label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.93rem;color:#a6adc8}
.checklist input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#89b4fa}
.arrow-next{margin-top:12px;font-size:.93rem;font-weight:600;color:#89b4fa}

details.faq{margin:12px 0;border:1px solid #313244;border-radius:8px;overflow:hidden}
details.faq summary{padding:10px 14px;cursor:pointer;font-size:.93rem;font-weight:600;color:#a6adc8;list-style:none;background:#313244}
details.faq summary::-webkit-details-marker{display:none}
details.faq > div{padding:12px 14px;font-size:.88rem;color:#6c7086;background:#2a2a3e;line-height:1.6}
details.faq code{background:#11111b;padding:1px 6px;border-radius:3px;color:#89b4fa}

.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:8px}
.phase-card{background:#313244;border-radius:8px;padding:14px 16px;border-left:4px solid}
.phase-card .ph-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;opacity:.7}
.phase-card .ph-title{font-size:14px;font-weight:700;color:#cdd6f4;margin-bottom:4px}
.phase-card .ph-desc{font-size:.85rem;color:#6c7086;line-height:1.5}

/* ── PDF mode ── */
#pdf-mode{display:none}
.pdf-slide{page-break-after:always;break-after:page;max-width:100%!important;animation:none!important;box-shadow:none!important}
.pdf-slide:last-child{page-break-after:auto;break-after:auto}
@media print{@page{margin:8mm}#app{display:none!important}#pdf-mode{display:block!important}}
</style>
</head>

<h2 class="s-title">Mac 환경 요건 확인</h2>
<p class="s-sub">macOS 13+ / Python 3.13 / Node.js 20 LTS / Homebrew</p>
<div class="code-wrapper">

source ~/.zshrc

source ~/.zshrc

node --version         # v20.x.x

<h2 class="s-title">Claude Code 설치 (bun 방식)</h2>
<p class="s-sub">bun은 npm보다 빠른 JavaScript 런타임 — Claude Code 권장 설치 방법</p>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">bash</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code># Step 1: bun 설치
curl -fsSL https://bun.sh/install | bash
source ~/.zshrc

# bun 설치 확인
bun --version

# Step 2: Claude Code 설치
npm install -g @anthropic-ai/claude-code

# Step 3: 버전 확인
claude --version</code></pre>
</div>
<details class="faq">
<summary>❓ bun: command not found 오류가 뜨면?</summary>
<div><code>source ~/.zshrc</code>를 실행하거나 터미널을 새로 여세요. 그래도 안 되면 <code>export PATH="$HOME/.bun/bin:$PATH"</code>를 ~/.zshrc에 추가하세요.</div>
</details>
<details class="faq">
<summary>❓ npm install -g 권한 오류가 뜨면?</summary>

<div class="s-eye" style="color:#a6e3a1">SECTION 05</div>
<h2 class="s-title">SPY 추세 + Breadth + 금리차 + 신용 스프레드</h2>
<p class="s-sub">나머지 4개 센서 순서대로 구현</p>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">claude</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code>_trend_signal 메서드를 추가해줘. SPY Close 시계열을 입력받아서:
1. 현재가, 50일 SMA, 200일 SMA 계산
2. 200일 SMA의 20일 전 값과 비교하여 slope(기울기) 계산
3. 추세 분류:
   - 가격 > 50일선 AND 가격 > 200일선 AND slope > 0 → risk_on
   - 가격 > 200일선 (그 외) → neutral
   - 가격 < 200일선 AND slope < 0 → risk_off
   - 그 외 → neutral
4. 데이터가 200일 미만이면 neutral + data_insufficient=True 반환
반환값: trend_regime, spy_above_50, spy_above_200, sma200_slope</code></pre>
</div>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">claude</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code>_breadth_signal 메서드를 추가해줘. yfinance로 ^MMFI(NYSE 50일 MA 위 종목 비율)를 3개월치 가져와서:
- 70% 이상: risk_on
- 50~70%: neutral
- 30~50%: risk_off
- 30% 미만: crisis
데이터 수집 실패 시 {'breadth_pct': None, 'breadth_regime': 'neutral'} 반환.
logger.debug로 에러 로깅하되 시스템은 멈추지 않도록 해줘.</code></pre>
</div>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">claude</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code>_yield_curve_signal 메서드를 추가해줘. ^TNX(10년 국채 금리)에서 ^IRX(13주 T-bill 금리)를 빼서 스프레드 계산:
- 스프레드 > 0.5: risk_on (정상적 금리 구조)
- 0 < 스프레드 <= 0.5: neutral
- 스프레드 < 0: risk_off (역전, 경기침체 경고)
실패 시 neutral 반환. 값은 소수점 둘째자리까지 반올림.</code></pre>
</div>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">claude</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code>_credit_spread_signal 메서드를 추가해줘. HYG(하이일드 회사채 ETF) / IEF(7-10년 국채 ETF) 비율을 계산:
1. 비율의 20일 이동평균 계산
2. 현재 비율 vs 20일 평균 비교:
   - current > ma20 * 1.01: risk_on (위험 선호 증가)
   - ma20 * 0.99 ~ ma20 * 1.01: neutral
   - ma20 * 0.97 ~ ma20 * 0.99: risk_off
   - current < ma20 * 0.97: crisis
둘 다 최소 20일 이상 데이터 필요. 실패 시 neutral.</code></pre>
</div>

   - loss = (-delta.where(delta < 0, 0)).ewm(alpha=1/14, adjust=False).mean()
   - rs = gain / loss

1. MFI (Money Flow Index, 14일):
   - typical_price = (high + low + close) / 3

   - MFI = 100 - (100 / (1 + positive_flow / negative_flow))
2. OBV (On-Balance Volume): 상승일 거래량은 +, 하락일은 - 누적
3. Volume Ratio: 최근 5일 평균 거래량 / 최근 20일 평균 거래량

// ── state ──
const LS = 'lecture-mac-';
let si = 0, gi = 0;

function totalSlides(){return SEC.reduce((a,s)=>a+s.slides.length,0)}
function globalIdx(si,gi){
  let n=0;
  for(let i=0;i<si;i++) n+=SEC[i].slides.length;
  return n+gi;
}
function fromGlobal(g){
  let n=0;
  for(let i=0;i<SEC.length;i++){
    if(n+SEC[i].slides.length>g) return{si:i,gi:g-n};
    n+=SEC[i].slides.length;
  }
  return{si:SEC.length-1,gi:SEC[SEC.length-1].slides.length-1};
}

function saveCheck(el){
  const key=LS+'chk-'+si+'-'+gi+'-'+[...el.closest('.checklist').querySelectorAll('input')].indexOf(el);
  localStorage.setItem(key,el.checked?'1':'0');
}
function loadChecks(){
  document.querySelectorAll('.checklist input').forEach((el,i)=>{
    const key=LS+'chk-'+si+'-'+gi+'-'+i;
    el.checked=localStorage.getItem(key)==='1';
  });
}

function render(){
  const sec=SEC[si], slide=sec.slides[gi];
  // sidebar
  document.querySelectorAll('.sb-sec').forEach((el,i)=>{
    el.classList.toggle('active',i===si);
    el.style.color=i===si?sec.color:'';
    el.querySelector('.sb-dot').style.borderColor=SEC[i].color;
    if(i===si) el.querySelector('.sb-dot').style.background=sec.color;
    else el.querySelector('.sb-dot').style.background='';
  });
  // top bar
  const badge=document.getElementById('sec-badge');
  badge.textContent='SECTION '+sec.num;
  badge.style.background=sec.cl;
  badge.style.color=sec.color;
  badge.style.border='1px solid '+sec.color+'44';
  document.getElementById('top-title').textContent=slide.t;
  document.getElementById('top-cnt').textContent=(gi+1)+' / '+sec.slides.length;
  // slide content
  const card=document.getElementById('slide-content');
  card.style.borderTop='3px solid '+sec.color;
  card.innerHTML=slide.html;
  card.style.animation='none';
  card.offsetHeight;
  card.style.animation='';
  loadChecks();
  // dots (within section)
  const dots=document.getElementById('dots');
  dots.innerHTML=sec.slides.map((_,i)=>`<div class="d${i===gi?' on':''}" style="${i===gi?'background:'+sec.color:''}"></div>`).join('');
  // section progress pips
  const row=document.getElementById('secProgressRow');
  row.innerHTML=SEC.map((s,i)=>{
    const visited=localStorage.getItem(LS+'vis-'+i)==='1'||i===si;
    const cls='sec-pip'+(i===si?' current':(visited?' visited':''));
    const style=i===si?`background:${s.color}`:`background:${s.color}55`;
    return`<div class="${cls}" style="${style}" title="${s.title}" onclick="jumpSec(${i})"></div>`;
  }).join('');
  // buttons
  const g=globalIdx(si,gi);
  document.getElementById('prev-btn').disabled=g===0;
  document.getElementById('next-btn').disabled=g===totalSlides()-1;
  // progress bar
  const tot=totalSlides();
  const pct=Math.round((g+1)/tot*100);
  document.getElementById('prog-txt').textContent=(g+1)+'/'+tot;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  // mark visited
  localStorage.setItem(LS+'vis-'+si,'1');
  localStorage.setItem(LS+'pos',g);
  // scroll to top
  document.querySelector('.slide-area').scrollTop=0;
}

function nav(d){
  const g=globalIdx(si,gi)+d;
  if(g<0||g>=totalSlides()) return;
  const pos=fromGlobal(g);
  si=pos.si; gi=pos.gi;
  render();
}
function jumpSec(i){si=i;gi=0;render();}

function copyCode(btn){
  const code=btn.closest('.code-wrapper').querySelector('pre code').innerText;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='복사됨!';
    btn.style.color='#a6e3a1';
    setTimeout(()=>{btn.textContent='복사';btn.style.color='';},1500);
  });
}

// keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();nav(-1);}
  else if(e.key>='1'&&e.key<='9'){
    const i=parseInt(e.key)-1;
    if(i<SEC.length){jumpSec(i);}
  }
});

// build sidebar
(()=>{
  const nav=document.getElementById('sb-nav');
  SEC.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='sb-sec';
    btn.innerHTML=`<span class="sb-dot" style="border-color:${s.color}"></span><span class="sb-num">${s.num}</span><span class="sb-name">${s.title}</span><span class="sb-cnt">${s.slides.length}</span>`;
    btn.onclick=()=>jumpSec(i);
    nav.appendChild(btn);
  });
})();

// restore position
(()=>{
  const saved=parseInt(localStorage.getItem(LS+'pos')||'0');
  const pos=fromGlobal(Math.min(saved,totalSlides()-1));
  si=pos.si; gi=pos.gi;
  render();
})();
</script>
