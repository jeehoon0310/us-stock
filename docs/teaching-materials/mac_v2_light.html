<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>US Stock — Mac 완전 구축 가이드 (Light)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f9fafb;color:#18181b}
#app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;height:100vh;background:#fafafa;border-right:1px solid #e4e4e7;display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:20px 16px 14px;border-bottom:1px solid #e4e4e7;background:linear-gradient(135deg,#fafafa,#f4f4f5)}
.sb-eyebrow{font-size:10px;font-weight:700;letter-spacing:1px;color:#a1a1aa;text-transform:uppercase;margin-bottom:4px}
.sb-title{font-size:13px;font-weight:700;color:#18181b;line-height:1.4}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:2px}
.sb-sec{width:100%;text-align:left;padding:9px 16px;background:none;border:none;cursor:pointer;color:#71717a;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
.sb-sec:hover,.sb-sec.active{background:#f4f4f5;color:#18181b}
.sb-dot{width:8px;height:8px;border-radius:50%;border:2px solid;flex-shrink:0;transition:background .15s}
.sb-sec.active .sb-dot{background:currentColor}
.sb-num{font-size:10px;opacity:.4;min-width:14px}
.sb-name{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.sb-cnt{font-size:10px;opacity:.35}
.sb-footer{padding:12px 16px;border-top:1px solid #e4e4e7}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#a1a1aa;margin-bottom:5px}
.prog-bar{height:3px;background:#e4e4e7;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.kbd-hint{font-size:10px;color:#a1a1aa;margin-top:7px;text-align:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.top-bar{height:52px;background:#ffffff;border-bottom:1px solid #e4e4e7;display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0}
.sec-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.top-title{font-size:14px;font-weight:600;color:#18181b;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-cnt{font-size:12px;color:#71717a;white-space:nowrap}
.slide-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;align-items:flex-start;justify-content:center;padding:12px 16px;background:#f9fafb}
.slide-area::-webkit-scrollbar{width:5px}
.slide-area::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:3px}
.slide-card{overflow:hidden;width:100%;max-width:1200px;min-height:calc(100vh - 52px - 58px - 24px);padding:32px 48px;background:#ffffff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:20px;animation:si .18s ease}
@keyframes si{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
.bot-nav{height:58px;background:#ffffff;border-top:1px solid #e4e4e7;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.nav-btn{padding:8px 18px;border-radius:7px;border:1px solid #d4d4d8;background:#ffffff;cursor:pointer;font-size:13px;font-weight:600;color:#374151;transition:all .15s}
.nav-btn:hover{background:#f4f4f5}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.pri{background:linear-gradient(135deg,#2563eb 0%,#3b82f6 100%);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(37,99,235,.3)}
.nav-btn.pri:hover{background:#1d4ed8;border-color:#1d4ed8}
.dots{display:flex;gap:4px;align-items:center}
.d{width:5px;height:5px;border-radius:50%;background:#d4d4d8;transition:all .2s}
.d.on{width:16px;border-radius:3px}

/* PROGRESS PIPS */
.sec-pip{width:8px;height:8px;border-radius:50%;background:#e4e4e7;transition:all .2s;flex-shrink:0;cursor:pointer}
.sec-pip.current{background:#f59e0b!important;transform:scale(1.3)}
.sec-pip.visited{opacity:.7}

/* SLIDE CONTENT */
.s-eye{font-size:.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.s-title{font-size:2rem;font-weight:800;color:#18181b;margin-bottom:4px;line-height:1.25}
.s-sub{font-size:1.05rem;color:#374151;margin-bottom:24px;line-height:1.5}

.tbl{width:100%;border-collapse:collapse;font-size:.93rem}
.tbl th{padding:10px 14px;text-align:left;background:#f4f4f5;border-bottom:2px solid #d4d4d8;font-weight:700;color:#18181b}
.tbl td{padding:10px 14px;border-bottom:1px solid #f4f4f5;color:#374151}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.tbl code{background:#1e293b;color:#e2e8f0;padding:1px 5px;border-radius:3px;font-size:.85em}

.code-wrapper{margin:12px 0;border-radius:8px;overflow-y:hidden;border:1px solid #e4e4e7}
.code-header{display:flex;justify-content:space-between;align-items:center;background:#1e293b;padding:6px 12px}
.lang-badge{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase}
.copy-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
pre{margin:0;overflow-x:auto}
pre code{display:block;padding:14px 18px;background:#1e293b;color:#e2e8f0;font-family:'JetBrains Mono',Menlo,monospace;font-size:.88rem;line-height:1.6;white-space:pre}

.callout{padding:13px 16px;border-radius:8px;margin:12px 0;font-size:.93rem;line-height:1.6;border-left:4px solid}
.callout.tip{background:#f0fdf4;border-color:#16a34a;color:#15803d}
.callout.warning{background:#fffbeb;border-color:#d97706;color:#92400e}
.callout.danger{background:#fef2f2;border-color:#dc2626;color:#991b1b}
.callout.note{background:#eff6ff;border-color:#2563eb;color:#1d4ed8}
.callout strong{font-weight:700}

.next-step-box{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border:1px solid #e2e8f0;border-radius:12px;padding:18px 22px;margin-top:22px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.next-step-box h4{color:#64748b;font-size:13px;margin-bottom:10px}
.checklist{list-style:none;display:flex;flex-direction:column;gap:6px}
.checklist li label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.93rem;color:#374151}
.checklist input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#2563eb}
.arrow-next{margin-top:12px;font-size:.93rem;font-weight:600;color:#2563eb}

details.faq{margin:12px 0;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden}
details.faq summary{padding:10px 14px;cursor:pointer;font-size:.93rem;font-weight:600;color:#374151;list-style:none;background:#f4f4f5}
details.faq summary::-webkit-details-marker{display:none}
details.faq > div{padding:12px 14px;font-size:.88rem;color:#6b7280;background:#ffffff;line-height:1.6}
details.faq code{background:#1e293b;color:#e2e8f0;padding:1px 6px;border-radius:3px}

.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:8px}
.phase-card{background:#f4f4f5;border-radius:8px;padding:14px 16px;border-left:4px solid}
.phase-card .ph-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;opacity:.6;color:#374151}
.phase-card .ph-title{font-size:14px;font-weight:700;color:#18181b;margin-bottom:4px}
.phase-card .ph-desc{font-size:.85rem;color:#6b7280;line-height:1.5}
</style>
</head>

<script>
const SEC = [
  {id:1, num:"01", title:"시작 전 준비", sub:"API 키 발급 & 환경 요건", color:"#7c3aed", cl:"#f5f3ff", slides:[
    {t:"us-stock 시스템 개요", html:`

    {t:"Mac 환경 요건 확인", html:`
<div class="s-eye" style="color:#7c3aed">SECTION 01</div>
<h2 class="s-title">Mac 환경 요건 확인</h2>
<p class="s-sub">macOS 13+ / Python 3.13 / Node.js 20 LTS / Homebrew</p>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">bash</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code># Homebrew 설치 (없는 경우)
/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

# Apple Silicon Mac — PATH 등록
echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> ~/.zshrc
source ~/.zshrc

# Python 3.13 설치
brew install python@3.13
echo 'export PATH="/opt/homebrew/opt/python@3.13/bin:$PATH"' >> ~/.zshrc
source ~/.zshrc

# Node.js 20 LTS 설치
brew install node@20
echo 'export PATH="/opt/homebrew/opt/node@20/bin:$PATH"' >> ~/.zshrc
source ~/.zshrc

# 버전 확인
python3.13 --version   # Python 3.13.x
node --version         # v20.x.x
npm --version          # 10.x.x</code></pre>
</div>
<div class="callout warning">⚠️ <strong>주의:</strong> <code>python3.13</code> 명시 필수. <code>python3</code>만 입력하면 macOS 기본 3.9가 사용될 수 있습니다.</div>
`},

  {id:2, num:"02", title:"Claude Code 설치", sub:"bun으로 설치 & Plan Mode 활성화", color:"#2563eb", cl:"#eff6ff", slides:[
    {t:"Claude Code란?", html:`

    {t:"bun으로 설치", html:`
<div class="s-eye" style="color:#2563eb">SECTION 02</div>
<h2 class="s-title">Claude Code 설치 (bun 방식)</h2>
<p class="s-sub">bun은 npm 대비 빠른 JavaScript 런타임 — Claude Code 권장 설치 방법</p>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">bash</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code># Step 1: bun 설치
curl -fsSL https://bun.sh/install | bash
source ~/.zshrc

# bun 설치 확인
bun --version

# Step 2: Claude Code 설치
npm install -g @anthropic-ai/claude-code

# Step 3: 버전 확인
claude --version</code></pre>
</div>
<details class="faq">
<summary>❓ bun: command not found 오류가 뜨면?</summary>
<div><code>source ~/.zshrc</code>를 실행하거나 터미널을 새로 여세요. 그래도 안 되면 <code>export PATH="$HOME/.bun/bin:$PATH"</code>를 ~/.zshrc에 추가하세요.</div>
</details>
<details class="faq">
<summary>❓ npm install -g 권한 오류가 뜨면?</summary>

</details>
`},
    {t:"로그인", html:`
<div class="s-eye" style="color:#2563eb">SECTION 02</div>
<h2 class="s-title">Claude Code 로그인</h2>
<p class="s-sub">claude.ai 계정으로 로그인 — 브라우저 인증 자동 열림</p>
<div class="code-wrapper">

    {t:"fetch_sp500_list.py 명세", html:`
<div class="s-eye" style="color:#0891b2">SECTION 04</div>
<h2 class="s-title">fetch_sp500_list.py 명세</h2>
<p class="s-sub">Wikipedia에서 S&P500 종목 목록 수집 — Symbol 형식 변환 필수</p>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">python</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code>import pandas as pd

def fetch_sp500_list() -> pd.DataFrame:
    url = "https://en.wikipedia.org/wiki/List_of_S%26P_500_companies"
    tables = pd.read_html(url)
    df = tables[0]
    # BRK.B → BRK-B (yfinance 형식)
    df['Symbol'] = df['Symbol'].str.replace('.', '-', regex=False)
    return df

def validate_sp500_list(df: pd.DataFrame) -> bool:
    assert len(df) >= 500, f"행수 부족: {len(df)}"
    assert df['GICS Sector'].nunique() >= 11, "섹터 11개 미만"
    assert not df['Symbol'].str.contains('.').any(), "Symbol에 . 포함"
    assert df['Symbol'].nunique() == len(df), "Symbol 중복"
    return True

# ⚠️ 주의: __main__ 가드 없음
# → 파이프라인이 내부 로직을 직접 import해서 사용</code></pre>
</div>
<div class="callout warning">⚠️ <strong>핵심 주의:</strong> fetch_sp500_list.py는 <code>if __name__ == "__main__"</code> 가드 없이 작성합니다. 파이프라인이 내부 로직을 직접 import합니다.</div>

    {t:"us_price_fetcher.py & macro_collector.py", html:`
<div class="s-eye" style="color:#0891b2">SECTION 04</div>
<h2 class="s-title">us_price_fetcher.py & macro_collector.py</h2>
<p class="s-sub">curl_cffi로 Yahoo Finance 봉쇄 우회 + FRED 거시경제 수집</p>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">python</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code>from curl_cffi import requests as cffi_requests
import yfinance as yf

class USPriceFetcher:
    MAX_RETRIES = 3

    def __init__(self):
        # impersonate="chrome" 가 핵심 — 없으면 429 Too Many Requests
        self.session = cffi_requests.Session(impersonate="chrome")

    def fetch_ohlcv(self, symbol: str, period: str = "1y") -> pd.DataFrame:
        """OHLCV 반환. 실패 시 빈 DataFrame (절대 crash 없음)"""
        for attempt in range(self.MAX_RETRIES):
            try:
                ticker = yf.Ticker(symbol, session=self.session)
                df = ticker.history(period=period)
                if not df.empty:
                    return df
            except Exception:
                time.sleep(2 ** attempt)  # 지수 백오프
        return pd.DataFrame()

# macro_collector.py VIX 임계값
VIX_BOUNDARIES = {"risk_on": 16, "neutral": 22, "risk_off": 30}
# 0~16: risk_on / 16~22: neutral / 22~30: risk_off / 30+: crisis</code></pre>
</div>
<div class="callout tip">💡 <strong>핵심:</strong> <code>Session(impersonate="chrome")</code>이 없으면 Yahoo Finance가 Rate Limit을 반환합니다. 모든 yfinance 세션에 적용하세요.</div>
`},
    {t:"fetch_sp500_prices.py — 병렬 배치 다운로드", html:`
<div class="s-eye" style="color:#0891b2">SECTION 04</div>
<h2 class="s-title">fetch_sp500_prices.py — 병렬 배치 다운로드</h2>
<p class="s-sub">503종목을 ThreadPoolExecutor로 병렬 다운로드 + 지수 백오프 재시도</p>
<div class="code-wrapper">
  <div class="code-header"><span class="lang-badge">python</span><button class="copy-btn" onclick="copyCode(this)">복사</button></div>
  <pre><code>from concurrent.futures import ThreadPoolExecutor
import time

MAX_WORKERS = 10
MAX_RETRIES = 3

def fetch_with_retry(fetcher, symbol, output_dir, period="1y", retries=0):
    try:
        df = fetcher.fetch_ohlcv(symbol, period)
        if not df.empty:
            df.to_csv(f"{output_dir}/{symbol}.csv")
            return True
    except Exception:
        pass
    if retries < MAX_RETRIES:
        time.sleep(2 ** retries)  # 지수 백오프
        return fetch_with_retry(fetcher, symbol, output_dir, period, retries+1)
    return False

# 병렬 실행
with ThreadPoolExecutor(max_workers=MAX_WORKERS) as executor:
    futures = [executor.submit(fetch_with_retry, fetcher, sym, output_dir)
               for sym in tickers]
    results = [f.result() for f in futures]

# 결과: data/sp500_prices/{symbol}.csv 저장</code></pre>
</div>

const ALL = SEC.flatMap(s => s.slides.map((sl,i) => ({...sl, sec:s, secIdx:i, secLen:s.slides.length})))
let cur = 0

function render(idx) {
  cur = idx
  const sl = ALL[idx]
  const sec = sl.sec
  document.querySelectorAll('.sb-sec').forEach((el,i) => {
    el.classList.toggle('active', SEC[i].id === sec.id)
    el.style.color = SEC[i].id === sec.id ? sec.color : ''
  })
  const badge = document.getElementById('sec-badge')
  badge.textContent = `SECTION ${sec.num}`
  badge.style.background = sec.cl
  badge.style.color = sec.color
  document.getElementById('top-title').textContent = sl.t
  document.getElementById('top-cnt').textContent = `${sl.secIdx+1} / ${sl.secLen}`
  document.getElementById('slide-content').innerHTML = sl.html
  const pct = Math.round(((idx+1)/ALL.length)*100)
  document.getElementById('prog-txt').textContent = `${idx+1} / ${ALL.length}`
  document.getElementById('prog-pct').textContent = `${pct}%`
  document.getElementById('prog-fill').style.width = pct+'%'
  document.getElementById('prev-btn').disabled = idx === 0
  document.getElementById('next-btn').disabled = idx === ALL.length-1
  const dotsEl = document.getElementById('dots')
  dotsEl.innerHTML = ''
  const secSlides = SEC.find(s=>s.id===sec.id).slides
  secSlides.forEach((_,i) => {
    const d = document.createElement('div')
    d.className = 'd' + (i===sl.secIdx?' on':'')
    if(i===sl.secIdx) d.style.background = sec.color
    dotsEl.appendChild(d)
  })
  document.querySelector('.slide-area').scrollTop = 0
  try { localStorage.setItem('mac-light-slide-sync', String(idx)) } catch(e) {}
  try {
    const visited = JSON.parse(localStorage.getItem('mac-light-slide-visited') || '[]')
    if (!visited.includes(idx)) { visited.push(idx); localStorage.setItem('mac-light-slide-visited', JSON.stringify(visited)) }
  } catch(e) {}
  updateSecProgress(idx)
  setTimeout(restoreChecks, 0)
}

function updateSecProgress(idx) {
  const row = document.getElementById('secProgressRow')
  if (!row) return
  let visited = []
  try { visited = JSON.parse(localStorage.getItem('mac-light-slide-visited') || '[]') } catch(e) {}
  row.innerHTML = ''
  ALL.forEach((sl, i) => {
    const pip = document.createElement('div')
    pip.className = 'sec-pip' + (i === idx ? ' current' : visited.includes(i) ? ' visited' : '')
    pip.title = sl.t
    pip.onclick = () => render(i)
    if(i === idx) pip.style.background = '#f59e0b'
    else if(visited.includes(i)) pip.style.background = sl.sec.color
    row.appendChild(pip)
  })
}

function nav(dir) { const n = cur+dir; if(n>=0&&n<ALL.length) render(n) }
function jumpSec(id) { const idx=ALL.findIndex(s=>s.sec.id===id); if(idx>=0) render(idx) }

function copyCode(btn) {
  const code = btn.closest('.code-wrapper').querySelector('code').innerText
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ 복사됨!'
    setTimeout(() => { btn.textContent = '복사' }, 2000)
  })
}

function saveCheck(cb) {
  try {
    const key = 'mac-light-checks'
    const checks = JSON.parse(localStorage.getItem(key)||'{}')
    checks[cb.parentElement.textContent.trim()] = cb.checked
    localStorage.setItem(key, JSON.stringify(checks))
  } catch(e) {}
}

function restoreChecks() {
  try {
    const checks = JSON.parse(localStorage.getItem('mac-light-checks')||'{}')
    document.querySelectorAll('.checklist input[type=checkbox]').forEach(cb => {
      const key = cb.parentElement.textContent.trim()
      if(checks[key]) cb.checked = true
    })
  } catch(e) {}
}

const nav2 = document.getElementById('sb-nav')
SEC.forEach(s => {
  const btn = document.createElement('button')
  btn.className = 'sb-sec'
  btn.onclick = () => jumpSec(s.id)
  btn.innerHTML = `<span class="sb-dot" style="border-color:${s.color}"></span><span class="sb-num">${s.num}</span><span class="sb-name">${s.title}</span><span class="sb-cnt">${s.slides.length}</span>`
  nav2.appendChild(btn)
})

document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();nav(-1)}
  else if(e.key>='1'&&e.key<='9'){e.preventDefault();jumpSec(parseInt(e.key))}
  else if(e.key==='0'){e.preventDefault();jumpSec(10)}
})

try {
  const saved = localStorage.getItem('mac-light-slide-sync')
  render(saved!==null ? Math.min(parseInt(saved)||0, ALL.length-1) : 0)
} catch(e) { render(0) }
</script>
