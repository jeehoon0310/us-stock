<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">/output-style — AI의 '인격'을 바꾸는 법</div>
<div class="s-sub">Claude의 시스템 프롬프트를 통째로 교체한다 — 단순 스킨이 아닌 근본적 행동 전환</div>
<div class="grid3">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">🚀 Default (기본)</div>
<div class="icard-b" style="font-size:12px">
작업 완수의 효율성 중심<br>
코드만 수정, 설명 최소화<br>
일상적 개발 사이클에 최적<br><br>
명령: /output-style default
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">📖 Explanatory (설명)</div>
<div class="icard-b" style="font-size:12px">
구현 근거·코드 패턴 심층 분석<br>
"왜 이렇게 했는가?" 전달<br>
아키텍처 리뷰·코드 리뷰 준비에 적합<br><br>
명령: /output-style explanatory
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">🎓 Learning (학습)</div>
<div class="icard-b" style="font-size:12px">
AI가 답 대신 단계별 가이드 제공<br>
TODO(human) 마커로 직접 완성 유도<br>
온보딩·핸즈온 워크숍에 최적<br><br>
명령: /output-style learning
</div>
</div>
</div>
<div class="code-box" style="margin-top:14px">
<span class="cc"># 전역 커스텀 스타일 설정</span><br>
<span class="cm">~/.claude/output-styles/senior-review-mode.md</span><br><br>
<span class="cc"># YAML 프론트매터 예시</span><br>
<span class="cm">---</span><br>
<span class="cm">name: senior-review-mode</span><br>
<span class="cm">description: 엄격한 시니어 리뷰어 모드</span><br>
<span class="cm">---</span><br>
<span class="cm">You are a strict senior reviewer.</span><br>
<span class="cm">Focus on architecture, tradeoffs, and production readiness.</span>
</div>
<div class="hl" style="border-color:#f59e0b;background:#fffbeb;margin-top:12px">
<p>⚠️ 주의: 커스텀 스타일은 기본 시스템 지침 전체를 교체한다. 파일 편집 권한(Coding Instructions)을 명시하지 않으면 Claude가 코드 수정 기능을 잃는다</p>
</div>`},

{t:"Skill — 모듈형 지능 주입",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">Skill — Claude에게 전문가 모듈을 주입한다</div>
<div class="s-sub">매번 같은 프롬프트 반복 금지 — Skill로 재사용 가능한 워크플로우를 자산화한다</div>
<div class="grid2">
<div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">📦 SKILL.md 구조</div>
<div class="icard-b">
<div class="code-box" style="font-size:11px">
<span class="cm">---</span><br>
<span class="cm">name: deploy-production</span><br>
<span class="cm">description: 프로덕션 배포 워크플로우</span><br>
<span class="cm">invoke: manual</span><br>
<span class="cm">allowed-tools: [Bash, Read, Write]</span><br>
<span class="cm">---</span><br><br>
<span class="cc"># 배포 워크플로우 지침...</span><br>
<span class="cm">1. 테스트 통과 확인</span><br>
<span class="cm">2. 빌드 실행</span><br>
<span class="cm">3. 헬스체크</span>
</div>
</div>
</div>
</div>
<div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">⚡ 실행 방식</div>
<div class="icard-b" style="font-size:12px">
수동 호출: /deploy production<br>
→ Claude가 SKILL.md 로드<br><br>
자동 호출: 대화 맥락 분석 후<br>Claude가 스스로 로드<br><br>
$ARGUMENTS: 입력값을 스킬 내부로 전달<br><br>
저장 위치:<br>
.claude/skills/ (프로젝트)<br>
~/.claude/skills/ (전역)
</div>
</div>
</div>
</div>
<ul class="blist" style="margin-top:12px">
<li>컨텍스트 오버헤드 감소 — 필요한 순간에만 동적 로드</li>
<li>조직 지식 캡처 — 사내 워크플로우·규칙을 코드화</li>
<li>반복 가능한 워크플로우 자동화</li>
<li>도구 권한 제어 — allowed-tools로 안전성 확보</li>
</ul>
<div class="hl" style="border-color:#4338ca;background:#eef2ff;margin-top:12px">
<p>비유: Skill은 레시피북이다 — Claude에게 '파스타 만들기' 레시피를 주면 매번 설명하지 않아도 동일한 품질로 요리한다</p>
</div>`},

{t:"서브에이전트 — 독립 컨텍스트",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">서브에이전트 — 독립 컨텍스트로 작업을 위임한다</div>
<div class="s-sub">Agent = Model + Instructions + Tools + Context — 메인 에이전트가 전문 에이전트에게 임무를 위임</div>
<div class="grid2">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">🧠 메인 에이전트 vs 서브에이전트</div>
<div class="icard-b" style="font-size:12px">
<strong>메인:</strong> 사용자와 대화, 전체 전략 수립, 지휘관 역할<br><br>
<strong>서브:</strong> 독립 컨텍스트 창에서 실행,<br>임무 완수 후 결과만 전달하고 소멸<br><br>
<strong>내장 3종:</strong><br>
· Explore (Haiku·빠른 탐색)<br>
· Plan (설계)<br>
· General-purpose (범용)
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">💾 메모리 스코프 3계층</div>
<div class="icard-b" style="font-size:12px">
<strong>User-level:</strong><br>
~/.claude/CLAUDE.md<br>
(모든 프로젝트에 적용)<br><br>
<strong>Project-level:</strong><br>
./CLAUDE.md<br>
(해당 프로젝트만)<br><br>
<strong>Local-level:</strong><br>
.claude/settings.local.json<br>
(git 미추적)
</div>
</div>
</div>
<ul class="blist" style="margin-top:12px">
<li>컨텍스트 격리: 각 서브에이전트 독립 메모리 → 정보 혼선 없음</li>
<li>병렬 실행: 여러 서브에이전트가 동시에 작업 → 속도 극대화</li>
<li>도구 권한 분리: 각 에이전트에 최소 권한만 부여</li>
</ul>
<div class="hl" style="border-color:#4338ca;background:#eef2ff;margin-top:12px">
<p>비유: 메인 에이전트는 팀장, 서브에이전트는 각 분야 전문 직원 — 팀장은 전략만, 직원은 실행만 담당</p>
</div>`},

{t:"에이전트 팀 — 수평적 협업",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">에이전트 팀 — 수평적 다중 에이전트 협업</div>
<div class="s-sub">한 명의 Claude가 아니라 여러 Claude가 역할 분담해서 동시에 작업한다</div>
<div class="grid2">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">👥 팀 구성 패턴</div>
<div class="icard-b" style="font-size:12px">
<strong>기획자(Planner):</strong> 요구사항 분석 → 설계 문서 작성<br><br>
<strong>구현자(Coder):</strong> 설계 기반 코드 작성 + 테스트<br><br>
<strong>악마의 대변인(Critic):</strong> 코드 품질 리뷰 + 보안 검토<br><br>
→ 3명이 순차+병렬로 작업<br>→ 혼자 할 때보다 빠르고 품질 높음
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">⚙️ 활성화 방법</div>
<div class="icard-b">
<div class="code-box" style="font-size:11px">
<span class="cc"># 환경 변수 설정</span><br>
<span class="cm">export CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1</span><br><br>
<span class="cc"># in-process: 같은 터미널에서 병렬 실행</span><br>
<span class="cc"># split panes: 여러 터미널 창으로 분리 실행</span>
</div>
</div>
</div>
</div>
<table class="tbl" style="margin-top:12px">
<tr><th>팀 패턴</th><th>구성</th><th>적합한 작업</th></tr>
<tr><td>기획+구현+리뷰</td><td>3명 순환</td><td>신기능 개발</td></tr>
<tr><td>병렬 탐색</td><td>N명 동시</td><td>대규모 리팩토링</td></tr>
<tr><td>배심원</td><td>N명+의장</td><td>중요 아키텍처 결정</td></tr>
</table>
<div class="hl" style="border-color:#4338ca;background:#eef2ff;margin-top:12px">
<p>us-stock의 21+ 에이전트 생태계가 바로 이 원리 — equity-lead가 지휘, equity-factor-builder가 구현, gbm-code-reviewer가 검토</p>
</div>`},

{t:"Plugin — 재사용 패키지",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">Plugin — 스킬·명령·에이전트를 하나의 패키지로</div>
<div class="s-sub">내가 만든 Claude 확장 기능을 배포하고 남의 것을 1줄로 설치한다</div>
<div class="grid2">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">📦 Plugin 구조</div>
<div class="icard-b">
<div class="code-box" style="font-size:11px">
<span class="cm">.claude-plugin/</span><br>
<span class="cm">├── plugin.json</span> <span class="cc"># 메타데이터</span><br>
<span class="cm">├── skills/</span> <span class="cc"># 스킬 모음</span><br>
<span class="cm">├── commands/</span> <span class="cc"># 슬래시 명령어</span><br>
<span class="cm">├── agents/</span> <span class="cc"># 에이전트 정의</span><br>
<span class="cm">└── hooks/</span> <span class="cc"># 이벤트 훅</span>
</div>
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">🚀 플러그인 사용</div>
<div class="icard-b" style="font-size:12px">
설치: claude plugin install &lt;url&gt; (1줄)<br><br>
네임스페이스: /plugin:skill-name<br><br>
공유: GitHub 리포로 배포<br><br>
예:<br>
claude plugin install<br>github.com/user/market-audit
</div>
</div>
</div>
<table class="tbl" style="margin-top:12px">
<tr><th>플러그인 종류</th><th>역할</th><th>예시</th></tr>
<tr><td>Skills</td><td>재사용 워크플로우</td><td>deploy-prod</td></tr>
<tr><td>Commands</td><td>슬래시 명령어</td><td>code-review</td></tr>
<tr><td>Agents</td><td>전문 에이전트</td><td>security-auditor</td></tr>
<tr><td>Hooks</td><td>이벤트 반응</td><td>auto-format</td></tr>
</table>
<div class="hl" style="border-color:#4338ca;background:#eef2ff;margin-top:12px">
<p>비유: Plugin은 스마트폰 앱 — 남이 만든 앱을 1줄로 설치해서 바로 쓰고, 내가 만든 앱을 배포해서 팀이 공유</p>
</div>`},

{t:"/simplify — 코드 품질 마무리",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">/simplify — 구현 완료 후 코드를 정리한다</div>
<div class="s-sub">3개 에이전트가 병렬로 재사용성·품질·효율을 동시에 점검</div>
<div class="grid2">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">⚙️ 동작 원리</div>
<div class="icard-b" style="font-size:12px">
<strong>에이전트 1 (Reuse):</strong><br>
중복 코드 발견 → 공통 함수로 통합<br><br>
<strong>에이전트 2 (Quality):</strong><br>
SOLID 원칙 위반 탐지 → 리팩토링 제안<br><br>
<strong>에이전트 3 (Efficiency):</strong><br>
불필요한 루프·변수 제거 → 성능 개선<br><br>
→ 3개 결과를 메인 에이전트가 통합<br>→ 최종 개선안 제시
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">📝 사용법</div>
<div class="icard-b">
<div class="code-box" style="font-size:11px">
<span class="cc"># 기본 실행</span><br>
<span class="cm">/simplify</span><br><br>
<span class="cc"># 특정 영역 집중</span><br>
<span class="cm">/simplify focus on memory efficiency</span><br>
<span class="cm">/simplify focus on authentication module</span><br>
<span class="cm">/simplify focus on database queries</span>
</div>
</div>
</div>
</div>
<ul class="blist" style="margin-top:12px">
<li>구현 완료 직후 실행 → 코드 품질 즉시 개선</li>
<li>PR 제출 전 최종 점검으로 활용</li>
<li>팀 코딩 컨벤션 자동 적용</li>
</ul>
<div class="hl" style="border-color:#4338ca;background:#eef2ff;margin-top:12px">
<p>비유: /simplify는 '편집장' — 기자(개발자)가 초고(코드)를 쓰면 편집장이 군더더기를 빼고 논리를 다듬어 최종본을 만든다</p>
</div>`},

{t:"/batch — 대규모 리팩토링",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">/batch — 대규모 변경을 안전하게 분해·실행한다</div>
<div class="s-sub">Git Worktree로 격리된 환경에서 PR 단위로 배달</div>
<div class="grid2">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">🔧 실행 흐름 (5단계)</div>
<div class="icard-b">
<div class="code-box" style="font-size:11px">
<span class="cm">1. 조사(Explore): 변경 범위 파악</span><br>
<span class="cm">2. 계획(Plan): 작업 목록 N개로 분해</span><br>
<span class="cm">3. 승인(Approve): 사용자가 계획 검토·확정</span><br>
<span class="cm">4. 격리 실행: 각 작업을 Git Worktree에서 독립 실행</span><br>
<span class="cm">5. PR 배달: 작업별 Pull Request 생성</span>
</div>
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">📦 Git Worktree 방식</div>
<div class="icard-b" style="font-size:12px">
각 작업 = 별도 브랜치 = 별도 디렉토리<br><br>
병렬 실행: 5~30개 작업 동시 처리<br><br>
실패 격리: 하나가 실패해도 나머지 영향 없음<br><br>
PR-per-unit: 작업별 PR → 리뷰 용이
</div>
</div>
</div>
<ul class="blist" style="margin-top:12px">
<li>전체 코드베이스 의존성 업그레이드</li>
<li>수십 개 파일 일괄 리팩토링</li>
<li>레거시 코드 점진적 현대화</li>
</ul>
<div class="hl" style="border-color:#4338ca;background:#eef2ff;margin-top:12px">
<p>비유: /batch는 '건설 현장 관리자' — 전체 공사를 작은 독립 구역으로 나눠서 팀별로 동시에 짓고, 완성된 구역부터 검수(PR)</p>
</div>`},

{t:"Ralph — 멈추지 않는 루프",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">Ralph — 자율 실행 루프로 장시간 작업 완주</div>
<div class="s-sub">인간 없이도 스스로 결정하고 실행하고 검증하며 목표를 향해 달린다</div>
<div class="grid2">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">⚙️ 핵심 메커니즘</div>
<div class="icard-b" style="font-size:12px">
<strong>stop-hook.sh:</strong> 작업 완료 조건 확인<br>
"COMPLETE" 감지 시 루프 종료<br><br>
<strong>--completion-promise:</strong><br>
완료 시 출력할 문자열 정의<br><br>
<strong>--max-iterations 50:</strong><br>
최대 반복 횟수 제한 (무한 루프 방지)<br><br>
<strong>자율 결정:</strong> 매 단계 테스트 결과를 보고<br>다음 행동 스스로 결정
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">🎯 Best / Worst 용도</div>
<div class="icard-b" style="font-size:12px">
✅ <strong>Best:</strong><br>
단위 테스트 전부 통과할 때까지 실행<br>
버그 수정 사이클<br>
반복적 데이터 처리<br><br>

{t:"핵심 공식 레퍼런스",html:`<div class="slide-inner">
  <div class="s-eye" style="color:#64748b">APPENDIX</div>
  <h2 class="s-title">공식 모음 — 복습할 때 찾아보는 치트시트</h2>
  <p class="s-sub">강의에서 다룬 핵심 공식을 한 페이지에 정리</p>

  <table class="tbl" style="margin:20px 0;font-size:13px">
    <thead>
      <tr><th>지표</th><th>공식</th><th>해석 포인트</th></tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>RSI</strong></td>
        <td><code>100 - 100 / (1 + RS)</code><br><small>RS = 평균상승 / 평균하락</small></td>
        <td>70+ 과매수 · 30- 과매도</td>
      </tr>
      <tr>
        <td><strong>MACD</strong></td>
        <td><code>EMA(12) - EMA(26)</code><br><small>Signal = EMA(MACD, 9)</small></td>
        <td>Signal 상향 돌파 = 매수 신호</td>
      </tr>
      <tr>
        <td><strong>SMA (이동평균)</strong></td>
        <td><code>Σ(가격) / n</code></td>
        <td>SMA50 > SMA200 = 골든크로스</td>
      </tr>
      <tr>
        <td><strong>Sharpe Ratio</strong></td>
        <td><code>(수익률 - 무위험수익률) / 표준편차</code></td>
        <td>1.0 이상 양호 · 2.0 이상 우수</td>
      </tr>
      <tr>
        <td><strong>VaR 95%</strong></td>
        <td><code>하위 5번째 백분위 손실</code></td>
        <td>95% 확률로 이 손실 이내</td>
      </tr>
      <tr>
        <td><strong>CVaR</strong></td>
        <td><code>VaR 초과 손실들의 평균</code></td>
        <td>꼬리 위험(tail risk) 측정</td>
      </tr>
      <tr>
        <td><strong>Drawdown</strong></td>
        <td><code>(현재가 - 최고가) / 최고가</code></td>
        <td>고점 대비 낙폭 · MDD = 최대 낙폭</td>
      </tr>
    </tbody>
  </table>

  <div class="hl" style="background:#f8fafc;border-left:4px solid #64748b;padding:12px 16px;border-radius:8px">
    <strong style="color:#475569">us-stock regime 임계값</strong>: &lt;0.75 risk_on · 0.75~1.5 neutral · 1.5~2.25 risk_off · ≥2.25 crisis
  </div>
</div>`},

// ============================================================
// FLATTEN ALL SLIDES
// ============================================================
const ALL = SEC.flatMap(s => s.slides.map((sl,i) => ({...sl, sec:s, secIdx:i, secLen:s.slides.length})))
let cur = 0

function render(idx) {
  cur = idx
  const sl = ALL[idx]
  const sec = sl.sec

  // sidebar
  document.querySelectorAll('.sb-sec').forEach((el,i) => {
    el.classList.toggle('active', SEC[i].id === sec.id)
    el.style.color = SEC[i].id === sec.id ? sec.color : ''
  })

  // top bar
  const badge = document.getElementById('sec-badge')
  badge.textContent = `SECTION ${sec.num}`
  badge.style.background = sec.cl
  badge.style.color = sec.color
  document.getElementById('top-title').textContent = sl.t
  document.getElementById('top-cnt').textContent = `${sl.secIdx+1} / ${sl.secLen}`

  // slide content
  document.getElementById('slide-content').innerHTML = sl.html

  // progress
  const pct = Math.round(((idx+1)/ALL.length)*100)
  document.getElementById('prog-txt').textContent = `${idx+1} / ${ALL.length}`
  document.getElementById('prog-pct').textContent = `${pct}%`
  document.getElementById('prog-fill').style.width = pct+'%'

  // prev/next
  document.getElementById('prev-btn').disabled = idx === 0
  document.getElementById('next-btn').disabled = idx === ALL.length-1

  // dots (show section dots)
  const dotsEl = document.getElementById('dots')
  dotsEl.innerHTML = ''
  const secSlides = SEC.find(s=>s.id===sec.id).slides
  secSlides.forEach((_,i) => {
    const d = document.createElement('div')
    d.className = 'd' + (i===sl.secIdx?' on':'')
    if(i===sl.secIdx) d.style.background = sec.color
    dotsEl.appendChild(d)
  })

  // scroll slide area to top
  document.querySelector('.slide-area').scrollTop = 0

  // sync script window
  try { localStorage.setItem('slide-sync', String(idx)) } catch(e) {}

  // track visited slides
  try {
    const visited = JSON.parse(localStorage.getItem('slide-visited') || '[]')
    if (!visited.includes(idx)) { visited.push(idx); localStorage.setItem('slide-visited', JSON.stringify(visited)) }
  } catch(e) {}
  updateSecProgress(idx)
}

function updateSecProgress(idx) {
  const row = document.getElementById('secProgressRow')
  if (!row) return
  let visited = []
  try { visited = JSON.parse(localStorage.getItem('slide-visited') || '[]') } catch(e) {}
  row.innerHTML = ''
  ALL.forEach((_, i) => {
    const pip = document.createElement('div')
    pip.className = 'sec-pip' + (i === idx ? ' current' : visited.includes(i) ? ' visited' : '')
    row.appendChild(pip)
  })
}

function nav(dir) {
  const n = cur + dir
  if(n >= 0 && n < ALL.length) render(n)
}

function jumpSec(id) {
  const idx = ALL.findIndex(s => s.sec.id === id)
  if(idx >= 0) render(idx)
}

// build sidebar
const nav2 = document.getElementById('sb-nav')
SEC.forEach(s => {
  const btn = document.createElement('button')
  btn.className = 'sb-sec'
  btn.onclick = () => jumpSec(s.id)
  btn.innerHTML = `<span class="sb-dot" style="border-color:${s.color}"></span><span class="sb-num">${s.num}</span><span class="sb-name">${s.title}</span><span class="sb-cnt">${s.slides.length}</span>`
  nav2.appendChild(btn)
})

// keyboard
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();nav(-1)}
  else if(e.key>='1'&&e.key<='6'){e.preventDefault();jumpSec(parseInt(e.key))}
})

// initialize: restore visited state and update progress pips
try {
  const saved = localStorage.getItem('slide-sync')
  const startIdx = saved !== null ? Math.min(parseInt(saved), ALL.length-1) : 0
  render(isNaN(startIdx) ? 0 : startIdx)
} catch(e) { render(0) }
updateSecProgress(cur)
</script>
