<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI시대의 미국주식 투자 — 3시간 특강</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f9fafb;color:#111827}
#app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;height:100vh;background:#fafafa;border-right:1px solid #e4e4e7;color:#18181b;display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:20px 16px 14px;border-bottom:1px solid #e4e4e7}
.sb-eyebrow{font-size:10px;font-weight:700;letter-spacing:1px;color:#a1a1aa;text-transform:uppercase;margin-bottom:4px}
.sb-title{font-size:13px;font-weight:700;color:#18181b;line-height:1.4}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:2px}
.sb-sec{width:100%;text-align:left;padding:9px 16px;background:none;border:none;cursor:pointer;color:#71717a;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
.sb-sec:hover,.sb-sec.active{background:#f4f4f5;color:#18181b}
.sb-dot{width:8px;height:8px;border-radius:50%;border:2px solid;flex-shrink:0;transition:background .15s}
.sb-sec.active .sb-dot{background:currentColor}
.sb-num{font-size:10px;opacity:.4;min-width:14px}
.sb-name{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.sb-cnt{font-size:10px;opacity:.35}
.sb-footer{padding:12px 16px;border-top:1px solid #e4e4e7}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#a1a1aa;margin-bottom:5px}
.prog-bar{height:3px;background:#e4e4e7;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s}
.kbd-hint{font-size:10px;color:#a1a1aa;margin-top:7px;text-align:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.top-bar{height:52px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0}
.sec-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.top-title{font-size:14px;font-weight:600;color:#111827;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-cnt{font-size:12px;color:#9ca3af;white-space:nowrap}
.slide-area{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:12px 16px}
.slide-area::-webkit-scrollbar{width:5px}
.slide-area::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.slide-card{width:100%;max-width:1200px;min-height:calc(100vh - 52px - 58px - 24px);padding:32px 48px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:20px;animation:si .18s ease}
@keyframes si{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bot-nav{height:58px;background:#fff;border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.nav-btn{padding:8px 18px;border-radius:7px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#374151;transition:all .15s}
.nav-btn:hover{background:#f3f4f6}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.pri{background:#2563eb;color:#fff;border-color:#2563eb}
.nav-btn.pri:hover{background:#1d4ed8}
.dots{display:flex;gap:4px;align-items:center}
.d{width:5px;height:5px;border-radius:50%;background:#d1d5db;transition:all .2s}
.d.on{width:16px;border-radius:3px}

/* ── SLIDE CONTENT STYLES ── */
.s-eye{font-size:0.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.s-title{font-size:2rem;font-weight:800;color:#111827;margin-bottom:4px;line-height:1.25}
.s-sub{font-size:1.05rem;color:#374151;margin-bottom:24px;line-height:1.5}
.s-div{height:1px;background:#f3f4f6;margin:22px 0}

.cover-wrap{text-align:center;padding:16px 0 8px}
.cover-main{font-size:38px;font-weight:800;line-height:1.2;margin-bottom:10px}
.cover-desc{font-size:18px;color:#6b7280;margin-bottom:28px}
.cover-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.cv-stat{text-align:center}
.cv-val{font-size:20px;font-weight:800}
.cv-key{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.icard{background:#f9fafb;border:1px solid #f3f4f6;border-radius:8px;padding:14px}
.icard-t{font-size:12px;font-weight:700;color:#374151;margin-bottom:7px}
.icard-b{font-size:0.93rem;color:#6b7280;line-height:1.75}

.hl{border-left:4px solid;padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0}
.hl p{font-size:0.93rem;line-height:1.6;color:#374151}

.tbl{width:100%;border-collapse:collapse;font-size:0.93rem}
.tbl th{padding:10px 14px;text-align:left;background:#f9fafb;border-bottom:2px solid #e5e7eb;font-weight:700;color:#374151}
.tbl td{padding:10px 14px;border-bottom:1px solid #f3f4f6;color:#374151}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}

.blist{list-style:none}
.blist li{padding:5px 0 5px 16px;position:relative;font-size:0.93rem;color:#374151;line-height:1.5}
.blist li::before{content:"▸";position:absolute;left:0;color:#9ca3af}
.blist li strong{color:#111827}

.code-box{background:#1e293b;color:#e2e8f0;padding:14px 18px;border-radius:8px;font-family:'JetBrains Mono',Menlo,monospace;font-size:0.88rem;line-height:1.6;margin:10px 0;overflow-x:auto}
.cc{color:#64748b}
.cm{color:#7dd3fc}

/* ── ARCHITECTURE DIAGRAM (drawio colors) ── */
.arch{max-width:560px;margin:0 auto}
.arch-src{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:8px}
.arch-src span{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8}
.arch-arr{text-align:center;color:#9ca3af;font-size:16px;line-height:1.7}
.arch-ph{padding:12px 16px;border-radius:8px;border-left:5px solid;margin:3px 0;display:flex;align-items:center;gap:12px}
.ph-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:#6b7280;min-width:58px;letter-spacing:.4px}
.ph-info .ph-t{font-size:13px;font-weight:700;color:#111827;margin-bottom:2px}
.ph-info .ph-d{font-size:11px;color:#6b7280}
.p1{background:#eff6ff;border-color:#6c8ebf}
.p2{background:#f0fdf4;border-color:#82b366}
.p3{background:#fff7ed;border-color:#ef6c00}
.p4{background:#fef2f2;border-color:#c62828}
.p5{background:#f0fdfa;border-color:#00838f}
.pdash{background:#f5f3ff;border-color:#7c4dff}
.pdeploy{background:#f0fdf4;border-color:#2e7d32}

/* ── 5-SENSOR DIAGRAM ── */
.sns-row{display:flex;gap:7px;margin-bottom:14px}
.sns-c{flex:1;padding:11px 8px;border-radius:8px;border:2px solid;text-align:center}
.sns-pct{font-size:18px;font-weight:800;margin-bottom:1px}
.sns-name{font-size:12px;font-weight:700;margin-bottom:2px}
.sns-desc{font-size:10px;color:#6b7280;margin-bottom:3px}
.sns-src{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;display:inline-block}
.sv{border-color:#ef4444;background:#fef2f2}.sv .sns-pct{color:#dc2626}.sv .sns-src{background:#fee2e2;color:#b91c1c}
.st{border-color:#3b82f6;background:#eff6ff}.st .sns-pct{color:#2563eb}.st .sns-src{background:#dbeafe;color:#1d4ed8}
.sb2{border-color:#10b981;background:#ecfdf5}.sb2 .sns-pct{color:#059669}.sb2 .sns-src{background:#d1fae5;color:#065f46}
.sc{border-color:#f59e0b;background:#fffbeb}.sc .sns-pct{color:#d97706}.sc .sns-src{background:#fef3c7;color:#92400e}
.sy{border-color:#8b5cf6;background:#f5f3ff}.sy .sns-pct{color:#7c3aed}.sy .sns-src{background:#ede9fe;color:#5b21b6}
.reg-row{display:flex;gap:7px}
.reg-c{flex:1;padding:9px;border-radius:7px;text-align:center;border:2px solid}
.reg-name{font-size:11px;font-weight:700;margin-bottom:1px}
.reg-range{font-size:10px;color:#6b7280}
.ro{background:#f0fdf4;border-color:#22c55e;color:#16a34a}
.rn{background:#f0f9ff;border-color:#38bdf8;color:#0284c7}
.roff{background:#fffbeb;border-color:#fbbf24;color:#d97706}
.rc{background:#fef2f2;border-color:#ef4444;color:#dc2626}

/* ── 6-FACTOR DIAGRAM ── */
.fct-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.fct-c{padding:11px;border-radius:8px;border:1px solid;text-align:center}
.fct-pct{font-size:17px;font-weight:800;margin-bottom:2px}
.fct-name{font-size:11px;font-weight:700;margin-bottom:3px}
.fct-met{font-size:10px;color:#6b7280}
.ft{background:#eff6ff;border-color:#93c5fd;color:#2563eb}
.ff{background:#fefce8;border-color:#fde047;color:#ca8a04}
.fa{background:#fdf4ff;border-color:#e879f9;color:#a21caf}
.fr{background:#ecfdf5;border-color:#86efac;color:#16a34a}
.fv{background:#fff7ed;border-color:#fdba74;color:#ea580c}
.f3{background:#faf5ff;border-color:#c4b5fd;color:#7c3aed}

/* ── AI INVESTMENT FLOW ── */
.ai-trig{text-align:center;margin-bottom:12px}
.ai-trig-box{display:inline-block;padding:10px 24px;border-radius:8px;background:#1e293b;color:#f8fafc;font-weight:700;font-size:14px}
.ai-trig-box span{display:block;font-size:11px;font-weight:400;color:#94a3b8;margin-top:2px}
.ai-chain{display:flex;align-items:stretch;gap:0}
.ai-step{flex:1;padding:14px 10px;border-radius:8px;border:2px solid;text-align:center}
.ai-arr{display:flex;align-items:center;font-size:22px;color:#9ca3af;padding:0 3px}
.ai-icon{font-size:22px;margin-bottom:5px}
.ai-sname{font-size:13px;font-weight:800;margin-bottom:3px}
.ai-tick{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-bottom:5px;display:inline-block}
.ai-sdesc{font-size:10px;color:#6b7280;line-height:1.4}
.adc{background:#eff6ff;border-color:#6c8ebf}.adc .ai-sname{color:#1d4ed8}.adc .ai-tick{background:#dbeafe;color:#1d4ed8}
.asc{background:#f5f3ff;border-color:#a78bfa}.asc .ai-sname{color:#7c3aed}.asc .ai-tick{background:#ede9fe;color:#7c3aed}
.amc{background:#ecfdf5;border-color:#6ee7b7}.amc .ai-sname{color:#059669}.amc .ai-tick{background:#d1fae5;color:#065f46}
.asvc{background:#fff7ed;border-color:#fdba74}.asvc .ai-sname{color:#c2410c}.asvc .ai-tick{background:#fed7aa;color:#c2410c}

/* ── IT STACK ── */
.it-stack{display:flex;flex-direction:column;gap:6px;max-width:520px;margin:0 auto}
.it-lay{padding:9px 14px;border-radius:6px;border-left:4px solid;display:flex;align-items:center;gap:10px}
.it-name{font-size:12px;font-weight:700;min-width:90px}
.it-desc{font-size:11px;color:#6b7280;flex:1}
.it-ex{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap}

/* ── VERDICT MATRIX ── */
.vmat{margin-top:12px}
.vmat table{width:100%;border-collapse:collapse}
.vmat th{padding:9px 12px;font-size:12px;font-weight:700;background:#f9fafb;border:1px solid #e5e7eb}
.vmat td{padding:9px 12px;text-align:center;border:1px solid #e5e7eb;font-size:12px}
.vgo{background:#f0fdf4}.vcau{background:#fffbeb}.vstop{background:#fef2f2}
.ab{background:#dcfce7;color:#15803d;border-radius:5px;padding:3px 9px;font-weight:700;display:inline-block}
.asb{background:#fef9c3;color:#854d0e;border-radius:5px;padding:3px 9px;font-weight:700;display:inline-block}
.aw{background:#f1f5f9;color:#475569;border-radius:5px;padding:3px 9px;font-weight:600;display:inline-block}
.ah{background:#fee2e2;color:#b91c1c;border-radius:5px;padding:3px 9px;font-weight:600;display:inline-block}

/* ── GRADE CARDS ── */
.grade-row{display:flex;gap:7px;margin-top:8px}
.g-c2{flex:1;padding:9px;border-radius:7px;text-align:center;border:2px solid}
.g-lt{font-size:22px;font-weight:900}
.g-sc{font-size:10px;color:#6b7280;margin-top:1px}
.g-nm{font-size:9px;font-weight:600;margin-top:3px}
.ga{background:#dcfce7;border-color:#86efac;color:#15803d}
.gb{background:#ecfdf5;border-color:#a7f3d0;color:#059669}
.gc{background:#f0f9ff;border-color:#bae6fd;color:#0369a1}
.gd{background:#fffbeb;border-color:#fde68a;color:#d97706}
.gf{background:#fef2f2;border-color:#fca5a5;color:#dc2626}

/* ── ROUTINE STEPS ── */
.routine{display:flex;flex-direction:column;gap:7px}
.r-step{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f9fafb;border-radius:8px;border:1px solid #f3f4f6}
.r-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.r-page{font-size:13px;font-weight:700;color:#111827}
.r-act{font-size:11px;color:#6b7280}
.r-res{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;margin-left:auto;white-space:nowrap}

/* ── DEPLOY SPLIT ── */
.deploy-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0;margin:14px 0}
.dbox{padding:14px;border-radius:8px;border:2px solid}
.dmac{background:#eff6ff;border-color:#93c5fd}
.dnas{background:#f0fdf4;border-color:#86efac}
.darr{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 14px}
.darr-icon{font-size:22px;color:#6b7280}
.darr-lbl{font-size:9px;font-weight:700;color:#6b7280;text-align:center;line-height:1.3}
.dbox-t{font-size:12px;font-weight:800;margin-bottom:7px}
.dbox-b{font-size:11px;color:#6b7280;line-height:1.7}

/* ── DASH PAGES GRID ── */
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pg-item{padding:9px 12px;background:#f9fafb;border:1px solid #f3f4f6;border-radius:7px}
.pg-route{font-size:10px;font-weight:700;color:#6b7280;font-family:monospace;margin-bottom:1px}
.pg-name{font-size:12px;font-weight:700;color:#111827;margin-bottom:1px}
.pg-desc{font-size:11px;color:#6b7280}

/* ── KERNEL DIAGRAM ── */
.ker-stack{display:flex;flex-direction:column;gap:5px;max-width:520px;margin:0 auto}
.ker-lay{padding:11px 16px;border-radius:7px;font-size:13px;font-weight:700;text-align:center}
.ker-arr{text-align:center;color:#9ca3af;font-size:13px;line-height:2}

/* ── CPU DIAGRAM ── */
.cpu-wrap{display:flex;gap:16px;align-items:center;justify-content:center;margin:12px 0;flex-wrap:wrap}
.cpu-box{border:2px solid;border-radius:8px;padding:12px 14px;text-align:center;min-width:150px}
.cpu-units{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.cpu-unit{padding:8px 10px;border-radius:5px;font-size:12px;font-weight:700;border:1px solid}
.cpu-bus{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}

/* ── CONTEXT SWITCH DIAGRAM ── */
.ctx-grid{display:grid;grid-template-columns:1fr 54px 1fr 54px 1fr;gap:8px;align-items:start;margin:12px 0}
.ctx-proc,.ctx-os{border:2px solid;border-radius:8px;padding:10px;text-align:center}
.ctx-arr{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:14px}
.ctx-pcb{font-size:10px;padding:3px 8px;border-radius:4px;margin-top:4px;display:inline-block;font-weight:600}

/* ── 3-TIER WEB ARCH ── */
.web3-row{display:flex;align-items:stretch;gap:0;margin:14px 0}
.web3-node{flex:1;border:2px solid;border-radius:8px;padding:11px 7px;text-align:center}
.web3-mid{display:flex;align-items:center;justify-content:center;padding:0 5px;font-size:18px;color:#9ca3af}
.web3-icon{font-size:20px;margin-bottom:4px}
.web3-name{font-size:12px;font-weight:800;margin-bottom:2px}
.web3-role{font-size:10px;color:#6b7280;margin-bottom:5px}
.web3-tech{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;display:inline-block}

/* ── API COST CARDS ── */
.api-row{display:flex;gap:10px;margin-bottom:10px}
.api-c{flex:1;padding:13px;border-radius:8px;border:2px solid;text-align:center}
.api-name{font-size:12px;font-weight:700;margin-bottom:3px}
.api-rank{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-bottom:7px;display:inline-block}
.api-price{font-size:18px;font-weight:800;margin-bottom:1px}
.api-unit{font-size:10px;color:#6b7280}
.api-note{font-size:11px;margin-top:5px}
.ag{background:#f0fdf4;border-color:#86efac}.ag .api-price{color:#059669}.ag .api-rank{background:#dcfce7;color:#15803d}
.ao{background:#eff6ff;border-color:#93c5fd}.ao .api-price{color:#2563eb}.ao .api-rank{background:#dbeafe;color:#1e40af}
.ap{background:#f5f3ff;border-color:#c4b5fd}.ap .api-price{color:#7c3aed}.ap .api-rank{background:#ede9fe;color:#5b21b6}
.sec-progress-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding:0 2px}
.sec-pip{width:8px;height:8px;border-radius:50%;background:#e4e4e7;flex-shrink:0;transition:background .2s}
.sec-pip.visited{background:#a1a1aa}
.sec-pip.current{background:#f59e0b;transform:scale(1.3)}
</style>
</head>
<body>
<div id="app">
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-eyebrow">프린들 특강 2026</div>
    <div class="sb-title">AI시대의 미국주식 투자</div>
  </div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-footer">
    <div class="prog-row"><span id="prog-txt">1 / 37</span><span id="prog-pct">3%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:3%"></div></div>
    <div class="kbd-hint">← → Space &nbsp;|&nbsp; 1~6 섹션</div>
    <div class="sec-progress-row" id="secProgressRow"></div>
  </div>
</aside>
<main class="main">
  <header class="top-bar">
    <span class="sec-badge" id="sec-badge"></span>
    <span class="top-title" id="top-title"></span>
    <span class="top-cnt" id="top-cnt"></span>
  </header>
  <div class="slide-area">
    <div class="slide-card" id="slide-card">
      <div id="slide-content"></div>
    </div>
  </div>
  <footer class="bot-nav">
    <button class="nav-btn" id="prev-btn" onclick="nav(-1)">← 이전</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn pri" id="next-btn" onclick="nav(1)">다음 →</button>
  </footer>
</main>
</div>

<script>
const SEC = [
{id:1,num:"01",title:"Opening Hook",sub:"세상이 빠르게 변하고 있다",color:"#f43f5e",cl:"#fff1f2",
slides:[
{t:"AI시대의 미국주식 투자",html:`
<div class="cover-wrap">
<div class="s-eye" style="color:#f43f5e">SECTION 1 · OPENING HOOK</div>
<div class="cover-main">AI시대의<br>미국주식 투자</div>

{id:3,num:"03",title:"IT 설명 + AI 투자 흐름",sub:"OS·WEB·API 기초 + AI 투자 흐름",color:"#0891b2",cl:"#ecfeff",
slides:[

{t:"OS 커널 구조",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS</div>
<div class="s-title">운영체제(OS) 커널 구조</div>
<div class="s-sub">커널 = Process·메모리·저장장치 관리의 핵심 — 사용자는 인터페이스를 통해서만 접근</div>
<div class="ker-stack">
<div class="ker-lay" style="background:#f9fafb;border:2px solid #374151;color:#374151">
  👤 사용자 프로그램 (User Space)
</div>
<div class="ker-arr">↕ 시스템 콜 (System Call Interface)</div>
<div class="ker-lay" style="background:#eff6ff;border:2px solid #2563eb;color:#1d4ed8">
  인터페이스 레이어 — 시스템 콜 핸들러
</div>
<div class="ker-arr">↕</div>
<div class="ker-lay" style="background:#fef9c3;border:2px solid #ca8a04;color:#92400e">
  커널 코어 — 프로세스 관리 · 메모리 관리 · 파일 시스템
</div>
<div class="ker-arr">↕ 드라이버 인터페이스</div>
<div class="ker-lay" style="background:#f5f3ff;border:2px solid #7c3aed;color:#6d28d9">
  드라이버 레이어 — 하드웨어 제어
</div>
<div class="ker-arr">↕</div>
<div class="ker-lay" style="background:#1e293b;border:2px solid #475569;color:#f8fafc">
  하드웨어 (CPU · RAM · 디스크 · 네트워크 카드)
</div>
</div>
<div class="hl" style="border-color:#0891b2;background:#ecfeff;margin-top:10px">
<p>사용자 → 인터페이스 → 커널 → 드라이버 → 하드웨어. <strong>직접 접근 불가 — 인터페이스(API)를 통해서만</strong></p>
</div>`},
{t:"CPU + 메모리 구조",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS</div>
<div class="s-title">CPU + 메모리 구조 (폰 노이만)</div>
<div class="s-sub">CPU와 메모리 사이에 버스(데이터 통로)를 두고 데이터를 전송 — 프로그램 내장 방식</div>
<div class="cpu-wrap">
<div class="cpu-box" style="border-color:#2563eb;background:#eff6ff">
  <div style="font-size:13px;font-weight:800;color:#2563eb;margin-bottom:8px">CPU</div>
  <div class="cpu-units">
    <div class="cpu-unit" style="background:#dbeafe;border-color:#93c5fd;color:#1d4ed8">제어장치 (CU)<br><span style="font-size:10px;font-weight:400;color:#6b7280">명령어 해석·제어</span></div>
    <div class="cpu-unit" style="background:#fce7f3;border-color:#f9a8d4;color:#be185d">연산장치 (ALU)<br><span style="font-size:10px;font-weight:400;color:#6b7280">사칙연산·논리비교</span></div>
    <div class="cpu-unit" style="background:#d1fae5;border-color:#6ee7b7;color:#065f46">레지스터<br><span style="font-size:10px;font-weight:400;color:#6b7280">CPU 내부 임시 저장</span></div>
  </div>
</div>
<div class="cpu-bus">
  <div style="font-size:10px;font-weight:700;color:#6b7280;margin-bottom:3px">버스</div>
  <div style="width:4px;height:70px;background:#9ca3af;border-radius:2px"></div>
  <div style="font-size:9px;color:#9ca3af;margin-top:3px;text-align:center">데이터<br>전달</div>
</div>
<div class="cpu-box" style="border-color:#059669;background:#f0fdf4">
  <div style="font-size:13px;font-weight:800;color:#059669;margin-bottom:8px">메모리</div>
  <div class="cpu-units">
    <div class="cpu-unit" style="background:#dcfce7;border-color:#86efac;color:#166534">RAM<br><span style="font-size:10px;font-weight:400;color:#6b7280">실행 데이터 · 전력 OFF=소실<br>랜덤 접근 가능</span></div>
    <div class="cpu-unit" style="background:#fef9c3;border-color:#fde047;color:#854d0e">ROM<br><span style="font-size:10px;font-weight:400;color:#6b7280">BIOS 저장 · 전력 OFF도 유지<br>쓰기 불가</span></div>
  </div>
</div>
</div>`},
{t:"Context Switching",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS ⭐</div>
<div class="s-title">Context Switching</div>
<div class="s-sub">실행 중인 프로세스를 교체하는 핵심 메커니즘 — PCB에 상태를 저장하고 복원한다</div>
<div class="ctx-grid">
<div class="ctx-proc" style="border-color:#2563eb;background:#eff6ff">
  <div style="font-size:13px;font-weight:800;color:#2563eb;margin-bottom:5px">프로세스 A</div>
  <div style="font-size:10px;color:#6b7280;margin-bottom:6px">CPU에서 실행 중</div>
  <div class="ctx-pcb" style="background:#dbeafe;color:#1d4ed8">PCB A 저장</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px;line-height:1.5">레지스터 값<br>프로그램 카운터<br>→ <strong>Ready 상태로</strong></div>
</div>
<div class="ctx-arr">
  <div style="font-size:14px;color:#9ca3af">→</div>
  <div style="font-size:9px;color:#6b7280;text-align:center;line-height:1.6">①인터럽트<br>②저장</div>
</div>
<div class="ctx-os" style="border-color:#ea580c;background:#fff7ed">
  <div style="font-size:13px;font-weight:800;color:#ea580c;margin-bottom:5px">운영체제</div>
  <div style="font-size:10px;color:#6b7280;margin-bottom:6px">CPU 스케줄러</div>
  <div style="font-size:11px;line-height:1.8;color:#374151">
    ① A 상태 → PCB A<br>
    ② B 선택 (스케줄링)<br>
    ③ PCB B → B 복원
  </div>
</div>
<div class="ctx-arr">
  <div style="font-size:14px;color:#9ca3af">→</div>
  <div style="font-size:9px;color:#6b7280;text-align:center;line-height:1.6">③복원<br>④재개</div>
</div>
<div class="ctx-proc" style="border-color:#059669;background:#f0fdf4">
  <div style="font-size:13px;font-weight:800;color:#059669;margin-bottom:5px">프로세스 B</div>
  <div style="font-size:10px;color:#6b7280;margin-bottom:6px">CPU 할당 받음</div>
  <div class="ctx-pcb" style="background:#dcfce7;color:#166534">PCB B 복원</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px;line-height:1.5">레지스터 복원<br>프로그램 카운터<br>→ <strong>Running 상태로</strong></div>
</div>
</div>
<div class="hl" style="border-color:#0891b2;background:#ecfeff;margin-top:6px">
<p>PCB = 프로세스 ID · 레지스터 · PC · 메모리 정보 · 스케줄링 정보. <strong>멀티태스킹의 핵심 원리</strong></p>
</div>`},
{t:"프로세스 상태 머신",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS</div>
<div class="s-title">프로세스 상태 머신</div>
<div class="s-sub">프로세스는 5가지 상태를 순환한다. CPU 스케줄러가 READY ↔ RUNNING을 결정</div>
<div style="display:grid;grid-template-columns:80px 38px 80px 54px 94px 38px 106px;align-items:center;gap:4px;max-width:500px;margin:14px auto">
<div style="border:2px solid #9ca3af;background:#f9fafb;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#6b7280">NEW</div><div style="font-size:10px;color:#9ca3af">생성</div></div>
<div style="text-align:center;font-size:16px;color:#9ca3af;line-height:1.2">→<br><span style="font-size:8px">fork</span></div>
<div style="border:2px solid #2563eb;background:#eff6ff;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#2563eb">READY</div><div style="font-size:10px;color:#3b82f6">준비</div></div>
<div style="text-align:center;font-size:10px;color:#6b7280;line-height:2">→ CPU<br>← I/O완료</div>
<div style="border:2px solid #059669;background:#ecfdf5;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#059669">RUNNING</div><div style="font-size:10px;color:#10b981">실행 중</div></div>
<div style="text-align:center;font-size:16px;color:#9ca3af;line-height:1.2">→<br><span style="font-size:8px">exit</span></div>
<div style="border:2px solid #475569;background:#f8fafc;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#475569">TERMINATED</div><div style="font-size:10px;color:#94a3b8">종료</div></div>
<div></div><div></div><div></div><div></div>
<div style="text-align:center;color:#9ca3af;font-size:18px;line-height:1.1">↕<br><span style="font-size:9px;color:#6b7280">I/O 요청<br>I/O 완료</span></div>
<div></div><div></div>
<div></div><div></div><div></div><div></div>
<div style="border:2px solid #ea580c;background:#fff7ed;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#ea580c">WAITING</div><div style="font-size:10px;color:#f97316">I/O 대기</div></div>
<div></div><div></div>
</div>
<div class="grid2" style="margin-top:14px">
<div class="icard">
<div class="icard-t">상태 전환 요약</div>
<div class="icard-b" style="font-size:12px;line-height:1.9">
<strong>NEW → READY</strong>: fork() — 프로세스 생성<br>
<strong>READY → RUNNING</strong>: 스케줄러 선택 (CPU 할당)<br>
<strong>RUNNING → WAITING</strong>: I/O 요청 (disk · network)<br>
<strong>WAITING → READY</strong>: I/O 완료 인터럽트<br>
<strong>RUNNING → TERMINATED</strong>: exit() 호출
</div>
</div>
<div class="icard">
<div class="icard-t">WAITING이 필요한 이유</div>
<div class="icard-b" style="font-size:12px">
CPU: <strong>ns (나노초)</strong> 단위<br>
Disk I/O: <strong>ms (밀리초)</strong> 단위<br>
→ <strong>10만 배 속도 차이</strong><br><br>
기다리는 동안 CPU를 독점하면 낭비.<br>
WAITING으로 빼고 다른 프로세스에게 CPU 양보 = <strong>멀티태스킹 핵심</strong>
</div>
</div>
</div>`},
{t:"Thread vs Process",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS</div>
<div class="s-title">Thread vs Process</div>
<div class="s-sub">Process = 독립 실행 단위. Thread = Process 안의 실행 흐름. 메모리 공유가 핵심 차이</div>
<div class="grid2" style="margin-bottom:12px">
<div class="icard" style="border-top:3px solid #7c3aed">
<div class="icard-t">Process — 독립 메모리</div>
<div class="icard-b">
<div style="border:2px solid #7c3aed;border-radius:6px;padding:8px;margin-bottom:8px">
<div style="font-size:10px;font-weight:700;text-align:center;color:#7c3aed;margin-bottom:5px">Process A</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">CODE</div>
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">DATA</div>
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">HEAP</div>
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">STACK</div>
</div>
</div>
<div style="font-size:10px;text-align:center;color:#6b7280">완전 독립 — 메모리 공유 없음</div>
</div>
</div>
<div class="icard" style="border-top:3px solid #059669">
<div class="icard-t">Thread — 메모리 공유</div>
<div class="icard-b">
<div style="border:2px solid #059669;border-radius:6px;padding:8px">
<div style="font-size:10px;font-weight:700;text-align:center;color:#059669;margin-bottom:5px">Process B</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:5px">
<div style="background:#d1fae5;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#059669">CODE</div>
<div style="background:#d1fae5;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#059669">DATA</div>
<div style="background:#d1fae5;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#059669">HEAP</div>
</div>
<div style="font-size:9px;text-align:center;color:#6b7280;margin-bottom:4px">공유(Shared)</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
<div style="background:#fef9c3;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#ca8a04">STACK<br><span style="font-size:8px;font-weight:400">Thread 1</span></div>
<div style="background:#fef9c3;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#ca8a04">STACK<br><span style="font-size:8px;font-weight:400">Thread 2</span></div>
</div>
<div style="font-size:9px;text-align:center;color:#6b7280;margin-top:4px">개별(Per-Thread)</div>
</div>
</div>
</div>
</div>
<table class="tbl">
<tr><th></th><th>Chrome 브라우저</th><th>Firefox 브라우저</th></tr>
<tr><td><strong>구조</strong></td><td>탭마다 독립 Process</td><td>4개 Process + 다수 Thread</td></tr>
<tr><td><strong>장점</strong></td><td>탭 충돌 격리 (안정·보안)</td><td>메모리 절약, 빠른 탭 전환</td></tr>
<tr><td><strong>단점</strong></td><td>탭 100개 = 메모리 폭발</td><td>한 탭 오류가 전파될 수 있음</td></tr>
</table>`},
{t:"WEB 기초 — URL · HTTP",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · WEB</div>
<div class="s-title">WEB 기초 — URL · HTTP Method · 상태코드</div>
<div class="s-sub">URL = 리소스가 저장된 위치(서버). HTTP Header의 요청 부분 = Method</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">🌐 URL (Uniform Resource Locator)</div>
<div class="icard-b">
<strong>통합 Resource가 저장된 위치(서버)</strong><br>
<code style="font-size:11px">https://example.com/path</code><br><br>
HTTP Header = 요청·응답 메타정보<br>
<strong>요청 Header = Method (GET/POST 등)</strong>
</div>
</div>
<div class="icard">
<div class="icard-t">📤 HTTP Method (요청)</div>
<div class="icard-b">
<strong>GET ≒ Download ≒ Read</strong><br>
→ 서버에서 데이터 조회/다운로드<br><br>
<strong>POST ≒ Write ≒ Upload</strong><br>
→ 서버에 데이터 생성/업로드
</div>
</div>
</div>
<table class="tbl">
<tr><th>상태코드</th><th>의미</th><th>설명</th></tr>
<tr><td><strong style="color:#059669">200 OK</strong></td><td>성공</td><td>요청이 정상 처리됨</td></tr>
<tr><td><strong style="color:#2563eb">301</strong></td><td>영구 이동 (Permanently Moved)</td><td>URL 영구 변경 — SEO 점수 새 URL로 이전</td></tr>
<tr><td><strong style="color:#0891b2">302</strong></td><td>임시 이동 (Temporarily Moved)</td><td>URL 임시 변경 — SEO 점수 원본 유지</td></tr>
<tr><td><strong style="color:#dc2626">404 Not Found</strong></td><td>없음</td><td>해당 리소스를 서버에서 찾을 수 없음</td></tr>
</table>`},
{t:"웹서비스 3-Tier 아키텍처",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · WEB</div>
<div class="s-title">웹서비스 3-Tier 아키텍처</div>
<div class="s-sub">Client → Web Server(송수신) → WAS(연산) → DB(자료) — 역순으로 응답</div>
<div class="web3-row">
<div class="web3-node" style="border-color:#374151;background:#f9fafb">
  <div class="web3-icon">💻</div>
  <div class="web3-name">Client</div>
  <div class="web3-role">브라우저 / 앱</div>
  <div class="web3-tech" style="background:#f3f4f6;color:#374151">HTTP 요청</div>
</div>
<div class="web3-mid">⟷</div>
<div class="web3-node" style="border-color:#2563eb;background:#eff6ff">
  <div class="web3-icon">🌐</div>
  <div class="web3-name">Web Server</div>
  <div class="web3-role">송수신 담당</div>
  <div class="web3-tech" style="background:#dbeafe;color:#1d4ed8">Nginx · Apache</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px">정적 파일<br>HTML/CSS/JS</div>
</div>
<div class="web3-mid">⟷</div>
<div class="web3-node" style="border-color:#ea580c;background:#fff7ed">
  <div class="web3-icon">⚙️</div>
  <div class="web3-name">WAS</div>
  <div class="web3-role">처리·연산 담당</div>
  <div class="web3-tech" style="background:#fed7aa;color:#c2410c">Tomcat · Node.js</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px">
    MVC 패턴<br>
    <span style="color:#7c3aed;font-weight:700">View</span> ·
    <span style="color:#2563eb;font-weight:700">Control</span> ·
    <span style="color:#059669;font-weight:700">Model</span>
  </div>
</div>
<div class="web3-mid">⟷</div>
<div class="web3-node" style="border-color:#059669;background:#f0fdf4">
  <div class="web3-icon">🗄️</div>
  <div class="web3-name">DB Server</div>
  <div class="web3-role">자료 담당</div>
  <div class="web3-tech" style="background:#dcfce7;color:#166534">SQL</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px">Oracle<br>MySQL · PostgreSQL</div>
</div>
</div>
<div class="hl" style="border-color:#0891b2;background:#ecfeff">
<p>Cookie = Client 상태 저장 (Key=Value). Session/DB = Server 상태 저장. <strong>Stateless HTTP → Cookie로 상태 유지</strong></p>
</div>`},
{t:"API & REST API",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · WEB</div>
<div class="s-title">API &amp; REST API</div>
<div class="s-sub">API = 프로그램 간 소통 약속. REST API = CRUD를 URL 함수 형식으로 호출하는 기술</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">🔌 API (Application Programming Interface)</div>
<div class="icard-b">
두 프로그램이 소통하는 <strong>약속된 인터페이스</strong><br><br>
<strong>UI/Data 분리 진화:</strong><br>
기존: HTML 통째 전송<br>
현재: <strong>JSON/XML 데이터만</strong> 전송<br>
→ JS가 디바이스별 HTML 생성<br>
→ <strong>React.js / Vue.js</strong>
</div>
</div>
<div class="icard">
<div class="icard-t">🛠️ REST API — CRUD × URL</div>
<div class="icard-b">
<strong>GET</strong> /stocks → 목록 조회<br>
<strong>POST</strong> /stocks → 항목 추가<br>
<strong>PUT</strong> /stocks/1 → 항목 수정<br>
<strong>DELETE</strong> /stocks/1 → 항목 삭제<br><br>
<span style="font-size:11px;color:#6b7280">CRUD를 URL + HTTP Method 형식으로 호출</span>
</div>
</div>
</div>
<table class="tbl">
<tr><th>개념</th><th>설명</th><th>비유</th></tr>
<tr><td><strong>JVM</strong></td><td>Java를 위해 SW로 구현된 CPU (user 모드)</td><td>Java 전용 가상 컴퓨터</td></tr>
<tr><td><strong>Servlet</strong></td><td>HTTP 요청을 처리하는 자바 웹 프로그래밍 기술</td><td>요청 전담 일꾼</td></tr>
<tr><td><strong>Container</strong></td><td>Servlet들을 관리하는 컨테이너</td><td>일꾼들의 사무실</td></tr>
<tr><td><strong>Framework</strong></td><td>Frame(틀)+work — 규칙·부품으로 결과물 생성</td><td>밀키트</td></tr>
</table>`},
{t:"Docker &amp; Container",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · Cloud</div>
<div class="s-title">Docker &amp; Container</div>
<div class="s-sub">Image = 불변 설계도(≒ Program). Container = 실행 인스턴스(≒ Process). 같은 Image로 여러 Container 실행</div>
<div style="display:flex;align-items:center;gap:0;justify-content:center;margin:14px 0;flex-wrap:wrap">
<div style="border:2px solid #9ca3af;background:#f9fafb;border-radius:8px;padding:10px 14px;text-align:center;min-width:88px">
<div style="font-size:18px">📝</div>
<div style="font-size:12px;font-weight:700;margin-top:3px">소스코드</div>
<div style="font-size:10px;color:#6b7280">Dockerfile</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;padding:0 6px">
<div style="font-size:14px;color:#9ca3af">→</div>
<div style="font-size:9px;color:#2563eb;font-weight:700">docker build</div>
</div>
<div style="border:2px solid #2563eb;background:#eff6ff;border-radius:8px;padding:10px 14px;text-align:center;min-width:88px">
<div style="font-size:18px">📦</div>
<div style="font-size:12px;font-weight:700;color:#2563eb;margin-top:3px">Image</div>
<div style="font-size:10px;color:#3b82f6">Immutable</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;padding:0 6px">
<div style="font-size:14px;color:#9ca3af">→</div>
<div style="font-size:9px;color:#059669;font-weight:700">docker run</div>
</div>
<div style="border:2px solid #059669;background:#ecfdf5;border-radius:8px;padding:10px 14px;text-align:center;min-width:88px">
<div style="font-size:18px">🚀</div>
<div style="font-size:12px;font-weight:700;color:#059669;margin-top:3px">Container</div>
<div style="font-size:10px;color:#10b981">실행 인스턴스</div>
</div>
<div style="padding:0 6px;font-size:10px;color:#9ca3af;text-align:center">× N개<br>동시 실행</div>
<div style="border:2px solid #059669;background:#ecfdf5;border-radius:8px;padding:10px 14px;text-align:center;min-width:88px;opacity:.65">
<div style="font-size:18px">🚀</div>
<div style="font-size:12px;font-weight:700;color:#059669;margin-top:3px">Container</div>
<div style="font-size:10px;color:#10b981">인스턴스 2</div>
</div>
</div>
<table class="tbl">
<tr><th></th><th>VM (가상머신)</th><th>Container (Docker)</th></tr>
<tr><td><strong>가상화 단위</strong></td><td>OS 전체</td><td>프로세스 격리</td></tr>
<tr><td><strong>이미지 크기</strong></td><td>수 GB</td><td>수십~수백 MB</td></tr>
<tr><td><strong>시작 시간</strong></td><td>수 분</td><td>수 초</td></tr>
<tr><td><strong>격리 수준</strong></td><td>완전 격리</td><td>프로세스 수준</td></tr>
</table>
<div class="hl" style="border-color:#2563eb;background:#eff6ff;margin-top:10px">
<p><strong>비유:</strong> Image = 밀키트(틀). Container = 밀키트로 만든 실제 요리. 같은 Image로 Container 수십 개 동시 실행 가능</p>
</div>`},
{t:"클라우드와 AI 인프라",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3</div>
<div class="s-title">클라우드와 AI 인프라</div>
<div class="s-sub">AI 훈련과 추론에는 엄청난 컴퓨팅 파워가 필요하다</div>
<div class="grid2" style="margin-bottom:16px">
<div class="icard" style="border-top:3px solid #7c3aed">
<div class="icard-t">AI 훈련 (Training)</div>
<div class="icard-b">
• <strong>GPU 수천 개</strong>가 수주일 연속 실행<br>
• GPT-4 훈련 비용 ~$100M<br>
• NVIDIA H100 1장 = $30,000+<br>
• 수요: Meta, Google, OpenAI, Microsoft
</div>
</div>
<div class="icard" style="border-top:3px solid #0891b2">
<div class="icard-t">AI 추론 (Inference)</div>
<div class="icard-b">
• 학습된 모델로 실시간 응답 생성<br>
• ChatGPT = 하루 수억 건 추론<br>
• GPU + 메모리 + 서버 지속 수요<br>
• 훈련보다 <strong>장기적으로 더 큰 시장</strong>
</div>
</div>
</div>
<div class="hl" style="border-color:#0891b2;background:#ecfeff">
<p><strong>투자 관점:</strong> AI 훈련·추론 인프라는 전력, 냉각, 반도체, 메모리, 서버를 모두 필요로 한다. 이것이 AI 투자 연쇄의 시작점이다.</p>
</div>`},
{t:"AI 투자 흐름 다이어그램",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3</div>
<div class="s-title">AI 투자 흐름 다이어그램</div>
<div class="s-sub">AI 수요 폭발이 만들어내는 산업 연쇄 — 투자 기회의 지도</div>

  <span style="font-size:12px;color:#6b7280;margin-left:8px">AWS (AMZN) · Google Cloud (GOOGL) · Azure (MSFT) — 모든 AI 인프라 최종 소비자</span>
</div>`},
{t:"데이터센터 투자 테마",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3</div>
<div class="s-title">데이터센터 투자 테마</div>
<div class="s-sub">AI 수요 폭발 → 데이터센터 건설 붐 → 전력·토지·냉각 수혜</div>
<table class="tbl" style="margin-bottom:14px">
<tr><th>투자 테마</th><th>대표 종목</th><th>수혜 이유</th></tr>
<tr><td><strong>데이터센터 REIT</strong></td><td>EQIX, DLR, AMT</td><td>AI 서버 공간 임대 수요 급증</td></tr>
<tr><td><strong>전력 인프라</strong></td><td>VST, CEG, NRG</td><td>데이터센터 전력 소비 = 국가급</td></tr>

</div>`},
{t:"반도체 + 메모리 연결고리",html:`

<div class="s-title">반도체 + 메모리 연결고리</div>

</div>`},
{t:"AI 수혜주 분류",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3</div>
<div class="s-title">AI 수혜주 분류</div>
<div class="s-sub">시간 축에 따른 수혜 단계 구분</div>
<table class="tbl">
<tr><th>단계</th><th>종목</th><th>수혜 시기</th><th>리스크</th></tr>

{t:"네트워크 핵심",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · REF</div>
<div class="s-title">네트워크 핵심</div>
<div class="s-sub">L2·L3·L4 계층별 식별자. Encapsulation = 각 계층이 헤더를 씌워 전달</div>
<div class="grid2" style="margin-bottom:12px">
<div class="icard">
<div class="icard-t">계층별 식별자</div>
<div class="icard-b" style="font-size:12px">
<strong>L2 — MAC</strong>: NIC(네트워크 카드) 식별. 48bit 물리 주소. 같은 네트워크 내 통신<br><br>
<strong>L3 — IP</strong>: Host(컴퓨터) 식별. 논리 주소. 라우터가 목적지 찾기<br><br>
<strong>L4 — Port</strong>: Service 식별. 0~65535. HTTP=80, HTTPS=443, SSH=22
</div>
</div>
<div class="icard">
<div class="icard-t">Encapsulation (캡슐화)</div>
<div class="icard-b">
<div style="display:flex;flex-direction:column;gap:4px">
<div style="background:#dbeafe;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#1d4ed8">Stream (데이터)</div>
<div style="text-align:center;color:#9ca3af;font-size:10px">↓ L4 TCP/UDP 헤더 추가</div>
<div style="background:#d1fae5;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#065f46">Segment</div>
<div style="text-align:center;color:#9ca3af;font-size:10px">↓ L3 IP 헤더 추가</div>
<div style="background:#fef3c7;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#92400e">Packet</div>
<div style="text-align:center;color:#9ca3af;font-size:10px">↓ L2 MAC 헤더 추가</div>
<div style="background:#fce7f3;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#9d174d">Frame (물리 전송)</div>
</div>
</div>
</div>
</div>
<table class="tbl">
<tr><th></th><th>TCP</th><th>UDP</th></tr>
<tr><td><strong>연결</strong></td><td>3-way handshake (연결 지향)</td><td>비연결 (connectionless)</td></tr>
<tr><td><strong>신뢰성</strong></td><td>순서 보장 · 재전송</td><td>보장 없음</td></tr>
<tr><td><strong>용도</strong></td><td>HTTP · DB · 파일 전송</td><td>DNS · 스트리밍 · 게임</td></tr>
</table>`},
{t:"OS 심화 — 메모리 레이아웃",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · REF</div>
<div class="s-title">OS 심화 — 메모리 레이아웃</div>
<div class="s-sub">프로세스 메모리 = 4영역. Compile = 소스→실행파일 5단계. fork+exec = 프로세스 생성</div>
<div class="grid2" style="margin-bottom:12px">
<div class="icard">
<div class="icard-t">프로세스 메모리 영역</div>
<div class="icard-b">
<div style="display:flex;flex-direction:column;gap:3px;font-size:11px">
<div style="background:#dbeafe;border-radius:5px;padding:7px 10px;font-weight:700;color:#1d4ed8">CODE (Text) — 실행 코드 (읽기 전용)</div>
<div style="background:#d1fae5;border-radius:5px;padding:7px 10px;font-weight:700;color:#065f46">DATA — 전역 변수 · static 변수</div>
<div style="background:#fef3c7;border-radius:5px;padding:7px 10px;font-weight:700;color:#92400e">HEAP — 동적 할당 (malloc) ↑ 위로 성장</div>
<div style="background:#f3f4f6;border-radius:5px;padding:7px 10px;text-align:center;font-size:10px;color:#9ca3af">↕ 빈 공간</div>
<div style="background:#fce7f3;border-radius:5px;padding:7px 10px;font-weight:700;color:#9d174d">STACK — 지역 변수 · 함수 호출 ↓ 아래로 성장</div>
</div>
</div>
</div>
<div class="icard">
<div class="icard-t">Compile 과정 (C언어)</div>
<div class="icard-b">
<div style="display:flex;flex-direction:column;gap:3px;font-size:11px">
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.c 소스파일</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Preprocessor (#include 처리)</div>
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.i 전처리 파일</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Compiler (최적화)</div>
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.s 어셈블리</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Assembler</div>
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.o 오브젝트 파일</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Linker (라이브러리 결합)</div>
<div style="background:#d1fae5;border-radius:4px;padding:5px 8px;font-weight:700;color:#065f46">실행 파일 (ELF / exe)</div>
</div>
</div>
</div>
</div>
<div class="hl" style="border-color:#64748b;background:#f8fafc">
<p><strong>프로세스 생성:</strong> fork() = 부모 프로세스 복사 → exec() = 새 프로그램으로 교체. 모든 프로세스는 이 2단계로 생성됨</p>
</div>`},

<div class="s-title">ETF 지도 — SPY/QQQ와 11개 섹터 ETF</div>
<div class="s-sub">us-stock은 SPY를 벤치마크로, 11개 섹터 ETF로 시장 폭(Breadth)을 측정한다</div>
<table class="tbl" style="margin-bottom:14px">
<tr><th>ETF</th><th>추종</th><th>10년 수익률</th><th>운용보수</th><th>us-stock 활용</th></tr>
<tr><td><strong>SPY</strong></td><td>S&amp;P 500</td><td>~250%</td><td>0.09%</td><td>벤치마크·Trend 센서</td></tr>
<tr><td><strong>QQQ</strong></td><td>NASDAQ-100</td><td>~450%</td><td>0.20%</td><td>기술주 지표</td></tr>
<tr><td><strong>RSP</strong></td><td>동일가중 S&amp;P</td><td>~200%</td><td>0.20%</td><td>Breadth 센서 (RSP/SPY)</td></tr>
<tr><td><strong>XLK</strong></td><td>기술 섹터</td><td>~550%</td><td>0.09%</td><td>섹터 히트맵</td></tr>
<tr><td><strong>XLF</strong></td><td>금융 섹터</td><td>~200%</td><td>0.09%</td><td>섹터 히트맵</td></tr>
<tr><td><strong>HYG</strong></td><td>하이일드 채권</td><td>-</td><td>0.48%</td><td>Credit 센서</td></tr>
<tr><td><strong>IEF</strong></td><td>중기 국채</td><td>-</td><td>0.15%</td><td>Credit 센서 (HYG/IEF)</td></tr>
</table>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p>비유: 11개 섹터 ETF는 야구팀의 9개 포지션과 같다 — 어느 포지션이 잘 치는지 보면 오늘 시장의 '스타 섹터'를 알 수 있다</p>
</div>`},
{t:"시장 체제란?",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">시장 체제(Market Regime)란?</div>
<div class="s-sub">"오늘 주식 투자하기 좋은 날인가?" — 숫자로 대답하는 방법</div>
<div class="hl" style="border-color:#059669;background:#ecfdf5;margin-bottom:14px">
<p>비유: 기상청이 '오늘 외출 적합도'를 맑음/흐림/비/태풍으로 구분하듯, us-stock은 시장을 4단계 체제로 구분한다</p>
</div>
<div class="reg-row" style="margin-bottom:14px">
<div class="reg-c ro"><strong>risk_on</strong><br>&lt; 0.75<br>강세장<br>적극 투자 가능</div>
<div class="reg-c rn"><strong>neutral</strong><br>0.75~1.50<br>보통<br>선별적 투자</div>
<div class="reg-c roff"><strong>risk_off</strong><br>1.50~2.25<br>약세<br>방어적 포지션</div>
<div class="reg-c rc"><strong>crisis</strong><br>≥ 2.25<br>위기<br>현금 비중 최대화</div>
</div>
<table class="tbl" style="margin-bottom:10px">
<tr><th>체제</th><th>Stop Loss</th><th>MDD 한도</th></tr>
<tr><td>risk_on</td><td>-10%</td><td>-12%</td></tr>
<tr><td>neutral</td><td>-8%</td><td>-10%</td></tr>
<tr><td>risk_off</td><td>-5%</td><td>-7%</td></tr>
<tr><td>crisis</td><td>-3%</td><td>-5%</td></tr>
</table>
<div style="font-size:11px;color:#6b7280;text-align:center">Section 5에서 5개 센서가 어떻게 이 체제를 판단하는지 상세히 설명한다</div>`},
{t:"이동평균선",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">이동평균선 — 추세의 나침반</div>
<div class="s-sub">5/20/60/120/200일선 — us-stock 기술적 팩터(25%)의 핵심</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📊 이동평균선 종류</div>
<div class="icard-b">
5일선 = 초단기(1주일)<br>
20일선 = 단기(1개월)<br>
60일선 = 중기(분기)<br>
120일선 = 장기(반기)<br>
200일선 = 대세(강세/약세 판단 기준선)<br>
us-stock: SMA50, SMA200 사용
</div>
</div>
<div class="icard">
<div class="icard-t">🔔 핵심 시그널</div>
<div class="icard-b">
골든크로스 = 단기MA가 장기MA 상향 돌파 → 매수<br>
데드크로스 = 단기MA가 장기MA 하향 돌파 → 매도<br>
정배열 = 5&gt;20&gt;60&gt;120일선 순서 = 강한 상승 추세<br>
이격도 = 현재가와 MA의 거리 → 과매수/과매도
</div>
</div>
</div>
<div class="hl" style="border-color:#059669;background:#ecfdf5;margin-bottom:12px">
<p>비유: 200일선은 '평균 1년치 주가' — 현재 주가가 200일선 위에 있으면 작년보다 비싸게 사는 것이고, 아래 있으면 작년보다 싸게 사는 것이다</p>
</div>
<table class="tbl">
<tr><th>전략</th><th>조건</th><th>us-stock 적용</th></tr>
<tr><td>Trend전략</td><td>MA 정배열+RS&gt;0</td><td>phase2 기술팩터</td></tr>
<tr><td>Reversal전략</td><td>데드크로스</td><td>Reversal Strategy</td></tr>
</table>`},
{t:"RSI · MACD · 볼린저밴드",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">RSI · MACD · 볼린저밴드</div>
<div class="s-sub">us-stock 기술적 팩터의 3대 보조지표 — 과매수/추세전환/변동성</div>
<div class="grid3" style="margin-bottom:14px">
<div class="icard" style="border-top:3px solid #059669">
<div class="icard-t">📊 RSI (상대강도지수)</div>
<div class="icard-b">0~100 사이<br>70 이상 = 과매수 → 조정 가능<br>30 이하 = 과매도 → 반등 가능<br>30~70 = Swing 전략 구간<br>us-stock: RSI&lt;30 = Reversal 전략</div>
</div>
<div class="icard" style="border-top:3px solid #059669">
<div class="icard-t">📈 MACD</div>
<div class="icard-b">추세 전환 감지<br>MACD선이 시그널선 상향 돌파 → 매수<br>하향 돌파 → 매도<br>히스토그램 = 추세 강도<br>us-stock: 기술점수 계산에 포함</div>
</div>
<div class="icard" style="border-top:3px solid #059669">
<div class="icard-t">📉 볼린저밴드</div>
<div class="icard-b">이동평균 ± 2σ<br>상단 밴드 터치 → 과매수<br>하단 밴드 터치 → 과매도<br>밴드 수축 → 변동성 감소, 곧 큰 움직임 예고</div>
</div>
</div>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p>이 3가지 + 이동평균선 = us-stock 6팩터 중 '기술적 분석 25%'의 원재료다. Section 5에서 어떻게 복합 점수로 합산하는지 볼 수 있다</p>
</div>`},
{t:"상대강도(RS) — 기관이 보는 핵심 지표",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">상대강도(Relative Strength) — 기관이 주목하는 숫자</div>
<div class="s-sub">SPY 대비 초과수익률 — "이 종목이 시장보다 강한가?"에 대한 숫자 답변</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📈 RS 계산</div>
<div class="icard-b">
종목 수익률 - SPY 수익률 = RS<br>
RS &gt; 0 = 시장 아웃퍼폼<br>
RS &lt; 0 = 시장 언더퍼폼<br>
us-stock: 20일/60일/120일 RS 복합 계산<br>
가중치 15%
</div>
</div>
<div class="icard">
<div class="icard-t">🏆 왜 중요한가</div>
<div class="icard-b">
기관(스마트 머니)은 RS 상위 종목에 집중<br>
상승장에서 시장보다 먼저 오르는 종목<br>
Trend 전략의 핵심 필터:<br>
RS &gt; 0 + MA 정배열 = 강한 기관 매집 신호
</div>
</div>
</div>
<div class="hl" style="border-color:#059669;background:#ecfdf5;margin-bottom:12px">
<p>비유: 반 전체가 시험을 봤을 때 평균보다 높은 점수 = RS &gt; 0. 기관투자자는 언제나 '반 평균보다 높은 성적표'를 가진 학생(종목)만 사 모은다</p>
</div>
<table class="tbl">
<tr><th>전략</th><th>RS 조건</th><th>의미</th></tr>
<tr><td>Trend</td><td>RS&gt;0</td><td>시장 아웃퍼폼</td></tr>
<tr><td>Swing</td><td>RS 중립</td><td>추세전환 노림</td></tr>
<tr><td>Reversal</td><td>RS&lt;-10</td><td>과도한 낙폭 반등</td></tr>
</table>`},
{t:"밸류에이션 핵심",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">밸류에이션 — PER, EPS, ROE</div>
<div class="s-sub">us-stock 펀더멘털 팩터(20%)의 원재료 — 이 3가지로 80% 판단한다</div>
<table class="tbl" style="margin-bottom:14px">
<tr><th>지표</th><th>공식</th><th>S&amp;P 500 기준</th><th>us-stock 활용</th></tr>
<tr><td>EPS</td><td>순이익÷발행주식수</td><td>YoY 성장률 &gt;15% 우수</td><td>펀더멘털 점수</td></tr>
<tr><td>Forward 12M EPS</td><td>향후 12개월 예상 EPS</td><td>상향 추세가 핵심</td><td>애널리스트 컨센서스</td></tr>
<tr><td>PER</td><td>주가÷EPS</td><td>Forward ~19.8배 (2026)</td><td>섹터별 상대 평가</td></tr>
<tr><td>ROE</td><td>순이익÷자기자본</td><td>15%+ 우수</td><td>자본 효율성 지표</td></tr>
<tr><td>PBR</td><td>주가÷주당순자산</td><td>1 이하=저평가 가능</td><td>자산 대비 시장가치</td></tr>
</table>
<div class="grid2" style="margin-bottom:12px">
<div class="icard">
<div class="icard-t">📊 Fed Model</div>
<div class="icard-b">주식 수익률(1/PER) vs 10년 국채 수익률<br>주식 수익률 &gt; 국채 → 주식 매력<br>반대 → 채권으로 이동</div>
</div>
<div class="icard">
<div class="icard-t">⚠️ 함정</div>
<div class="icard-b">PER 낮다고 무조건 좋은 게 아님<br>이익이 빠지면 PER이 높아짐<br>Forward EPS 상향 + PER 합리적 = 좋은 조합</div>
</div>
</div>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p>us-stock 펀더멘털 팩터(20%)는 PER·성장률·ROE 3가지를 복합 계산한다</p>
</div>`},
{t:"위험관리 — MDD와 Stop Loss",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">위험관리 — MDD와 Stop Loss</div>
<div class="s-sub">수익을 지키는 것이 버는 것보다 중요하다 — 첫 손절이 제일 손실이 작다</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📉 MDD (Maximum Drawdown)</div>
<div class="icard-b">
고점 대비 최대 하락폭<br>
-10% 회복: +11.1% 필요<br>
-20% 회복: +25.0% 필요<br>
-30% 회복: +42.9% 필요<br>
-50% 회복: +100.0% 필요<br>
"손실을 막는 것이 수익을 내는 것보다 유리"
</div>
</div>
<div class="icard">
<div class="icard-t">🛡️ Stop Loss 3단계</div>
<div class="icard-b">
1. 손실제한 = -5% (자동매도)<br>
2. 이익실현 = +10% (일부매도)<br>
3. Trailing Stop = 최고가-N%<br>
us-stock: 체제별 자동 조정
</div>
</div>
</div>
<table class="tbl" style="margin-bottom:12px">
<tr><th>체제</th><th>Stop Loss</th><th>MDD 한도</th><th>의미</th></tr>
<tr><td>risk_on</td><td>-10%</td><td>-12%</td><td>강세장</td></tr>
<tr><td>neutral</td><td>-8%</td><td>-10%</td><td>보통</td></tr>
<tr><td>risk_off</td><td>-5%</td><td>-7%</td><td>약세</td></tr>
<tr><td>crisis</td><td>-3%</td><td>-5%</td><td>위기</td></tr>
</table>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p>비유: Stop Loss는 '안전벨트'다. 불편하지만 사고가 났을 때 목숨을 구한다. us-stock이 체제별로 자동으로 벨트 강도를 조절한다</p>
</div>`},
{t:"13F — 스마트 머니 추적",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">13F 공시 — 기관(스마트 머니) 움직임 추적</div>
<div class="s-sub">SEC에 분기마다 공시되는 기관투자자 보유 내역 — 기관이 무엇을 사고 파는지 알 수 있다</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📋 13F란?</div>
<div class="icard-b">
SEC(미국증권거래위원회) 의무 공시<br>
운용자산 $1억+ 기관이 분기 종료 후 45일 내 신고<br>
보유 종목·수량 전부 공개<br>
분기별 변동 = 기관의 투자 전략 변화
</div>
</div>
<div class="icard">
<div class="icard-t">🏦 스마트 머니 신호</div>
<div class="icard-b">
기관 지분 증가 = Strong Accumulation<br>
기관 지분 감소 = Distribution<br>
신규 편입 = 관심 시작<br>
대형 기관 집중 + 지분 증가 = us-stock Grade A 핵심 신호
</div>
</div>
</div>
<table class="tbl" style="margin-bottom:12px">
<tr><th>공시 주체</th><th>기준</th><th>예시</th></tr>
<tr><td>헤지펀드</td><td>$1억+ AUM</td><td>Bridgewater</td></tr>
<tr><td>연기금</td><td>공적 기금</td><td>CalPERS</td></tr>
<tr><td>뮤추얼펀드</td><td>공모펀드</td><td>Fidelity</td></tr>
</table>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p>us-stock 13F 팩터(10%)는 분기 공시 데이터를 자동 수집해서 기관 지분 증감을 점수화한다. look-ahead bias 방지: 공시일 기준으로만 계산</p>
</div>`},
{t:"Grade A~F + Action 예고",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">Grade A~F — 6팩터 복합 점수 예고</div>
<div class="s-sub">Section 5에서 배울 핵심 개념을 미리 확인하자</div>
<div style="font-size:12px;color:#374151;margin-bottom:12px;background:#f9fafb;border-radius:8px;padding:10px">
us-stock은 기술적(25%)+펀더멘털(20%)+애널리스트(15%)+상대강도(15%)+거래량(15%)+13F(10%) = 6팩터를 복합 점수로 계산해 A~F로 등급화한다
</div>
<div class="grade-row" style="margin-bottom:14px">
<div class="g-c2 ga"><strong>A</strong><br>80점+<br>Strong Accumulation</div>
<div class="g-c2 gb"><strong>B</strong><br>62점+<br>Moderate Accum</div>
<div class="g-c2 gc"><strong>C</strong><br>48점+<br>Neutral</div>
<div class="g-c2 gd"><strong>D</strong><br>35점+<br>Distribution</div>
<div class="g-c2 gf"><strong>F</strong><br>&lt;35<br>Capitulation</div>
</div>
<div class="vmat" style="margin-bottom:12px">
<div class="ab"><strong>GO + A/B</strong><br>BUY</div>
<div class="aw"><strong>GO + C</strong><br>WATCH</div>
<div class="asb"><strong>CAUTION + A/B</strong><br>SMALL BUY</div>
<div class="ah"><strong>STOP + 전체</strong><br>HOLD</div>
</div>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p>다음 섹션에서 이 6팩터가 어떻게 계산되는지, Grade가 어떻게 Action으로 연결되는지 상세히 볼 수 있다</p>
</div>`},
{t:"왜 자동화가 필요한가",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">왜 자동화가 필요한가?</div>
<div class="s-sub">503개 × 6팩터 × 매일 = 사람이 불가능한 계산량</div>
<div class="grid3" style="margin-bottom:14px">
<div class="icard" style="border-top:3px solid #ef4444;text-align:center">
<div style="font-size:36px;font-weight:800;color:#dc2626">503</div>
<div style="font-size:12px;color:#6b7280">S&amp;P 500 종목 수</div>
</div>
<div class="icard" style="border-top:3px solid #f97316;text-align:center">
<div style="font-size:36px;font-weight:800;color:#ea580c">×6</div>
<div style="font-size:12px;color:#6b7280">팩터 개수</div>
</div>

{t:"기술 지표 3총사 — RSI·MACD·이동평균",html:`<div class="slide-inner">
  <div class="s-eye" style="color:#059669">SECTION 4</div>
  <h2 class="s-title">RSI · MACD · 이동평균 — 차트 읽는 3가지 도구</h2>
  <p class="s-sub">us-stock Technical 25% 팩터를 구성하는 핵심 지표</p>

  <div style="display:flex;flex-direction:column;gap:16px;margin:20px 0">
    <div class="icard" style="border-left:4px solid #dc2626">
      <div class="icard-label" style="color:#dc2626">RSI — 상대강도지수 (Relative Strength Index)</div>
      <div class="icard-title">0~100 범위 · 70 이상 과매수 · 30 이하 과매도</div>
      <div class="code-box" style="margin-top:8px">RSI = 100 - (100 / (1 + 평균상승 / 평균하락))
→ 14일 기준 사용. 70+ 매도 신호, 30- 매수 신호</div>
    </div>
    <div class="icard" style="border-left:4px solid #0891b2">
      <div class="icard-label" style="color:#0891b2">MACD — 이동평균 수렴·발산</div>
      <div class="icard-title">단기-장기 EMA 차이 · 시그널선 교차가 매매 신호</div>
      <div class="code-box" style="margin-top:8px">MACD   = EMA(12일) - EMA(26일)
Signal = EMA(MACD, 9일)
Histogram = MACD - Signal  ← 막대 그래프로 표시</div>
    </div>
    <div class="icard" style="border-left:4px solid #059669">
      <div class="icard-label" style="color:#059669">이동평균 (Moving Average)</div>
      <div class="icard-title">SMA50 · SMA200 · 골든크로스 / 데스크로스</div>
      <div class="code-box" style="margin-top:8px">SMA(n) = Σ(최근 n일 종가) / n
골든크로스: SMA50 > SMA200 → 강세 신호
데스크로스: SMA50 &lt; SMA200 → 약세 신호</div>
    </div>
  </div>

  <div class="hl" style="background:#ecfdf5;border-left:4px solid #059669;padding:12px 16px;border-radius:8px">
    <strong style="color:#059669">us-stock이 이 3가지를 Technical 25% 팩터로 사용</strong>
    — smart_money_screener_v2.py에서 계산
  </div>
</div>`},

{t:"Part 2 — 5센서 시장 체제 감지",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">Part 2 — 5센서 시장 체제 감지</div>

</div>

</div>

<div class="reg-c ro"><div class="reg-name">risk_on</div><div class="reg-range">&lt; 0.75</div></div>
<div class="reg-c rn"><div class="reg-name">neutral</div><div class="reg-range">0.75 ~ 1.50</div></div>

</div>

<p>비유: 5명의 심사위원이 각자 다른 배점으로 투표 — VIX(30점), Trend(25점), Breadth(18점), Credit(15점), Yield(12점). 만점에 가까울수록 위험</p>
</div>`},
{t:"Part 2 — 4가지 체제 × 적응형 파라미터",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">4가지 체제별 적응형 파라미터</div>
<div class="s-sub">체제가 바뀌면 Stop Loss와 MDD 한도가 자동으로 바뀐다</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
<div style="background:#f0fdf4;border:2px solid #22c55e;border-radius:10px;padding:14px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
<span style="font-size:14px;font-weight:800;color:#15803d">🟢 risk_on</span>
<span style="font-size:11px;background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:10px">&lt; 0.75</span>
</div>
<div style="font-size:12px;color:#374151">강세장, 적극 투자 가능<br>Stop Loss: <strong>-10%</strong><br>MDD 한도: <strong>-12%</strong></div>
</div>
<div style="background:#f0f9ff;border:2px solid #38bdf8;border-radius:10px;padding:14px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
<span style="font-size:14px;font-weight:800;color:#0284c7">🔵 neutral</span>
<span style="font-size:11px;background:#e0f2fe;color:#0284c7;padding:2px 8px;border-radius:10px">0.75~1.50</span>
</div>
<div style="font-size:12px;color:#374151">보통 환경, 선별 투자<br>Stop Loss: <strong>-8%</strong><br>MDD 한도: <strong>-10%</strong></div>
</div>
<div style="background:#fffbeb;border:2px solid #fbbf24;border-radius:10px;padding:14px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
<span style="font-size:14px;font-weight:800;color:#d97706">🟡 risk_off</span>
<span style="font-size:11px;background:#fef3c7;color:#d97706;padding:2px 8px;border-radius:10px">1.50~2.25</span>
</div>
<div style="font-size:12px;color:#374151">약세장, 방어적 포지션<br>Stop Loss: <strong>-5%</strong><br>MDD 한도: <strong>-7%</strong></div>
</div>
<div style="background:#fef2f2;border:2px solid #ef4444;border-radius:10px;padding:14px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
<span style="font-size:14px;font-weight:800;color:#dc2626">🔴 crisis</span>
<span style="font-size:11px;background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:10px">≥ 2.25</span>
</div>
<div style="font-size:12px;color:#374151">위기, 현금 비중 최대화<br>Stop Loss: <strong>-3%</strong><br>MDD 한도: <strong>-5%</strong></div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>비유: 태풍 예보에 따라 선박이 항구에 들어오듯 — 체제가 crisis로 바뀌면 시스템이 자동으로 '항구 입항 모드'(현금 비중 최대화)를 권고한다</p>
</div>`},
{t:"Part 3 — 6팩터 스마트 머니 스크리닝",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">Part 3 — 6팩터 스마트 머니 스크리닝</div>
<div class="s-sub">기관(스마트 머니)이 주목하는 종목을 6팩터로 복합 점수화</div>
<div class="fct-grid" style="margin-bottom:12px">
<div class="fct-c ft"><div class="fct-pct">25%</div><div class="fct-name">기술적 분석</div><div class="fct-met">RSI · MACD · 이동평균</div></div>
<div class="fct-c ff"><div class="fct-pct">20%</div><div class="fct-name">펀더멘털</div><div class="fct-met">PER · 성장률 · ROE</div></div>
<div class="fct-c fa"><div class="fct-pct">15%</div><div class="fct-name">애널리스트</div><div class="fct-met">컨센서스 · 목표주가</div></div>
<div class="fct-c fr"><div class="fct-pct">15%</div><div class="fct-name">상대강도 RS</div><div class="fct-met">SPY 대비 초과수익률</div></div>
<div class="fct-c fv"><div class="fct-pct">15%</div><div class="fct-name">거래량</div><div class="fct-met">표준편차 기반 이상 탐지</div></div>
<div class="fct-c f3"><div class="fct-pct">10%</div><div class="fct-name">13F 보유</div><div class="fct-met">기관 지분 변동 (SEC)</div></div>
</div>
<div class="grade-row" style="margin-bottom:12px">
<div class="g-c2 ga"><div class="g-lt">A</div><div class="g-sc">80점+</div><div class="g-nm">Strong Accum</div></div>
<div class="g-c2 gb"><div class="g-lt">B</div><div class="g-sc">62점+</div><div class="g-nm">Moderate</div></div>
<div class="g-c2 gc"><div class="g-lt">C</div><div class="g-sc">48점+</div><div class="g-nm">Neutral</div></div>
<div class="g-c2 gd"><div class="g-lt">D</div><div class="g-sc">35점+</div><div class="g-nm">Distribution</div></div>
<div class="g-c2 gf"><div class="g-lt">F</div><div class="g-sc">&lt;35</div><div class="g-nm">Capitulation</div></div>
</div>
<div style="font-size:11px;color:#374151;margin-bottom:8px">
<strong>전략:</strong> Trend(RS&gt;0 + MA정배열) / Swing(RSI 30~70) / Reversal(RSI&lt;30 또는 Death Cross) &nbsp;|&nbsp;
<strong>Setup:</strong> Breakout(골든크로스 또는 RSI&gt;60) / Pullback(Bullish + RSI 40~55) / Base(횡보 바닥)
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>비유: 스마트 머니 스크리닝은 '헬스케어의 건강검진'이다 — 6가지 지표(혈압/혈당/콜레스테롤 등)를 복합 측정해서 건강 등급을 매긴다</p>
</div>`},
{t:"Part 4 — AI 분석",html:`

<div class="s-title">Part 4 — AI 분석</div>

</div>`},
{t:"Part 5 — ML 지수 예측",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">Part 5 — ML 지수 예측 (SPY/QQQ 5일 방향)</div>

<div class="icard-b">VIX·Fear&amp;Greed<br>금리·달러지수</div>
</div>
<div class="icard" style="border-top:3px solid #2563eb">
<div class="icard-t">💳 신용/체제</div>

{t:"Part 6 — 리스크 관리 7종 알림",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">Part 6 — 리스크 관리 7종 알림 시스템</div>
<div class="s-sub">전체 파이프라인에 연동 — 위험 신호 감지 시 즉시 알림</div>
<table class="tbl" style="margin-bottom:14px">
<tr><th>알림 유형</th><th>트리거 조건</th><th>권고 조치</th></tr>
<tr><td>VIX 급등</td><td>VIX &gt; 25 급변</td><td>포지션 축소 검토</td></tr>
<tr><td>Stop Loss 발동</td><td>보유 종목 -N% 하락</td><td>즉시 매도 또는 검토</td></tr>
<tr><td>드로다운 경고</td><td>포트폴리오 MDD 한도 도달</td><td>비중 축소</td></tr>
<tr><td>집중도 경고</td><td>단일 종목 비중 &gt; 20%</td><td>분산 권고</td></tr>
<tr><td>체제 전환</td><td>risk_on → risk_off 전환</td><td>Stop Loss 즉시 조정</td></tr>
<tr><td>섹터 쏠림</td><td>단일 섹터 &gt; 40%</td><td>섹터 분산 권고</td></tr>
<tr><td>시스템 에러</td><td>파이프라인 실패</td><td>로그 확인 필요</td></tr>
</table>
<div class="grid2">
<div class="icard">
<div class="icard-t">📊 리스크 지표</div>
<div class="icard-b">VaR (Value at Risk)<br>CDaR (Conditional Drawdown)<br>Stress Test (2008/2020 시뮬레이션)</div>
</div>
<div class="icard">
<div class="icard-t">🔔 확인 방법</div>
<div class="icard-b">대시보드 /risk 페이지<br>알림 3개+ = 포지션 축소 검토<br>Overview 페이지에도 요약 표시</div>
</div>
</div>`},
{t:"Verdict × Grade 매트릭스",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">Verdict × Grade — 최종 결과 해석</div>
<div class="s-sub">Verdict(시장 환경) × Grade(종목 품질) = Action(투자 행동)</div>
<div style="font-size:11px;color:#374151;margin-bottom:10px;background:#f9fafb;border-radius:6px;padding:8px">
<strong>Verdict</strong> = 시장 환경 판단 &nbsp;|&nbsp; <strong>Grade</strong> = 종목 품질 &nbsp;|&nbsp; <strong>Action</strong> = 투자 행동<br>
<strong>GO 조건:</strong> Regime 정상 + Gate GO + ML Bullish &nbsp;|&nbsp; <strong>STOP 조건:</strong> Regime crisis/risk_off 또는 Gate STOP
</div>
<div class="vmat">
<table>
<tr>
  <th style="background:#f9fafb"></th>
  <th style="background:#dcfce7;color:#15803d">Grade A/B<br><small>80점+</small></th>
  <th style="background:#f0f9ff;color:#0369a1">Grade C<br><small>48~79점</small></th>
  <th style="background:#fef2f2;color:#b91c1c">Grade D/F<br><small>48점 미만</small></th>
</tr>
<tr>
  <td class="vgo" style="font-weight:700;color:#16a34a">🟢 GO<br><small>시장 정상</small></td>
  <td class="vgo"><span class="ab">BUY</span></td>
  <td class="vgo"><span class="aw">WATCH</span></td>
  <td class="vgo"><span class="aw">WATCH</span></td>
</tr>
<tr>
  <td class="vcau" style="font-weight:700;color:#d97706">🟡 CAUTION<br><small>불확실</small></td>
  <td class="vcau"><span class="asb">SMALL BUY</span></td>
  <td class="vcau"><span class="aw">WATCH</span></td>
  <td class="vcau"><span class="aw">WATCH</span></td>
</tr>
<tr>
  <td class="vstop" style="font-weight:700;color:#dc2626">🔴 STOP<br><small>위기/약세</small></td>
  <td class="vstop"><span class="ah">HOLD</span></td>
  <td class="vstop"><span class="ah">HOLD</span></td>
  <td class="vstop"><span class="ah">HOLD</span></td>
</tr>
</table>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff;margin-top:12px">
<p>이것이 us-stock의 최종 결론이다 — 매일 아침 이 매트릭스에서 오늘 할 일이 결정된다</p>
</div>`},
{t:"/regime 페이지 — 시장 체제 실시간 판단",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/regime 페이지 — 시장 체제 실시간 판단</div>
<div class="s-sub">이 페이지에서 시장이 '지금 살 만한가'를 5가지 센서로 판단한다</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📊 무엇을 보여주나</div>
<div class="icard-b">
시장 체제 배지: risk_on / neutral / risk_off / crisis<br>
체제 점수 (현재 수치)<br>
5센서 각각의 상태 (정상/주의/위험)<br>
Market Gate: GO / CAUTION / STOP<br>
섹터 히트맵: 11개 섹터 수익률
</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">
체제 배지 색상이 가장 중요<br>
빨간 센서 3개+ = 시장 위험 신호<br>
Gate가 STOP = 이미 매수 금지<br>
섹터 히트맵 초록 많음 = 시장 건강
</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>이것만 기억: 체제 배지가 crisis/risk_off이거나 Gate가 STOP이면 → 신규 매수 금지</p>
</div>`},
{t:"/top-picks 페이지 — 추천 종목",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/top-picks 페이지 — 상위 20종목 추천</div>
<div class="s-sub">6팩터 복합 점수 기준 상위 종목 목록 — 오늘 살 만한 종목 목록</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📋 테이블 컬럼 설명</div>
<div class="icard-b">
Ticker: 종목 코드 (AAPL, NVDA 등)<br>
Grade: A~F 등급<br>
Score: 0~100 복합 점수<br>
Strategy: Trend / Swing / Reversal<br>
Action: BUY / SMALL BUY / WATCH / HOLD<br>
Sector: 섹터 분류
</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">
Grade A + BUY = 가장 강한 매수 신호<br>
Grade B + SMALL BUY = CAUTION 체제에서 소량<br>
WATCH = 관망, HOLD = 매수 금지<br>
Strategy: Trend = 추세 추종, Reversal = 반등 노림
</div>
</div>
</div>
<table class="tbl" style="margin-bottom:12px">
<tr><th>Grade</th><th>점수</th><th>의미</th></tr>
<tr><td>A</td><td>80+</td><td>Strong Accumulation</td></tr>
<tr><td>B</td><td>62+</td><td>Moderate</td></tr>
<tr><td>C</td><td>48+</td><td>Neutral</td></tr>
<tr><td>D</td><td>35+</td><td>Distribution</td></tr>
<tr><td>F</td><td>&lt;35</td><td>Capitulation</td></tr>
</table>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>GO 체제 + Grade A/B = BUY, CAUTION 체제 + Grade A/B = SMALL BUY → 오늘 Verdict와 Grade를 교차 확인</p>
</div>`},
{t:"/ai 페이지 — AI 투자 분석",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/ai 페이지 — 종목별 AI 투자 thesis</div>
<div class="s-sub">관심 종목의 투자 근거·상승 촉매·하락 리스크를 AI가 자동 생성</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📝 AI 분석 구조</div>
<div class="icard-b">
Investment Thesis: 투자 핵심 논거 (1~2문단)<br>
Bull Catalysts (상승 촉매): 3가지 상승 이유<br>
Bear Risks (하락 리스크): 2~3가지 위험 요인<br>
Recommendation: BUY / HOLD / SELL 추천
</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">
촉매 2개+ + 리스크 낮음 = 긍정적<br>
Recommendation과 Grade가 일치하면 신뢰도 높음<br>
Perplexity(3순위) = 실시간 뉴스 포함<br>
AI 한계: 미래를 모름 → 참고용, 결정은 본인이
</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>AI는 분석을 도와주는 도구다. 최종 투자 결정은 반드시 본인이 내린다</p>
</div>`},
{t:"/forecast 페이지 — ML 지수 예측",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/forecast 페이지 — SPY/QQQ 5일 방향 예측</div>
<div class="s-sub">LightGBM이 27개 피처로 계산한 SPY/QQQ 상승 확률</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📊 DirectionCard 구성</div>
<div class="icard-b">
방향: BULLISH / BEARISH / NEUTRAL<br>
신뢰도 %: 상승 확률<br>
Key Drivers: 예측에 영향 큰 피처 Top 3<br>
5일 예측 기간
</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">
≥70% 녹색 = 고신뢰 BULLISH → 매수 적합<br>
50~70% 노랑 = 중간 신뢰<br>
&lt;50% 빨강 = 신중, 매수 자제<br>
SPY + QQQ 둘 다 BULLISH 70%+ = 가장 강한 매수 신호
</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>5분 투자 루틴의 마지막 체크포인트 — Verdict GO + SPY BULLISH 70%+ + Grade A/B = 오늘 매수 실행</p>
</div>`},
{t:"/ml 페이지 — ML 팩터 분해",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/ml 페이지 — GBM 크로스섹션 종목 랭킹</div>
<div class="s-sub">Top Picks와 차이: 6팩터 점수가 전부 노출되어 종목별 강점/약점을 분석할 수 있다</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📊 /top-picks와 차이</div>
<div class="icard-b">
/top-picks: 종합 Grade + Action만 표시<br>
/ml: 기술적(25%) + 펀더멘털(20%) + 애널리스트(15%) + RS(15%) + 거래량(15%) + 13F(10%) 전부 수치로 표시<br>
팩터별 상대 점수 시각화
</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">
기술적 높음 + 펀더멘털 낮음 = 단기 모멘텀만 / 거품 가능성<br>
기술적 높음 + 펀더멘털 높음 = 튼튼한 종목<br>
13F 높음 = 기관 집중 매집 중<br>
애널리스트 높음 = 컨센서스 상향 중
</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>팩터 분해를 보면 Grade A가 된 이유를 알 수 있다 — 기술적 모멘텀인지, 펀더멘털 개선인지, 기관 매집인지</p>
</div>`},
{t:"/risk 페이지 — 리스크 모니터",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/risk 페이지 — 리스크 모니터</div>
<div class="s-sub">7종 알림 + VaR + CDaR + Stress Test — 포트폴리오 위험을 숫자로 관리</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📊 표시 정보</div>
<div class="icard-b">
활성 알림 목록 (심각도: HIGH/MEDIUM/LOW)<br>
Stop Loss Status: 체제별 현재 기준<br>
VaR (Value at Risk): 1일 최대 손실 추정<br>
CDaR (Conditional Drawdown at Risk): 극단적 손실 시나리오<br>
포트폴리오 집중도: 종목별/섹터별 비중
</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">
알림 3개+ = 포지션 축소 검토<br>
HIGH 알림 = 즉각 조치 필요<br>
Stress Test: 2008 금융위기 / 2020 코로나 시나리오 시뮬레이션<br>
집중도 경고 = 분산 필요
</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>알림이 많다고 무조건 팔지 않아도 된다 — 알림의 종류와 심각도를 보고 판단. HIGH가 3개+ = 진지하게 검토</p>
</div>`},
{t:"/performance 페이지 — 수익률 검증",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/performance 페이지 — 백테스트 수익률 검증</div>
<div class="s-sub">전략이 SPY를 이기는지 숫자로 검증 — 감이 아닌 수치로</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📊 핵심 지표</div>
<div class="icard-b">
Sharpe Ratio: 위험 조정 수익률 (1.0+ 양호)<br>
Alpha: SPY 대비 초과수익률<br>
MDD: 전략의 최대 낙폭<br>
Win Rate: 수익 종목 비율<br>
SPY 대비 수익률 커브 비교
</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">
Sharpe &gt;1.0 + Alpha 양수 = 전략이 SPY를 이기는 중<br>
MDD가 시장 MDD보다 낮으면 = 리스크 관리 성공<br>
Win Rate &gt;50% + Risk/Reward 2:1 = 좋은 전략<br>
백테스트 한계: 과거 수익률이 미래를 보장하지 않음
</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>비유: 운동선수 기록표 — 전략의 과거 성적을 SPY와 비교. 성적이 좋으면 전략을 신뢰, 나쁘면 파라미터 재검토</p>
</div>`},
{t:"/graph 페이지 — 관계 그래프",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">/graph 페이지 — 종목-섹터 네트워크 시각화</div>
<div class="s-sub">4가지 탭으로 시장 관계를 시각화 — "어떤 종목이 어떤 그룹에 속하나?"</div>
<table class="tbl" style="margin-bottom:14px">
<tr><th>탭명</th><th>보여주는 것</th><th>언제 쓰나</th></tr>
<tr><td>System View</td><td>전체 섹터-종목 네트워크</td><td>시장 전체 구조 파악</td></tr>
<tr><td>Stock View</td><td>특정 종목의 섹터/연관 종목</td><td>종목 포지셔닝 확인</td></tr>
<tr><td>Market View</td><td>날짜별 Grade A/B 종목 분포</td><td>날짜 변화 추적</td></tr>
<tr><td>Ticker-Centric</td><td>선택 종목 중심 그래프</td><td>특정 종목 심층 분석</td></tr>
</table>
<div class="grid2" style="margin-bottom:12px">
<div class="icard">
<div class="icard-t">📊 시각화 방법</div>
<div class="icard-b">노드 크기 = 점수<br>색상 = Grade (초록=A, 파랑=B)<br>연결선 = 섹터 소속<br>클러스터 = 같은 섹터 종목</div>
</div>
<div class="icard">
<div class="icard-t">🔍 어떻게 읽나</div>
<div class="icard-b">같은 섹터에 Grade A 밀집 = 섹터 테마 진행 중<br>고립된 노드 = 섹터와 무관한 독립 움직임</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>Ticker-Centric 탭에서 관심 종목을 선택 → 그 종목과 연관된 섹터/종목들의 Grade를 한 눈에 파악</p>
</div>`},
{t:"기본 실행 3단계",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">기본 실행 — 3단계</div>
<div class="s-sub">이 3줄이 전부다. 코딩 지식 불필요</div>
<div class="code-box">
<span class="cc"># Step 1: Python 환경 활성화</span><br>
<span class="cm">source .venv/bin/activate</span><br><br>
<span class="cc"># Step 2: 통합 분석 실행 (Phase 0~3 자동)</span><br>
<span class="cm">python scripts/run_integrated_analysis.py</span><br><br>
<span class="cc"># Step 3: 대시보드 실행</span><br>
<span class="cm">cd frontend &amp;&amp; npm run dev</span>
</div>
<div class="grid2" style="margin-top:14px;margin-bottom:12px">
<div class="icard">
<div class="icard-t">⚙️ 자동 실행 (평일 07:00)</div>
<div class="icard-b">macOS launchd가 Step 1+2 자동 실행<br>스케줄 변경: com.us-stock.daily.plist<br>상태 확인: --status 플래그</div>
</div>
<div class="icard">
<div class="icard-t">🔍 상태 확인 명령어</div>
<div class="icard-b">python scripts/run_daily_scheduler.py --status<br>logs/daily_run_YYYYMMDD.log 확인<br>output/reports/latest_report.json</div>
</div>
</div>
<div class="hl" style="border-color:#2563eb;background:#eff6ff">
<p>Step 3만 수동 실행하면 된다 — 매일 아침 Step 1/2는 자동으로 완료되어 있다</p>
</div>`},
{t:"투자 결정 5분 루틴",html:`
<div class="s-eye" style="color:#2563eb">SECTION 5</div>
<div class="s-title">투자 결정 5분 루틴</div>
<div class="s-sub">매일 아침 5분 — 5개 페이지 순서대로 확인</div>
<div class="routine">
<div class="r-step">
<div class="r-num">1</div>
<div class="r-page">/</div>
<div class="r-act">Overview 확인</div>
<div class="r-res">Verdict + 체제 배지 + 알림 수 확인 → GO/CAUTION/STOP 즉시 파악</div>
</div>
<div class="r-step">
<div class="r-num">2</div>
<div class="r-page">/regime</div>
<div class="r-act">5센서 상태 확인</div>
<div class="r-res">빨간 센서 3개+ = 매수 자제 / Gate STOP = 신규 매수 금지</div>
</div>
<div class="r-step">
<div class="r-num">3</div>
<div class="r-page">/top-picks</div>
<div class="r-act">Grade A/B 종목 확인</div>
<div class="r-res">GO + Grade A/B = BUY 후보 / CAUTION + Grade A/B = SMALL BUY 후보</div>
</div>
<div class="r-step">
<div class="r-num">4</div>
<div class="r-page">/ai</div>
<div class="r-act">AI 분석 확인</div>
<div class="r-res">Bull Catalysts 2개+ / Grade와 Recommendation 일치 여부 확인</div>
</div>

{t:"Part 1 — Rate Limit 우회: curl_cffi + yfinance",html:`
<span class="s-eye">SECTION 5</span>
<h2 class="s-title">Part 1 — Rate Limit 우회: curl_cffi + yfinance</h2>
<p class="s-sub">503종목 수집이 가능한 이유 — 브라우저 흉내 내기</p>
<div class="code-box">
<span class="cm"># 일반 requests — Yahoo Finance가 차단함</span>
<span class="cc">import requests
response = requests.get("https://query1.finance.yahoo.com/...")
<span style="color:#f87171;"># → 429 Too Many Requests (차단!)</span>

<span class="cm"># curl_cffi — 브라우저처럼 위장해서 차단 우회</span>
from curl_cffi import requests as cffi_requests
session = cffi_requests.Session(impersonate="chrome")
response = session.get("https://query1.finance.yahoo.com/...")
<span style="color:#4ade80;"># → 200 OK (성공!)</span></span>
</div>
<div class="grid2" style="margin-top:1.2em;">
  <div class="icard" style="border-color:#f87171;">
    <div class="icard-t" style="color:#f87171;">일반 requests</div>
    <div class="icard-b">
      <ul class="blist">
        <li>Python 기본 HTTP 라이브러리</li>
        <li>User-Agent: "python-requests/2.x"</li>
        <li>Yahoo Finance가 봇으로 인식</li>
        <li>50~100개 이후 <strong>429 에러</strong> 차단</li>
        <li>503종목 수집 <strong>불가능</strong></li>
      </ul>
    </div>
  </div>
  <div class="icard" style="border-color:#4ade80;">
    <div class="icard-t" style="color:#4ade80;">curl_cffi (Chrome 위장)</div>
    <div class="icard-b">
      <ul class="blist">
        <li>Chrome 브라우저 TLS fingerprint 복제</li>
        <li>User-Agent: 실제 Chrome 값</li>
        <li>Yahoo Finance가 사람으로 인식</li>
        <li>503종목 연속 수집 <strong>성공</strong></li>
        <li>yfinance 내부에서 자동 적용</li>
      </ul>
    </div>
  </div>
</div>
<div class="hl"><p>이 패턴이 없으면 503 종목 수집이 불가능하다. <code>Session(impersonate="chrome")</code> 한 줄이 핵심.</p></div>
`},

      <div style="display:flex;align-items:center;gap:10px"><div style="width:60px;background:#14532d;border:1px solid #16a34a;border-radius:6px;text-align:center;padding:5px 0;color:#86efac;font-weight:800;font-size:13px">GO</div><div style="color:#94a3b8;font-size:12px">Regime OK + Gate GO + ML Bullish → 매수 검토</div></div>

      <div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#94a3b8;font-size:12px">TREND (25%)</span><span style="background:#1e3a5f;color:#93c5fd;font-size:10px;padding:2px 8px;border-radius:4px">NEUTRAL</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#94a3b8;font-size:12px">BREADTH (18%)</span><span style="background:#1e3a5f;color:#93c5fd;font-size:10px;padding:2px 8px;border-radius:4px">NEUTRAL</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#94a3b8;font-size:12px">CREDIT (15%)</span><span style="background:#14532d;color:#86efac;font-size:10px;padding:2px 8px;border-radius:4px">RISK ON</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#94a3b8;font-size:12px">YIELD CURVE (12%)</span><span style="background:#450a0a;color:#fca5a5;font-size:10px;padding:2px 8px;border-radius:4px">RISK OFF</span></div>
    </div>
  </div>

slides:[

{t:"Claude Code 기본 설정",html:`
<div class="s-eye" style="color:#4338ca">SECTION 6</div>
<div class="s-title">Claude Code 기본 설정</div>
<div class="s-sub">CLAUDE.md + settings.json + ~/.claude/ — 이 3가지가 Claude Code의 뼈대</div>
<div class="grid3">
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">📋 CLAUDE.md</div>
<div class="icard-b" style="font-size:12px">
프로젝트 지침 파일<br>
저장 위치: 프로젝트 루트<br>
Claude가 매 대화 시작 시 자동 읽음<br>
아키텍처·규칙·금지 패턴 정의<br><br>
us-stock CLAUDE.md<br>= 1,200줄 이상의 시스템 설명서
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">⚙️ settings.json</div>
<div class="icard-b" style="font-size:12px">
저장 위치: ~/.claude/settings.json<br><br>
주요 설정:<br>
· autoApproveTools (자동 승인 도구)<br>
· model (기본 모델)<br>
· permissions (파일 접근 범위)<br><br>
빠른 설정: /settings 명령어로 UI 열기
</div>
</div>
<div class="icard" style="border-top:3px solid #4338ca">
<div class="icard-t">🗂️ ~/.claude/ 구조</div>
<div class="icard-b" style="font-size:12px">
<div class="code-box" style="font-size:11px">
<span class="cm">~/.claude/</span><br>
<span class="cm">├── CLAUDE.md</span> <span class="cc"># 전역 지침</span><br>
<span class="cm">├── settings.json</span> <span class="cc"># 전역 설정</span><br>
<span class="cm">├── output-styles/</span> <span class="cc"># 응답 스타일</span><br>
<span class="cm">└── skills/</span> <span class="cc"># 전역 스킬 모음</span>
</div>
</div>
</div>
</div>
<table class="tbl" style="margin-top:12px">
<tr><th>설정 파일</th><th>위치</th><th>용도</th></tr>
<tr><td>~/.claude/CLAUDE.md</td><td>전역</td><td>모든 프로젝트 공통 지침</td></tr>
<tr><td>프로젝트/CLAUDE.md</td><td>프로젝트</td><td>해당 프로젝트 전용 규칙</td></tr>
<tr><td>~/.claude/settings.json</td><td>전역</td><td>모델·권한·훅 설정</td></tr>
<tr><td>.claude/settings.local.json</td><td>로컬</td><td>git 미추적, 개인 설정</td></tr>
</table>
<div class="hl" style="border-color:#4338ca;background:#eef2ff;margin-top:12px">
<p>us-stock의 CLAUDE.md를 보면 전체 시스템 설명서가 담겨있다 — 아키텍처·데이터 흐름·API 키 사용법까지</p>
</div>`},
