<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI시대의 미국주식 투자 — 3시간 특강</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f9fafb;color:#111827}
#app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;height:100vh;background:#111827;color:#f9fafb;display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:20px 16px 14px;border-bottom:1px solid #1f2937}
.sb-eyebrow{font-size:10px;font-weight:700;letter-spacing:1px;color:#6b7280;text-transform:uppercase;margin-bottom:4px}
.sb-title{font-size:13px;font-weight:700;color:#f9fafb;line-height:1.4}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
.sb-sec{width:100%;text-align:left;padding:9px 16px;background:none;border:none;cursor:pointer;color:#9ca3af;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
.sb-sec:hover,.sb-sec.active{background:#1f2937;color:#f9fafb}
.sb-dot{width:8px;height:8px;border-radius:50%;border:2px solid;flex-shrink:0;transition:background .15s}
.sb-sec.active .sb-dot{background:currentColor}
.sb-num{font-size:10px;opacity:.4;min-width:14px}
.sb-name{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.sb-cnt{font-size:10px;opacity:.35}
.sb-footer{padding:12px 16px;border-top:1px solid #1f2937}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-bottom:5px}
.prog-bar{height:3px;background:#374151;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s}
.kbd-hint{font-size:10px;color:#4b5563;margin-top:7px;text-align:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.top-bar{height:52px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0}
.sec-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.top-title{font-size:14px;font-weight:600;color:#111827;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-cnt{font-size:12px;color:#9ca3af;white-space:nowrap}
.slide-area{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:28px 24px}
.slide-area::-webkit-scrollbar{width:5px}
.slide-area::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.slide-card{width:100%;max-width:800px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:36px 44px;animation:si .18s ease}
@keyframes si{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bot-nav{height:58px;background:#fff;border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.nav-btn{padding:8px 18px;border-radius:7px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#374151;transition:all .15s}
.nav-btn:hover{background:#f3f4f6}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.pri{background:#111827;color:#fff;border-color:#111827}
.nav-btn.pri:hover{background:#1f2937}
.dots{display:flex;gap:4px;align-items:center}
.d{width:5px;height:5px;border-radius:50%;background:#d1d5db;transition:all .2s}
.d.on{width:16px;border-radius:3px}

/* ── SLIDE CONTENT STYLES ── */
.s-eye{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.s-title{font-size:26px;font-weight:800;color:#111827;margin-bottom:4px;line-height:1.3}
.s-sub{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.5}
.s-div{height:1px;background:#f3f4f6;margin:22px 0}

.cover-wrap{text-align:center;padding:16px 0 8px}
.cover-main{font-size:38px;font-weight:800;line-height:1.2;margin-bottom:10px}
.cover-desc{font-size:18px;color:#6b7280;margin-bottom:28px}
.cover-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.cv-stat{text-align:center}
.cv-val{font-size:20px;font-weight:800}
.cv-key{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.icard{background:#f9fafb;border:1px solid #f3f4f6;border-radius:8px;padding:14px}
.icard-t{font-size:12px;font-weight:700;color:#374151;margin-bottom:7px}
.icard-b{font-size:12px;color:#6b7280;line-height:1.6}

.hl{border-left:4px solid;padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0}
.hl p{font-size:14px;line-height:1.6;color:#374151}

.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;text-align:left;background:#f9fafb;border-bottom:2px solid #e5e7eb;font-weight:700;color:#374151}
.tbl td{padding:8px 10px;border-bottom:1px solid #f3f4f6;color:#374151}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}

.blist{list-style:none}
.blist li{padding:5px 0 5px 16px;position:relative;font-size:13px;color:#374151;line-height:1.5}
.blist li::before{content:"▸";position:absolute;left:0;color:#9ca3af}
.blist li strong{color:#111827}

.code-box{background:#1e293b;color:#e2e8f0;padding:14px 18px;border-radius:8px;font-family:'JetBrains Mono',Menlo,monospace;font-size:12px;line-height:1.6;margin:10px 0;overflow-x:auto}
.cc{color:#64748b}
.cm{color:#7dd3fc}

/* ── ARCHITECTURE DIAGRAM (drawio colors) ── */
.arch{max-width:560px;margin:0 auto}
.arch-src{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:8px}
.arch-src span{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8}
.arch-arr{text-align:center;color:#9ca3af;font-size:16px;line-height:1.7}
.arch-ph{padding:12px 16px;border-radius:8px;border-left:5px solid;margin:3px 0;display:flex;align-items:center;gap:12px}
.ph-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:#6b7280;min-width:58px;letter-spacing:.4px}
.ph-info .ph-t{font-size:13px;font-weight:700;color:#111827;margin-bottom:2px}
.ph-info .ph-d{font-size:11px;color:#6b7280}
.p1{background:#eff6ff;border-color:#6c8ebf}
.p2{background:#f0fdf4;border-color:#82b366}
.p3{background:#fff7ed;border-color:#ef6c00}
.p4{background:#fef2f2;border-color:#c62828}
.p5{background:#f0fdfa;border-color:#00838f}
.pdash{background:#f5f3ff;border-color:#7c4dff}
.pdeploy{background:#f0fdf4;border-color:#2e7d32}

/* ── 5-SENSOR DIAGRAM ── */
.sns-row{display:flex;gap:7px;margin-bottom:14px}
.sns-c{flex:1;padding:11px 8px;border-radius:8px;border:2px solid;text-align:center}
.sns-pct{font-size:18px;font-weight:800;margin-bottom:1px}
.sns-name{font-size:12px;font-weight:700;margin-bottom:2px}
.sns-desc{font-size:10px;color:#6b7280;margin-bottom:3px}
.sns-src{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;display:inline-block}
.sv{border-color:#ef4444;background:#fef2f2}.sv .sns-pct{color:#dc2626}.sv .sns-src{background:#fee2e2;color:#b91c1c}
.st{border-color:#3b82f6;background:#eff6ff}.st .sns-pct{color:#2563eb}.st .sns-src{background:#dbeafe;color:#1d4ed8}
.sb2{border-color:#10b981;background:#ecfdf5}.sb2 .sns-pct{color:#059669}.sb2 .sns-src{background:#d1fae5;color:#065f46}
.sc{border-color:#f59e0b;background:#fffbeb}.sc .sns-pct{color:#d97706}.sc .sns-src{background:#fef3c7;color:#92400e}
.sy{border-color:#8b5cf6;background:#f5f3ff}.sy .sns-pct{color:#7c3aed}.sy .sns-src{background:#ede9fe;color:#5b21b6}
.reg-row{display:flex;gap:7px}
.reg-c{flex:1;padding:9px;border-radius:7px;text-align:center;border:2px solid}
.reg-name{font-size:11px;font-weight:700;margin-bottom:1px}
.reg-range{font-size:10px;color:#6b7280}
.ro{background:#f0fdf4;border-color:#22c55e;color:#16a34a}
.rn{background:#f0f9ff;border-color:#38bdf8;color:#0284c7}
.roff{background:#fffbeb;border-color:#fbbf24;color:#d97706}
.rc{background:#fef2f2;border-color:#ef4444;color:#dc2626}

/* ── 6-FACTOR DIAGRAM ── */
.fct-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.fct-c{padding:11px;border-radius:8px;border:1px solid;text-align:center}
.fct-pct{font-size:17px;font-weight:800;margin-bottom:2px}
.fct-name{font-size:11px;font-weight:700;margin-bottom:3px}
.fct-met{font-size:10px;color:#6b7280}
.ft{background:#eff6ff;border-color:#93c5fd;color:#2563eb}
.ff{background:#fefce8;border-color:#fde047;color:#ca8a04}
.fa{background:#fdf4ff;border-color:#e879f9;color:#a21caf}
.fr{background:#ecfdf5;border-color:#86efac;color:#16a34a}
.fv{background:#fff7ed;border-color:#fdba74;color:#ea580c}
.f3{background:#faf5ff;border-color:#c4b5fd;color:#7c3aed}

/* ── AI INVESTMENT FLOW ── */
.ai-trig{text-align:center;margin-bottom:12px}
.ai-trig-box{display:inline-block;padding:10px 24px;border-radius:8px;background:#1e293b;color:#f8fafc;font-weight:700;font-size:14px}
.ai-trig-box span{display:block;font-size:11px;font-weight:400;color:#94a3b8;margin-top:2px}
.ai-chain{display:flex;align-items:stretch;gap:0}
.ai-step{flex:1;padding:14px 10px;border-radius:8px;border:2px solid;text-align:center}
.ai-arr{display:flex;align-items:center;font-size:22px;color:#9ca3af;padding:0 3px}
.ai-icon{font-size:22px;margin-bottom:5px}
.ai-sname{font-size:13px;font-weight:800;margin-bottom:3px}
.ai-tick{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-bottom:5px;display:inline-block}
.ai-sdesc{font-size:10px;color:#6b7280;line-height:1.4}
.adc{background:#eff6ff;border-color:#6c8ebf}.adc .ai-sname{color:#1d4ed8}.adc .ai-tick{background:#dbeafe;color:#1d4ed8}
.asc{background:#f5f3ff;border-color:#a78bfa}.asc .ai-sname{color:#7c3aed}.asc .ai-tick{background:#ede9fe;color:#7c3aed}
.amc{background:#ecfdf5;border-color:#6ee7b7}.amc .ai-sname{color:#059669}.amc .ai-tick{background:#d1fae5;color:#065f46}
.asvc{background:#fff7ed;border-color:#fdba74}.asvc .ai-sname{color:#c2410c}.asvc .ai-tick{background:#fed7aa;color:#c2410c}

/* ── IT STACK ── */
.it-stack{display:flex;flex-direction:column;gap:6px;max-width:520px;margin:0 auto}
.it-lay{padding:9px 14px;border-radius:6px;border-left:4px solid;display:flex;align-items:center;gap:10px}
.it-name{font-size:12px;font-weight:700;min-width:90px}
.it-desc{font-size:11px;color:#6b7280;flex:1}
.it-ex{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap}

/* ── VERDICT MATRIX ── */
.vmat{margin-top:12px}
.vmat table{width:100%;border-collapse:collapse}
.vmat th{padding:9px 12px;font-size:12px;font-weight:700;background:#f9fafb;border:1px solid #e5e7eb}
.vmat td{padding:9px 12px;text-align:center;border:1px solid #e5e7eb;font-size:12px}
.vgo{background:#f0fdf4}.vcau{background:#fffbeb}.vstop{background:#fef2f2}
.ab{background:#dcfce7;color:#15803d;border-radius:5px;padding:3px 9px;font-weight:700;display:inline-block}
.asb{background:#fef9c3;color:#854d0e;border-radius:5px;padding:3px 9px;font-weight:700;display:inline-block}
.aw{background:#f1f5f9;color:#475569;border-radius:5px;padding:3px 9px;font-weight:600;display:inline-block}
.ah{background:#fee2e2;color:#b91c1c;border-radius:5px;padding:3px 9px;font-weight:600;display:inline-block}

/* ── GRADE CARDS ── */
.grade-row{display:flex;gap:7px;margin-top:8px}
.g-c2{flex:1;padding:9px;border-radius:7px;text-align:center;border:2px solid}
.g-lt{font-size:22px;font-weight:900}
.g-sc{font-size:10px;color:#6b7280;margin-top:1px}
.g-nm{font-size:9px;font-weight:600;margin-top:3px}
.ga{background:#dcfce7;border-color:#86efac;color:#15803d}
.gb{background:#ecfdf5;border-color:#a7f3d0;color:#059669}
.gc{background:#f0f9ff;border-color:#bae6fd;color:#0369a1}
.gd{background:#fffbeb;border-color:#fde68a;color:#d97706}
.gf{background:#fef2f2;border-color:#fca5a5;color:#dc2626}

/* ── ROUTINE STEPS ── */
.routine{display:flex;flex-direction:column;gap:7px}
.r-step{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f9fafb;border-radius:8px;border:1px solid #f3f4f6}
.r-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.r-page{font-size:13px;font-weight:700;color:#111827}
.r-act{font-size:11px;color:#6b7280}
.r-res{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;margin-left:auto;white-space:nowrap}

/* ── DEPLOY SPLIT ── */
.deploy-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0;margin:14px 0}
.dbox{padding:14px;border-radius:8px;border:2px solid}
.dmac{background:#eff6ff;border-color:#93c5fd}
.dnas{background:#f0fdf4;border-color:#86efac}
.darr{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 14px}
.darr-icon{font-size:22px;color:#6b7280}
.darr-lbl{font-size:9px;font-weight:700;color:#6b7280;text-align:center;line-height:1.3}
.dbox-t{font-size:12px;font-weight:800;margin-bottom:7px}
.dbox-b{font-size:11px;color:#6b7280;line-height:1.7}

/* ── DASH PAGES GRID ── */
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pg-item{padding:9px 12px;background:#f9fafb;border:1px solid #f3f4f6;border-radius:7px}
.pg-route{font-size:10px;font-weight:700;color:#6b7280;font-family:monospace;margin-bottom:1px}
.pg-name{font-size:12px;font-weight:700;color:#111827;margin-bottom:1px}
.pg-desc{font-size:11px;color:#6b7280}

/* ── KERNEL DIAGRAM ── */
.ker-stack{display:flex;flex-direction:column;gap:5px;max-width:520px;margin:0 auto}
.ker-lay{padding:11px 16px;border-radius:7px;font-size:13px;font-weight:700;text-align:center}
.ker-arr{text-align:center;color:#9ca3af;font-size:13px;line-height:2}

/* ── CPU DIAGRAM ── */
.cpu-wrap{display:flex;gap:16px;align-items:center;justify-content:center;margin:12px 0;flex-wrap:wrap}
.cpu-box{border:2px solid;border-radius:8px;padding:12px 14px;text-align:center;min-width:150px}
.cpu-units{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.cpu-unit{padding:8px 10px;border-radius:5px;font-size:12px;font-weight:700;border:1px solid}
.cpu-bus{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}

/* ── CONTEXT SWITCH DIAGRAM ── */
.ctx-grid{display:grid;grid-template-columns:1fr 54px 1fr 54px 1fr;gap:8px;align-items:start;margin:12px 0}
.ctx-proc,.ctx-os{border:2px solid;border-radius:8px;padding:10px;text-align:center}
.ctx-arr{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:14px}
.ctx-pcb{font-size:10px;padding:3px 8px;border-radius:4px;margin-top:4px;display:inline-block;font-weight:600}

/* ── 3-TIER WEB ARCH ── */
.web3-row{display:flex;align-items:stretch;gap:0;margin:14px 0}
.web3-node{flex:1;border:2px solid;border-radius:8px;padding:11px 7px;text-align:center}
.web3-mid{display:flex;align-items:center;justify-content:center;padding:0 5px;font-size:18px;color:#9ca3af}
.web3-icon{font-size:20px;margin-bottom:4px}
.web3-name{font-size:12px;font-weight:800;margin-bottom:2px}
.web3-role{font-size:10px;color:#6b7280;margin-bottom:5px}
.web3-tech{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;display:inline-block}

/* ── API COST CARDS ── */
.api-row{display:flex;gap:10px;margin-bottom:10px}
.api-c{flex:1;padding:13px;border-radius:8px;border:2px solid;text-align:center}
.api-name{font-size:12px;font-weight:700;margin-bottom:3px}
.api-rank{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-bottom:7px;display:inline-block}
.api-price{font-size:18px;font-weight:800;margin-bottom:1px}
.api-unit{font-size:10px;color:#6b7280}
.api-note{font-size:11px;margin-top:5px}
.ag{background:#f0fdf4;border-color:#86efac}.ag .api-price{color:#059669}.ag .api-rank{background:#dcfce7;color:#15803d}
.ao{background:#eff6ff;border-color:#93c5fd}.ao .api-price{color:#2563eb}.ao .api-rank{background:#dbeafe;color:#1e40af}
.ap{background:#f5f3ff;border-color:#c4b5fd}.ap .api-price{color:#7c3aed}.ap .api-rank{background:#ede9fe;color:#5b21b6}
</style>
</head>
<body>
<div id="app">
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-eyebrow">프린들 특강 2026</div>
    <div class="sb-title">AI시대의 미국주식 투자</div>
  </div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-footer">
    <div class="prog-row"><span id="prog-txt">1 / 37</span><span id="prog-pct">3%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:3%"></div></div>
    <div class="kbd-hint">← → Space &nbsp;|&nbsp; 1~7 섹션</div>
  </div>
</aside>
<main class="main">
  <header class="top-bar">
    <span class="sec-badge" id="sec-badge"></span>
    <span class="top-title" id="top-title"></span>
    <span class="top-cnt" id="top-cnt"></span>
  </header>
  <div class="slide-area">
    <div class="slide-card" id="slide-card">
      <div id="slide-content"></div>
    </div>
  </div>
  <footer class="bot-nav">
    <button class="nav-btn" id="prev-btn" onclick="nav(-1)">← 이전</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn pri" id="next-btn" onclick="nav(1)">다음 →</button>
  </footer>
</main>
</div>

<script>
const SEC = [
{id:1,num:"01",title:"Opening Hook",sub:"세상이 빠르게 변하고 있다",color:"#f43f5e",cl:"#fff1f2",
slides:[
{t:"AI시대의 미국주식 투자",html:`
<div class="cover-wrap">
<div class="s-eye" style="color:#f43f5e">SECTION 1 · OPENING HOOK</div>
<div class="cover-main">AI시대의<br>미국주식 투자</div>
<div class="cover-desc">3시간 특강 — 기초부터 Claude Code 자동 분석까지</div>
<div class="cover-stats">
<div class="cv-stat"><div class="cv-val" style="color:#f43f5e">3h</div><div class="cv-key">강의 시간</div></div>
<div class="cv-stat"><div class="cv-val" style="color:#f43f5e">7</div><div class="cv-key">섹션</div></div>
<div class="cv-stat"><div class="cv-val" style="color:#f43f5e">503</div><div class="cv-key">S&amp;P 500 종목</div></div>

<div class="ker-arr">↕</div>
<div class="ker-lay" style="background:#1e293b;border:2px solid #475569;color:#f8fafc">
  하드웨어 (CPU · RAM · 디스크 · 네트워크 카드)
</div>
</div>
<div class="hl" style="border-color:#0891b2;background:#ecfeff;margin-top:10px">
<p>사용자 → 인터페이스 → 커널 → 드라이버 → 하드웨어. <strong>직접 접근 불가 — 인터페이스(API)를 통해서만</strong></p>
</div>`},
{t:"CPU + 메모리 구조",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS</div>
<div class="s-title">CPU + 메모리 구조 (폰 노이만)</div>
<div class="s-sub">CPU와 메모리 사이에 버스(데이터 통로)를 두고 데이터를 전송 — 프로그램 내장 방식</div>
<div class="cpu-wrap">
<div class="cpu-box" style="border-color:#2563eb;background:#eff6ff">
  <div style="font-size:13px;font-weight:800;color:#2563eb;margin-bottom:8px">CPU</div>
  <div class="cpu-units">
    <div class="cpu-unit" style="background:#dbeafe;border-color:#93c5fd;color:#1d4ed8">제어장치 (CU)<br><span style="font-size:10px;font-weight:400;color:#6b7280">명령어 해석·제어</span></div>
    <div class="cpu-unit" style="background:#fce7f3;border-color:#f9a8d4;color:#be185d">연산장치 (ALU)<br><span style="font-size:10px;font-weight:400;color:#6b7280">사칙연산·논리비교</span></div>
    <div class="cpu-unit" style="background:#d1fae5;border-color:#6ee7b7;color:#065f46">레지스터<br><span style="font-size:10px;font-weight:400;color:#6b7280">CPU 내부 임시 저장</span></div>
  </div>
</div>
<div class="cpu-bus">
  <div style="font-size:10px;font-weight:700;color:#6b7280;margin-bottom:3px">버스</div>
  <div style="width:4px;height:70px;background:#9ca3af;border-radius:2px"></div>
  <div style="font-size:9px;color:#9ca3af;margin-top:3px;text-align:center">데이터<br>전달</div>
</div>
<div class="cpu-box" style="border-color:#059669;background:#f0fdf4">
  <div style="font-size:13px;font-weight:800;color:#059669;margin-bottom:8px">메모리</div>
  <div class="cpu-units">
    <div class="cpu-unit" style="background:#dcfce7;border-color:#86efac;color:#166534">RAM<br><span style="font-size:10px;font-weight:400;color:#6b7280">실행 데이터 · 전력 OFF=소실<br>랜덤 접근 가능</span></div>
    <div class="cpu-unit" style="background:#fef9c3;border-color:#fde047;color:#854d0e">ROM<br><span style="font-size:10px;font-weight:400;color:#6b7280">BIOS 저장 · 전력 OFF도 유지<br>쓰기 불가</span></div>
  </div>
</div>
</div>`},
{t:"Context Switching",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS ⭐</div>
<div class="s-title">Context Switching</div>
<div class="s-sub">실행 중인 프로세스를 교체하는 핵심 메커니즘 — PCB에 상태를 저장하고 복원한다</div>
<div class="ctx-grid">
<div class="ctx-proc" style="border-color:#2563eb;background:#eff6ff">
  <div style="font-size:13px;font-weight:800;color:#2563eb;margin-bottom:5px">프로세스 A</div>
  <div style="font-size:10px;color:#6b7280;margin-bottom:6px">CPU에서 실행 중</div>
  <div class="ctx-pcb" style="background:#dbeafe;color:#1d4ed8">PCB A 저장</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px;line-height:1.5">레지스터 값<br>프로그램 카운터<br>→ <strong>Ready 상태로</strong></div>
</div>
<div class="ctx-arr">
  <div style="font-size:14px;color:#9ca3af">→</div>
  <div style="font-size:9px;color:#6b7280;text-align:center;line-height:1.6">①인터럽트<br>②저장</div>
</div>
<div class="ctx-os" style="border-color:#ea580c;background:#fff7ed">
  <div style="font-size:13px;font-weight:800;color:#ea580c;margin-bottom:5px">운영체제</div>
  <div style="font-size:10px;color:#6b7280;margin-bottom:6px">CPU 스케줄러</div>
  <div style="font-size:11px;line-height:1.8;color:#374151">
    ① A 상태 → PCB A<br>
    ② B 선택 (스케줄링)<br>
    ③ PCB B → B 복원
  </div>
</div>
<div class="ctx-arr">
  <div style="font-size:14px;color:#9ca3af">→</div>
  <div style="font-size:9px;color:#6b7280;text-align:center;line-height:1.6">③복원<br>④재개</div>
</div>
<div class="ctx-proc" style="border-color:#059669;background:#f0fdf4">
  <div style="font-size:13px;font-weight:800;color:#059669;margin-bottom:5px">프로세스 B</div>
  <div style="font-size:10px;color:#6b7280;margin-bottom:6px">CPU 할당 받음</div>
  <div class="ctx-pcb" style="background:#dcfce7;color:#166534">PCB B 복원</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px;line-height:1.5">레지스터 복원<br>프로그램 카운터<br>→ <strong>Running 상태로</strong></div>
</div>
</div>
<div class="hl" style="border-color:#0891b2;background:#ecfeff;margin-top:6px">
<p>PCB = 프로세스 ID · 레지스터 · PC · 메모리 정보 · 스케줄링 정보. <strong>멀티태스킹의 핵심 원리</strong></p>
</div>`},
{t:"프로세스 상태 머신",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS</div>
<div class="s-title">프로세스 상태 머신</div>
<div class="s-sub">프로세스는 5가지 상태를 순환한다. CPU 스케줄러가 READY ↔ RUNNING을 결정</div>
<div style="display:grid;grid-template-columns:80px 38px 80px 54px 94px 38px 106px;align-items:center;gap:4px;max-width:500px;margin:14px auto">
<div style="border:2px solid #9ca3af;background:#f9fafb;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#6b7280">NEW</div><div style="font-size:10px;color:#9ca3af">생성</div></div>
<div style="text-align:center;font-size:16px;color:#9ca3af;line-height:1.2">→<br><span style="font-size:8px">fork</span></div>
<div style="border:2px solid #2563eb;background:#eff6ff;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#2563eb">READY</div><div style="font-size:10px;color:#3b82f6">준비</div></div>
<div style="text-align:center;font-size:10px;color:#6b7280;line-height:2">→ CPU<br>← I/O완료</div>
<div style="border:2px solid #059669;background:#ecfdf5;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#059669">RUNNING</div><div style="font-size:10px;color:#10b981">실행 중</div></div>
<div style="text-align:center;font-size:16px;color:#9ca3af;line-height:1.2">→<br><span style="font-size:8px">exit</span></div>
<div style="border:2px solid #475569;background:#f8fafc;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#475569">TERMINATED</div><div style="font-size:10px;color:#94a3b8">종료</div></div>
<div></div><div></div><div></div><div></div>
<div style="text-align:center;color:#9ca3af;font-size:18px;line-height:1.1">↕<br><span style="font-size:9px;color:#6b7280">I/O 요청<br>I/O 완료</span></div>
<div></div><div></div>
<div></div><div></div><div></div><div></div>
<div style="border:2px solid #ea580c;background:#fff7ed;border-radius:7px;padding:9px;text-align:center"><div style="font-size:11px;font-weight:800;color:#ea580c">WAITING</div><div style="font-size:10px;color:#f97316">I/O 대기</div></div>
<div></div><div></div>
</div>
<div class="grid2" style="margin-top:14px">
<div class="icard">
<div class="icard-t">상태 전환 요약</div>
<div class="icard-b" style="font-size:12px;line-height:1.9">
<strong>NEW → READY</strong>: fork() — 프로세스 생성<br>
<strong>READY → RUNNING</strong>: 스케줄러 선택 (CPU 할당)<br>
<strong>RUNNING → WAITING</strong>: I/O 요청 (disk · network)<br>
<strong>WAITING → READY</strong>: I/O 완료 인터럽트<br>
<strong>RUNNING → TERMINATED</strong>: exit() 호출
</div>
</div>
<div class="icard">
<div class="icard-t">WAITING이 필요한 이유</div>
<div class="icard-b" style="font-size:12px">
CPU: <strong>ns (나노초)</strong> 단위<br>
Disk I/O: <strong>ms (밀리초)</strong> 단위<br>
→ <strong>10만 배 속도 차이</strong><br><br>
기다리는 동안 CPU를 독점하면 낭비.<br>
WAITING으로 빼고 다른 프로세스에게 CPU 양보 = <strong>멀티태스킹 핵심</strong>
</div>
</div>
</div>`},
{t:"Thread vs Process",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · OS</div>
<div class="s-title">Thread vs Process</div>
<div class="s-sub">Process = 독립 실행 단위. Thread = Process 안의 실행 흐름. 메모리 공유가 핵심 차이</div>
<div class="grid2" style="margin-bottom:12px">
<div class="icard" style="border-top:3px solid #7c3aed">
<div class="icard-t">Process — 독립 메모리</div>
<div class="icard-b">
<div style="border:2px solid #7c3aed;border-radius:6px;padding:8px;margin-bottom:8px">
<div style="font-size:10px;font-weight:700;text-align:center;color:#7c3aed;margin-bottom:5px">Process A</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">CODE</div>
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">DATA</div>
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">HEAP</div>
<div style="background:#f3e8ff;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#7c3aed">STACK</div>
</div>
</div>
<div style="font-size:10px;text-align:center;color:#6b7280">완전 독립 — 메모리 공유 없음</div>
</div>
</div>
<div class="icard" style="border-top:3px solid #059669">
<div class="icard-t">Thread — 메모리 공유</div>
<div class="icard-b">
<div style="border:2px solid #059669;border-radius:6px;padding:8px">
<div style="font-size:10px;font-weight:700;text-align:center;color:#059669;margin-bottom:5px">Process B</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:5px">
<div style="background:#d1fae5;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#059669">CODE</div>
<div style="background:#d1fae5;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#059669">DATA</div>
<div style="background:#d1fae5;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#059669">HEAP</div>
</div>
<div style="font-size:9px;text-align:center;color:#6b7280;margin-bottom:4px">공유(Shared)</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
<div style="background:#fef9c3;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#ca8a04">STACK<br><span style="font-size:8px;font-weight:400">Thread 1</span></div>
<div style="background:#fef9c3;border-radius:4px;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#ca8a04">STACK<br><span style="font-size:8px;font-weight:400">Thread 2</span></div>
</div>
<div style="font-size:9px;text-align:center;color:#6b7280;margin-top:4px">개별(Per-Thread)</div>
</div>
</div>
</div>
</div>
<table class="tbl">
<tr><th></th><th>Chrome 브라우저</th><th>Firefox 브라우저</th></tr>
<tr><td><strong>구조</strong></td><td>탭마다 독립 Process</td><td>4개 Process + 다수 Thread</td></tr>
<tr><td><strong>장점</strong></td><td>탭 충돌 격리 (안정·보안)</td><td>메모리 절약, 빠른 탭 전환</td></tr>
<tr><td><strong>단점</strong></td><td>탭 100개 = 메모리 폭발</td><td>한 탭 오류가 전파될 수 있음</td></tr>
</table>`},
{t:"WEB 기초 — URL · HTTP",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · WEB</div>
<div class="s-title">WEB 기초 — URL · HTTP Method · 상태코드</div>
<div class="s-sub">URL = 리소스가 저장된 위치(서버). HTTP Header의 요청 부분 = Method</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">🌐 URL (Uniform Resource Locator)</div>
<div class="icard-b">
<strong>통합 Resource가 저장된 위치(서버)</strong><br>
<code style="font-size:11px">https://example.com/path</code><br><br>
HTTP Header = 요청·응답 메타정보<br>
<strong>요청 Header = Method (GET/POST 등)</strong>
</div>
</div>
<div class="icard">
<div class="icard-t">📤 HTTP Method (요청)</div>
<div class="icard-b">
<strong>GET ≒ Download ≒ Read</strong><br>
→ 서버에서 데이터 조회/다운로드<br><br>
<strong>POST ≒ Write ≒ Upload</strong><br>
→ 서버에 데이터 생성/업로드
</div>
</div>
</div>
<table class="tbl">
<tr><th>상태코드</th><th>의미</th><th>설명</th></tr>
<tr><td><strong style="color:#059669">200 OK</strong></td><td>성공</td><td>요청이 정상 처리됨</td></tr>
<tr><td><strong style="color:#2563eb">301</strong></td><td>영구 이동 (Permanently Moved)</td><td>URL 영구 변경 — SEO 점수 새 URL로 이전</td></tr>
<tr><td><strong style="color:#0891b2">302</strong></td><td>임시 이동 (Temporarily Moved)</td><td>URL 임시 변경 — SEO 점수 원본 유지</td></tr>
<tr><td><strong style="color:#dc2626">404 Not Found</strong></td><td>없음</td><td>해당 리소스를 서버에서 찾을 수 없음</td></tr>
</table>`},
{t:"웹서비스 3-Tier 아키텍처",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · WEB</div>
<div class="s-title">웹서비스 3-Tier 아키텍처</div>
<div class="s-sub">Client → Web Server(송수신) → WAS(연산) → DB(자료) — 역순으로 응답</div>
<div class="web3-row">
<div class="web3-node" style="border-color:#374151;background:#f9fafb">
  <div class="web3-icon">💻</div>
  <div class="web3-name">Client</div>
  <div class="web3-role">브라우저 / 앱</div>
  <div class="web3-tech" style="background:#f3f4f6;color:#374151">HTTP 요청</div>
</div>
<div class="web3-mid">⟷</div>
<div class="web3-node" style="border-color:#2563eb;background:#eff6ff">
  <div class="web3-icon">🌐</div>
  <div class="web3-name">Web Server</div>
  <div class="web3-role">송수신 담당</div>
  <div class="web3-tech" style="background:#dbeafe;color:#1d4ed8">Nginx · Apache</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px">정적 파일<br>HTML/CSS/JS</div>
</div>
<div class="web3-mid">⟷</div>
<div class="web3-node" style="border-color:#ea580c;background:#fff7ed">
  <div class="web3-icon">⚙️</div>
  <div class="web3-name">WAS</div>
  <div class="web3-role">처리·연산 담당</div>
  <div class="web3-tech" style="background:#fed7aa;color:#c2410c">Tomcat · Node.js</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px">
    MVC 패턴<br>
    <span style="color:#7c3aed;font-weight:700">View</span> ·
    <span style="color:#2563eb;font-weight:700">Control</span> ·
    <span style="color:#059669;font-weight:700">Model</span>
  </div>
</div>
<div class="web3-mid">⟷</div>
<div class="web3-node" style="border-color:#059669;background:#f0fdf4">
  <div class="web3-icon">🗄️</div>
  <div class="web3-name">DB Server</div>
  <div class="web3-role">자료 담당</div>
  <div class="web3-tech" style="background:#dcfce7;color:#166534">SQL</div>
  <div style="font-size:10px;color:#6b7280;margin-top:5px">Oracle<br>MySQL · PostgreSQL</div>
</div>
</div>
<div class="hl" style="border-color:#0891b2;background:#ecfeff">
<p>Cookie = Client 상태 저장 (Key=Value). Session/DB = Server 상태 저장. <strong>Stateless HTTP → Cookie로 상태 유지</strong></p>
</div>`},
{t:"API & REST API",html:`
<div class="s-eye" style="color:#0891b2">SECTION 3 · WEB</div>
<div class="s-title">API &amp; REST API</div>
<div class="s-sub">API = 프로그램 간 소통 약속. REST API = CRUD를 URL 함수 형식으로 호출하는 기술</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">🔌 API (Application Programming Interface)</div>
<div class="icard-b">
두 프로그램이 소통하는 <strong>약속된 인터페이스</strong><br><br>
<strong>UI/Data 분리 진화:</strong><br>
기존: HTML 통째 전송<br>
현재: <strong>JSON/XML 데이터만</strong> 전송<br>
→ JS가 디바이스별 HTML 생성<br>
→ <strong>React.js / Vue.js</strong>
</div>
</div>
<div class="icard">
<div class="icard-t">🛠️ REST API — CRUD × URL</div>
<div class="icard-b">
<strong>GET</strong> /stocks → 목록 조회<br>
<strong>POST</strong> /stocks → 항목 추가<br>
<strong>PUT</strong> /stocks/1 → 항목 수정<br>
<strong>DELETE</strong> /stocks/1 → 항목 삭제<br><br>
<span style="font-size:11px;color:#6b7280">CRUD를 URL + HTTP Method 형식으로 호출</span>
</div>
</div>
</div>
<table class="tbl">
<tr><th>개념</th><th>설명</th><th>비유</th></tr>
<tr><td><strong>JVM</strong></td><td>Java를 위해 SW로 구현된 CPU (user 모드)</td><td>Java 전용 가상 컴퓨터</td></tr>
<tr><td><strong>Servlet</strong></td><td>HTTP 요청을 처리하는 자바 웹 프로그래밍 기술</td><td>요청 전담 일꾼</td></tr>
<tr><td><strong>Container</strong></td><td>Servlet들을 관리하는 컨테이너</td><td>일꾼들의 사무실</td></tr>
<tr><td><strong>Framework</strong></td><td>Frame(틀)+work — 규칙·부품으로 결과물 생성</td><td>밀키트</td></tr>
</table>`},

</div>
</div>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p>us-stock 기술적 팩터(25% 가중치)는 RSI + MACD + 이동평균을 복합 점수로 계산한다.</p>
</div>`},
{t:"ETF 활용법",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">ETF 활용법</div>
<div class="s-sub">SPY vs QQQ — 입문자의 최선택은 적립식 QQQ</div>
<table class="tbl" style="margin-bottom:14px">
<tr><th>ETF</th><th>추적 지수</th><th>10년 수익률</th><th>특성</th></tr>
<tr><td><strong>SPY</strong></td><td>S&amp;P 500</td><td>~250%</td><td>안정적, 배당 O, 시장 평균</td></tr>
<tr><td><strong>QQQ</strong></td><td>나스닥 100</td><td>~450%</td><td>기술주 중심, 성장</td></tr>
<tr><td><strong>TQQQ</strong></td><td>나스닥 3배</td><td>~2000%</td><td>⚠️ 장기보유 비추 (경로의존)</td></tr>
<tr><td><strong>VTI</strong></td><td>미국 전체</td><td>~220%</td><td>분산 최대화</td></tr>
</table>
<div class="hl" style="border-color:#059669;background:#ecfdf5">
<p><strong>DCA 전략 추천:</strong> 매월 정액 자동 매수 → 평균 매입단가 하락. <strong>SPY/QQQ 적립식 70% + 개별종목 30%</strong></p>
</div>`},
{t:"위험관리",html:`
<div class="s-eye" style="color:#059669">SECTION 4</div>
<div class="s-title">위험관리 — MDD, 손절, 분산</div>
<div class="s-sub">수익을 지키는 것이 버는 것보다 중요하다</div>
<div class="grid2" style="margin-bottom:14px">
<div class="icard">
<div class="icard-t">📉 MDD (Maximum Drawdown)</div>
<div class="icard-b">
-10% 손실 회복: +11.1% 필요<br>
-20% 손실 회복: +25.0% 필요<br>
-50% 손실 회복: +100.0% 필요<br><br>
<strong>→ 손실을 막는 것이 훨씬 유리</strong>
</div>
</div>
<div class="icard">
<div class="icard-t">🛡️ Stop Loss 3단계</div>
<div class="icard-b">
1. 손실제한: -5% → 자동 매도<br>
2. 이익실현: +10% → 일부 매도<br>
3. Trailing Stop: 최고가 -N%<br><br>
us-stock: Regime별 자동 조정
</div>
</div>
</div>
<table class="tbl">
<tr><th>체제</th><th>Stop Loss</th><th>MDD 한도</th></tr>
<tr><td>risk_on (강세)</td><td>-10%</td><td>-12%</td></tr>
<tr><td>neutral</td><td>-8%</td><td>-10%</td></tr>
<tr><td>risk_off (약세)</td><td>-5%</td><td>-7%</td></tr>
<tr><td>crisis (위기)</td><td>-3%</td><td>-5%</td></tr>
</table>`}
]},

,{id:7, num:7, title:"참고 자료", sub:"네트워크 · OS · WEB 핵심 정리", color:"#64748b", cl:"#f1f5f9", slides:[
{t:"네트워크 핵심",html:`
<div class="s-eye" style="color:#64748b">SECTION 7 · REF</div>
<div class="s-title">네트워크 핵심</div>
<div class="s-sub">L2·L3·L4 계층별 식별자. Encapsulation = 각 계층이 헤더를 씌워 전달</div>
<div class="grid2" style="margin-bottom:12px">
<div class="icard">
<div class="icard-t">계층별 식별자</div>
<div class="icard-b" style="font-size:12px">
<strong>L2 — MAC</strong>: NIC(네트워크 카드) 식별. 48bit 물리 주소. 같은 네트워크 내 통신<br><br>
<strong>L3 — IP</strong>: Host(컴퓨터) 식별. 논리 주소. 라우터가 목적지 찾기<br><br>
<strong>L4 — Port</strong>: Service 식별. 0~65535. HTTP=80, HTTPS=443, SSH=22
</div>
</div>
<div class="icard">
<div class="icard-t">Encapsulation (캡슐화)</div>
<div class="icard-b">
<div style="display:flex;flex-direction:column;gap:4px">
<div style="background:#dbeafe;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#1d4ed8">Stream (데이터)</div>
<div style="text-align:center;color:#9ca3af;font-size:10px">↓ L4 TCP/UDP 헤더 추가</div>
<div style="background:#d1fae5;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#065f46">Segment</div>
<div style="text-align:center;color:#9ca3af;font-size:10px">↓ L3 IP 헤더 추가</div>
<div style="background:#fef3c7;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#92400e">Packet</div>
<div style="text-align:center;color:#9ca3af;font-size:10px">↓ L2 MAC 헤더 추가</div>
<div style="background:#fce7f3;border-radius:5px;padding:6px 8px;font-size:11px;font-weight:700;color:#9d174d">Frame (물리 전송)</div>
</div>
</div>
</div>
</div>
<table class="tbl">
<tr><th></th><th>TCP</th><th>UDP</th></tr>
<tr><td><strong>연결</strong></td><td>3-way handshake (연결 지향)</td><td>비연결 (connectionless)</td></tr>
<tr><td><strong>신뢰성</strong></td><td>순서 보장 · 재전송</td><td>보장 없음</td></tr>
<tr><td><strong>용도</strong></td><td>HTTP · DB · 파일 전송</td><td>DNS · 스트리밍 · 게임</td></tr>
</table>`},
{t:"OS 심화 — 메모리 레이아웃",html:`
<div class="s-eye" style="color:#64748b">SECTION 7 · REF</div>
<div class="s-title">OS 심화 — 메모리 레이아웃</div>
<div class="s-sub">프로세스 메모리 = 4영역. Compile = 소스→실행파일 5단계. fork+exec = 프로세스 생성</div>
<div class="grid2" style="margin-bottom:12px">
<div class="icard">
<div class="icard-t">프로세스 메모리 영역</div>
<div class="icard-b">
<div style="display:flex;flex-direction:column;gap:3px;font-size:11px">
<div style="background:#dbeafe;border-radius:5px;padding:7px 10px;font-weight:700;color:#1d4ed8">CODE (Text) — 실행 코드 (읽기 전용)</div>
<div style="background:#d1fae5;border-radius:5px;padding:7px 10px;font-weight:700;color:#065f46">DATA — 전역 변수 · static 변수</div>
<div style="background:#fef3c7;border-radius:5px;padding:7px 10px;font-weight:700;color:#92400e">HEAP — 동적 할당 (malloc) ↑ 위로 성장</div>
<div style="background:#f3f4f6;border-radius:5px;padding:7px 10px;text-align:center;font-size:10px;color:#9ca3af">↕ 빈 공간</div>
<div style="background:#fce7f3;border-radius:5px;padding:7px 10px;font-weight:700;color:#9d174d">STACK — 지역 변수 · 함수 호출 ↓ 아래로 성장</div>
</div>
</div>
</div>
<div class="icard">
<div class="icard-t">Compile 과정 (C언어)</div>
<div class="icard-b">
<div style="display:flex;flex-direction:column;gap:3px;font-size:11px">
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.c 소스파일</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Preprocessor (#include 처리)</div>
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.i 전처리 파일</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Compiler (최적화)</div>
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.s 어셈블리</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Assembler</div>
<div style="background:#eff6ff;border-radius:4px;padding:5px 8px;font-weight:600">.o 오브젝트 파일</div>
<div style="color:#9ca3af;padding-left:10px;font-size:10px">↓ Linker (라이브러리 결합)</div>
<div style="background:#d1fae5;border-radius:4px;padding:5px 8px;font-weight:700;color:#065f46">실행 파일 (ELF / exe)</div>
</div>
</div>
</div>
</div>
<div class="hl" style="border-color:#64748b;background:#f8fafc">
<p><strong>프로세스 생성:</strong> fork() = 부모 프로세스 복사 → exec() = 새 프로그램으로 교체. 모든 프로세스는 이 2단계로 생성됨</p>
</div>`},
{t:"WEB &amp; Cloud 심화",html:`
<div class="s-eye" style="color:#64748b">SECTION 7 · REF</div>
<div class="s-title">WEB &amp; Cloud 심화</div>
<div class="s-sub">REST API 원칙 · Cookie vs Session · Kubernetes 구조 · CI/CD 파이프라인</div>
<div class="grid2" style="margin-bottom:12px">
<div class="icard">
<div class="icard-t">REST API 핵심 원칙</div>

// ============================================================
// FLATTEN ALL SLIDES
// ============================================================
const ALL = SEC.flatMap(s => s.slides.map((sl,i) => ({...sl, sec:s, secIdx:i, secLen:s.slides.length})))
let cur = 0

function render(idx) {
  cur = idx
  const sl = ALL[idx]
  const sec = sl.sec

  // sidebar
  document.querySelectorAll('.sb-sec').forEach((el,i) => {
    el.classList.toggle('active', SEC[i].id === sec.id)
    el.style.color = SEC[i].id === sec.id ? sec.color : ''
  })

  // top bar
  const badge = document.getElementById('sec-badge')
  badge.textContent = `SECTION ${sec.num}`
  badge.style.background = sec.cl
  badge.style.color = sec.color
  document.getElementById('top-title').textContent = sl.t
  document.getElementById('top-cnt').textContent = `${sl.secIdx+1} / ${sl.secLen}`

  // slide content
  document.getElementById('slide-content').innerHTML = sl.html

  // progress
  const pct = Math.round(((idx+1)/ALL.length)*100)
  document.getElementById('prog-txt').textContent = `${idx+1} / ${ALL.length}`
  document.getElementById('prog-pct').textContent = `${pct}%`
  document.getElementById('prog-fill').style.width = pct+'%'

  // prev/next
  document.getElementById('prev-btn').disabled = idx === 0
  document.getElementById('next-btn').disabled = idx === ALL.length-1

  // dots (show section dots)
  const dotsEl = document.getElementById('dots')
  dotsEl.innerHTML = ''
  const secSlides = SEC.find(s=>s.id===sec.id).slides
  secSlides.forEach((_,i) => {
    const d = document.createElement('div')
    d.className = 'd' + (i===sl.secIdx?' on':'')
    if(i===sl.secIdx) d.style.background = sec.color
    dotsEl.appendChild(d)
  })

  // scroll slide area to top
  document.querySelector('.slide-area').scrollTop = 0
}

function nav(dir) {
  const n = cur + dir
  if(n >= 0 && n < ALL.length) render(n)
}

function jumpSec(id) {
  const idx = ALL.findIndex(s => s.sec.id === id)
  if(idx >= 0) render(idx)
}

// build sidebar
const nav2 = document.getElementById('sb-nav')
SEC.forEach(s => {
  const btn = document.createElement('button')
  btn.className = 'sb-sec'
  btn.onclick = () => jumpSec(s.id)
  btn.innerHTML = `<span class="sb-dot" style="border-color:${s.color}"></span><span class="sb-num">${s.num}</span><span class="sb-name">${s.title}</span><span class="sb-cnt">${s.slides.length}</span>`
  nav2.appendChild(btn)
})

// keyboard
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();nav(-1)}
  else if(e.key>='1'&&e.key<='7'){e.preventDefault();jumpSec(parseInt(e.key))}
})

render(0)
</script>
